<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#17233c">
<title>検定対策</title>
<style>
:root{--navy:#17233c;--blue:#315dce;--bg:#f3f5f9;--card:#fff;--text:#182033;--muted:#6b7280;--ok:#16845b;--ng:#c83d4d;--line:#e5e9f1}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
.app{max-width:760px;margin:auto;min-height:100vh;padding:20px 16px 40px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
h1{font-size:28px;margin:0}.sub{color:var(--muted);font-size:14px;margin-top:5px}.card{background:var(--card);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 8px 24px rgba(23,35,60,.07)}
.section-title{font-size:15px;font-weight:800;color:var(--muted);margin:0 0 10px}.menu-btn,.choice,.primary,.ghost{width:100%;border:0;border-radius:14px;padding:16px;text-align:left;font-size:16px;cursor:pointer;transition:.15s}
.menu-btn{background:#f7f9fd;margin:8px 0;display:flex;justify-content:space-between;align-items:center}.menu-btn:active,.choice:active,.primary:active{transform:scale(.99)}
.menu-label{font-weight:800}.rate{font-size:13px;color:var(--muted);white-space:nowrap}.choice{background:#fff;border:2px solid var(--line);margin:10px 0;font-weight:700}.choice:hover{border-color:#aebce5}.choice:disabled{cursor:default;opacity:1}.choice.correct{border-color:var(--ok);background:#edf9f4}.choice.wrong{border-color:var(--ng);background:#fff0f2}
.primary{background:var(--blue);color:#fff;text-align:center;font-weight:800;margin-top:14px}.ghost{background:transparent;border:1px solid var(--line);text-align:center;color:var(--text)}
.hidden{display:none!important}.quiz-head{display:flex;align-items:center;gap:10px}.back{border:0;background:#fff;border-radius:12px;padding:10px 12px;font-size:18px;cursor:pointer}.grow{flex:1}.pill{display:inline-block;background:#eaf0ff;color:#294fae;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}.qnum{font-size:13px;color:var(--muted);margin-left:8px}
.question{font-size:20px;line-height:1.7;font-weight:800;margin:18px 0}.result{border-radius:14px;padding:15px;margin-top:16px;line-height:1.7}.result.ok{background:#edf9f4}.result.ng{background:#fff0f2}.answer-title{font-weight:900;font-size:18px}.explain{margin-top:10px}
.choice-explanations{margin-top:14px;display:grid;gap:9px}
.choice-explanation{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
.choice-explanation.correct-item{border-color:var(--ok);background:#f2fbf7}
.choice-explanation.selected-wrong{border-color:var(--ng);background:#fff5f6}
.choice-word{font-weight:900;margin-bottom:4px}
.choice-meaning{font-size:14px;line-height:1.55;color:#394156}
.question-rate{font-size:13px;color:var(--muted);margin-top:-8px;margin-bottom:12px}
.finish-box{text-align:center;padding:30px 12px}
.finish-box h2{margin:0 0 10px}
.finish-box p{color:var(--muted);line-height:1.7}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#f7f9fd;border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}
.actions{display:flex;gap:8px}.actions button{flex:1}.favorite{border:0;background:#fff;border-radius:12px;padding:10px 12px;font-size:18px;cursor:pointer}.empty{text-align:center;padding:35px 10px;color:var(--muted)}
.footer-note{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}@media(max-width:480px){h1{font-size:24px}.question{font-size:18px}.card{padding:15px}.app{padding:16px 12px 30px}}
</style>
</head>
<body><main class="app">
<section id="home">
<div class="top"><div><h1>検定対策</h1><div class="sub" id="termCount"></div></div></div>
<div class="card"><div class="section-title">全分野</div><button class="menu-btn" data-mode="all" id="startAllBtn"><span class="menu-label">全分野ランダム問題</span><span class="rate" id="rate-all">正答率 0%</span></button></div>
<div class="card"><div class="section-title">分野別ランダム問題</div>
<button class="menu-btn" data-mode="ストラテジ系" id="startStrategyBtn"><span class="menu-label">▶︎ ストラテジ系</span><span class="rate" id="rate-strategy">正答率 0%</span></button>
<button class="menu-btn" data-mode="マネジメント系" id="startManagementBtn"><span class="menu-label">▶︎ マネジメント系</span><span class="rate" id="rate-management">正答率 0%</span></button>
<button class="menu-btn" data-mode="テクノロジ系" id="startTechnologyBtn"><span class="menu-label">▶︎ テクノロジ系</span><span class="rate" id="rate-technology">正答率 0%</span></button></div>
<div class="card"><div class="section-title">復習</div><button class="menu-btn" data-mode="wrong" id="startWrongBtn"><span class="menu-label">間違えた問題</span><span class="rate" id="wrong-count">0問</span></button><button class="menu-btn" data-mode="favorite" id="startFavoriteBtn"><span class="menu-label">★ お気に入り問題</span><span class="rate" id="favorite-count">0問</span></button></div>
<div class="card"><div class="section-title">学習記録</div><div class="stats-grid"><div class="stat"><b id="total-answers">0</b><span>解答数</span></div><div class="stat"><b id="total-correct">0</b><span>正解数</span></div><div class="stat"><b id="total-rate">0%</b><span>全体正答率</span></div></div><button class="ghost" id="resetBtn" style="margin-top:12px">学習記録をリセット</button></div>
<div class="footer-note">学習記録はこのブラウザ内に保存されます</div>
</section>
<section id="quiz" class="hidden">
<div class="quiz-head"><button class="back" id="backBtn" aria-label="ホームへ戻る">←</button><div class="grow"><span class="pill" id="category"></span><span class="qnum" id="qnum"></span></div><button class="favorite" id="favBtn" aria-label="お気に入り">☆</button></div>
<div class="card"><div class="question" id="question"></div><div class="question-rate" id="questionRate"></div><div id="choices"></div><div id="result" class="hidden"></div><button class="primary hidden" id="nextBtn">次の問題へ</button></div>
<div class="card"><div class="stats-grid"><div class="stat"><b id="sessionAnswered">0</b><span>今回の解答</span></div><div class="stat"><b id="sessionCorrect">0</b><span>今回の正解</span></div><div class="stat"><b id="sessionRate">0%</b><span>今回の正答率</span></div></div></div>
</section>
</main>
<script>
const QUESTIONS=[{"id":"ストラテジ系-1","category":"ストラテジ系","word":"経営理念","meaning":"「会社は何のために存在し、何を目指すのか」を示した基本的な考え方。"},{"id":"ストラテジ系-2","category":"ストラテジ系","word":"パーパス経営","meaning":"利益だけでなく、「社会のために何をする会社なのか」という目的を大切にして経営する考え方。"},{"id":"ストラテジ系-3","category":"ストラテジ系","word":"CSR","meaning":"企業が利益を追求するだけでなく、環境や社会、人々に対して責任ある行動をとること。"},{"id":"ストラテジ系-4","category":"ストラテジ系","word":"監査役","meaning":"取締役や会計参与の職務執行を監査し、違法または著しく不当な行為をチェックして防止する役職・機関。"},{"id":"ストラテジ系-5","category":"ストラテジ系","word":"SDGs","meaning":"持続可能で多様性と包摂性のある社会の実現を目指し、「地球上の誰一人として取り残さない」ことをスローガンに掲げた2023年を期限とする17の国際目標。"},{"id":"ストラテジ系-6","category":"ストラテジ系","word":"コーポレートブランド","meaning":"ステークホルダが企業に対して抱くイメージや信頼度から得られるブランド力のこと。企業価値に大きな影響を与える無形資産。"},{"id":"ストラテジ系-7","category":"ストラテジ系","word":"BCP","meaning":"予期せぬ災害が発生した場合に、最低限の事業を継続 し、または早期に復旧・再開できるようにする。"},{"id":"ストラテジ系-8","category":"ストラテジ系","word":"off-JT","meaning":"職場外で研究する教育。（off the job training)"},{"id":"ストラテジ系-9","category":"ストラテジ系","word":"アダプティブラーニング","meaning":"学習者の能力に応じて、学習内容を自動的に調整する教育技術。"},{"id":"ストラテジ系-10","category":"ストラテジ系","word":"HRテック","meaning":"人的資源の管理にICT技術を活 用しようとする活動やサービスの総称。"},{"id":"ストラテジ系-11","category":"ストラテジ系","word":"リテンション","meaning":"2つの場面 で使用される。どちらも『繋ぎとめる』という意味合い がある。人事労務とマーケティング"},{"id":"ストラテジ系-12","category":"ストラテジ系","word":"ワークライフバランス","meaning":"「仕事」と「仕事から離れた個人の生活」の両方をバラン スよく充実させていこうという考え方。"},{"id":"ストラテジ系-13","category":"ストラテジ系","word":"シェアードリーダーシップ","meaning":"チーム全員で役割を分担し、リーダーシップを共有して目標を達成する考え方。"},{"id":"ストラテジ系-14","category":"ストラテジ系","word":"インバスケット","meaning":"仕事の優先順位を判断し、適切に処理する能力を評価する手法。"},{"id":"ストラテジ系-15","category":"ストラテジ系","word":"グラスシーリング","meaning":"能力があっても、性別などを理由に昇進を妨げる見えない壁。"},{"id":"ストラテジ系-16","category":"ストラテジ系","word":"事業部制","meaning":"商品やサービスごとに会社を分けて運営する組織。"},{"id":"ストラテジ系-17","category":"ストラテジ系","word":"プロジェクト組織","meaning":"特定の仕事（プロジェクト）のために、一時的に集められた組織。"},{"id":"ストラテジ系-18","category":"ストラテジ系","word":"ネットワーク組織","meaning":"複数の会社や組織が協力し、ネットワークのようにつながって仕事をする組織。"},{"id":"ストラテジ系-19","category":"ストラテジ系","word":"官民データ活用推進基本法","meaning":"国、地方公共団体、民間事業者が保有するデータの円滑な練携と利活用を保進するための法律。"},{"id":"ストラテジ系-20","category":"ストラテジ系","word":"CIO(Chief Information Officer)","meaning":"経営戦略に治った情報戦略やIT投資計画に関する責任者。"},{"id":"ストラテジ系-21","category":"ストラテジ系","word":"超スマート社会","meaning":"AI・IoT・ビッグデータなどの先端技術を活用し、 すべての人が快適で持続可能な生活を送れるようにする未来社会の構想です。"},{"id":"ストラテジ系-22","category":"ストラテジ系","word":"グリーントランスフォーメーション","meaning":"国・地方公共団体・民間事業者が持つデータ（官民データ）を有効に活用するための基本法です。"},{"id":"ストラテジ系-23","category":"ストラテジ系","word":"MVV","meaning":"MVVとは、組織の存在意義や方向性を示す3つの要素です。Mission（ミッション）,Vision（ビジョン）,Value（バリュー）。"},{"id":"ストラテジ系-24","category":"ストラテジ系","word":"株主総会","meaning":"株主総会とは、株式会社の実質的な所有者である株主によって構成される会議で、 会社の経営方針や重要事項を決定する 最高意思決定機関 です。"},{"id":"ストラテジ系-25","category":"ストラテジ系","word":"SRI","meaning":"社会・環境・倫理（CSR）に配慮する企業に投資し、企業の社会的責任を高める投資。"},{"id":"ストラテジ系-26","category":"ストラテジ系","word":"グリーンIT","meaning":"ITで環境保護/   省エネ /  リサイクル/  IT自体＋ITを使って社会も省エネ。"},{"id":"ストラテジ系-27","category":"ストラテジ系","word":"ゼロエミッション","meaning":"自然界への排出ゼロ/  副産物・廃棄物を別の産業で利用/  資源を循環させる。"},{"id":"ストラテジ系-28","category":"ストラテジ系","word":"PDCA","meaning":"Plan（計画 Do（実行 Check（評価） Act（改善）Plan\nこのサイクルを繰り返すことPlan（計画） → Do（実行） → Check（評価） → Act（改善）で、少しずつ成果や効率を向上させることができます。"},{"id":"ストラテジ系-29","category":"ストラテジ系","word":"BCM","meaning":"BCMとは、BCP（事業継続計画）を作成し、その計画を運用・見直し・教育・訓練を通して継続的に管理・改善する活動のことです。"},{"id":"ストラテジ系-30","category":"ストラテジ系","word":"e-ラーニング","meaning":"e-ラーニングとは、パソコンやスマートフォンなどのICT（情報通信技術）を使って学習する方法です。"},{"id":"ストラテジ系-31","category":"ストラテジ系","word":"CDP(Career Development Program)","meaning":"企業内教育・訓練プログラムの一種で、従業員の能力を長期的な計画に基づいて組織的に開発するシステム・プログラム体系のこと。"},{"id":"ストラテジ系-32","category":"ストラテジ系","word":"MBO(Management Buyout)","meaning":"会社の経営陣が株主より勤務先企業の株式を取得することで、オーナー経営者として独立する取引のこと。"},{"id":"ストラテジ系-33","category":"ストラテジ系","word":"タレントマネジメント","meaning":"社員個人の持つ能力に注目し、資質や才能を育成・維持して適材適所で活用することで企業の持続的発展を目指す人事管理手法。"},{"id":"ストラテジ系-34","category":"ストラテジ系","word":"DE&I","meaning":"「多様性、公平性、包括性」を意味する概念であり、職場や組織などのあらゆる場において、多様な人々が対等に参加し、\n能力を発揮できる環境を整えることを目指す考え方のこと。"},{"id":"ストラテジ系-35","category":"ストラテジ系","word":"サーバントリーダーシップ","meaning":"リーダーが組織のメンバーに対して支配的な立場をとるのではなく、リーダー自身が部下に対して奉仕者（サーヴァント）として行動するリーダーシップの在り方のこと。"},{"id":"ストラテジ系-36","category":"ストラテジ系","word":"ロールプレイング","meaning":"現実に起こる場面を想定して複数の人がそれぞれ特定の役割を演じ、疑似体験を通じて、ある事柄が実際に起こったときの考え方や対応方法を学ぶ教育方法。"},{"id":"ストラテジ系-37","category":"ストラテジ系","word":"ホワイトカラーエグゼンプション","meaning":"一定の役職や専門職にある労働者（ホワイトカラー）を対象に、労働時間に応じた賃金の支払いなどの法規制を適用除外とする制度です。"},{"id":"ストラテジ系-38","category":"ストラテジ系","word":"職能別組織","meaning":"製造、営業、経理、開発などのように職能ごとに構成された組織形態。"},{"id":"ストラテジ系-39","category":"ストラテジ系","word":"カンパニー制","meaning":"組織の自己完結性を高め、迅速で柔軟な経営を実現するため、社内の各部門をそれぞれ独立した会社のように分け事業運営する組織形態。"},{"id":"ストラテジ系-40","category":"ストラテジ系","word":"持株会社","meaning":"他の会社の株式を保有し、グループ全体の経営管理や統括を行う会社のこと。"},{"id":"ストラテジ系-41","category":"ストラテジ系","word":"第4時産業革命","meaning":"第4次産業(医療や情報通信、教育サービスなどの製造業)のコンピュータ化、自動化により飛躍的な生産性の向上や効率化が図られることである。"},{"id":"ストラテジ系-42","category":"ストラテジ系","word":"データ駆動型社会","meaning":"モノとインターネットが繋がるIoTの進展に伴い生まれた言葉で、IoT化などにより得られた莫大なデータを解析し、現代社会に役立てようとする試みである。"},{"id":"ストラテジ系-43","category":"ストラテジ系","word":"カーボンニュートラル","meaning":"温室効果ガス（主に二酸化炭素：CO₂）の排出量と吸収・除去量を差し引きして実質ゼロにすること。"},{"id":"ストラテジ系-44","category":"ストラテジ系","word":"デジタル社会形成基本法","meaning":"デジタル化を進めるための基本ルール。"},{"id":"ストラテジ系-45","category":"ストラテジ系","word":"人的資本経営","meaning":"人材を大切にして会社を成長させる経営。"},{"id":"ストラテジ系-46","category":"ストラテジ系","word":"決算","meaning":"一定期間の経営成績や財産の状態をまとめる為に行う作業。"},{"id":"ストラテジ系-47","category":"ストラテジ系","word":"ディスクロージャ","meaning":"会社が投資家や株主などに、会社の情報を公開すること。"},{"id":"ストラテジ系-48","category":"ストラテジ系","word":"カーボンフットプリント","meaning":"製品が作られてから捨てられるまでに出すCO2の量。"},{"id":"ストラテジ系-49","category":"ストラテジ系","word":"ステークホルダー","meaning":"システムやプロジェクトに関わるすべての利害関係者のこと。"},{"id":"ストラテジ系-50","category":"ストラテジ系","word":"OODAループ","meaning":"状況を素早く判断して行動し、結果を見てまた判断するサイクル。"},{"id":"ストラテジ系-51","category":"ストラテジ系","word":"OJT","meaning":"実際の仕事をしながら教育・指導を受ける研修方法。"},{"id":"ストラテジ系-52","category":"ストラテジ系","word":"リスキリング","meaning":"新しい仕事や業務に対応するために、新しい知識やスキルを学び直すこと。"},{"id":"ストラテジ系-53","category":"ストラテジ系","word":"メンタルヘルス","meaning":"心の健康のこと。"},{"id":"ストラテジ系-54","category":"ストラテジ系","word":"HRM","meaning":"人材の採用・育成・評価などを行う管理"},{"id":"ストラテジ系-55","category":"ストラテジ系","word":"ワークエンゲージメント","meaning":"仕事に対しやりがいを感じ、満足している状況を測る概念のことである。"},{"id":"ストラテジ系-56","category":"ストラテジ系","word":"コンティンジェンシー理論","meaning":"「最適な経営方法は一つではなく、状況に応じて変わる」という考え方。"},{"id":"ストラテジ系-57","category":"ストラテジ系","word":"ワーケーション","meaning":"旅行先やリゾート地で、休暇を楽しみながら仕事も行う働き方。"},{"id":"ストラテジ系-58","category":"ストラテジ系","word":"ケーススタディ","meaning":"題材となる具体的な事例を取り上げて、その背景や問題点、結果を分析・考察する。"},{"id":"ストラテジ系-59","category":"ストラテジ系","word":"階層型組織","meaning":"往来から存在する組織形態の1つで、社長・部長・課長・係長・といった序列に組織されており、それに従い働く組織。"},{"id":"ストラテジ系-60","category":"ストラテジ系","word":"マトリックス組織","meaning":"往来の職能別組織に、それら各機能を横断するプロジェクトまたは製品別事業などを交差させた組織形態。"},{"id":"ストラテジ系-61","category":"ストラテジ系","word":"アメーバ組織","meaning":"各アメーバが全体を構成する一部の機能として相互作用的に活動する組織形態。"},{"id":"ストラテジ系-62","category":"ストラテジ系","word":"CEO","meaning":"中長期的な経営事項についての責任を負う役職で最高経営責任者。"},{"id":"ストラテジ系-63","category":"ストラテジ系","word":"Society5.0","meaning":"サイバー空間とフィジカル空間を連携し、IoTですべてのモノや情報等の技術で経済発展と社会問題の解決を両立する社会"},{"id":"ストラテジ系-64","category":"ストラテジ系","word":"デジタルトランスフォーメーション","meaning":"AIやクラウドなどのデジタル技術とデータを活用し、業務プロセツを効率化するだけでなく、ビジネスモデルや組織文化そのものを変革して新たな価値を創造し、競争優位性を確立することです。"},{"id":"ストラテジ系-65","category":"ストラテジ系","word":"国家戦略特区法","meaning":"日本を「世界で一番ビジネスがしやすい環境」にすることを目的に制定されました。"},{"id":"ストラテジ系-66","category":"ストラテジ系","word":"フィールドワーク","meaning":"研究者や調査員が現場に直接足を運び、観察やインタビュー、実測などを通じて一次情報を収集する調査手法です。"},{"id":"ストラテジ系-67","category":"ストラテジ系","word":"特性要因図","meaning":"特性(結果)とそれに影響を及ぼしたと思われる要因（原因）の関係を体系的に表した図。図が魚の骨のようにみえることから、\nフィッシュボーンダイアグラムと言われている。"},{"id":"ストラテジ系-68","category":"ストラテジ系","word":"最小二乗法","meaning":"過去のデータから、将来を予測するためのもっともらしい直線を引く方法。"},{"id":"ストラテジ系-69","category":"ストラテジ系","word":"散布図","meaning":"2項目間の分布、相関関係を視覚的にできる図。データ同士の相関関係、データのばらつき具合や外れ値の発見などに用いられる。"},{"id":"ストラテジ系-70","category":"ストラテジ系","word":"ヒートマップ","meaning":"色の濃淡でデータの大小を表す図。"},{"id":"ストラテジ系-71","category":"ストラテジ系","word":"モザイク図","meaning":"複数の項目の割合や関係を、長方形の大きさで表す図。"},{"id":"ストラテジ系-72","category":"ストラテジ系","word":"ロジックツリー","meaning":"問題や目的を枝分かれさせて整理する図。"},{"id":"ストラテジ系-73","category":"ストラテジ系","word":"シェープファイル","meaning":"GISで地図データ（点・線・面とその属性情報）を保存する代表的なファイル形式。"},{"id":"ストラテジ系-74","category":"ストラテジ系","word":"GISデータ","meaning":"地図上で位置情報と属性情報を管理・分析するために使われるデータで、カーナビ、防災、都市計画、物流、商圏分析などに活用される。"},{"id":"ストラテジ系-75","category":"ストラテジ系","word":"標本抽出","meaning":"対象の中から一部のデータを選んで調べ、その結果から全体の傾向や特徴を推定するために使われる方法で、アンケート調査や市場調査、品質管理などに活用される。"},{"id":"ストラテジ系-76","category":"ストラテジ系","word":"第1種の誤り","meaning":"仮説検定においてテストの状態と実際の状態が異なる過誤の種類を表す言葉であり、\n帰無仮説（証拠を無に帰するような説）が実際には正しいにもかかわらず、間違いと判断され棄却していしまう過誤のこと。"},{"id":"ストラテジ系-77","category":"ストラテジ系","word":"第2種の誤り","meaning":"仮説検定においてテストの状態と実際の状態が異なる過誤の種類を表す言葉であり、\n帰無仮説（証拠を無に帰するような説）が実際には誤りであるにもかかわらず、正しいと判断され採用してしまう過誤のこと。"},{"id":"ストラテジ系-78","category":"ストラテジ系","word":"データウェアハウス","meaning":"企業内に散在しているデータの有効活用を目的に、基幹系データベースや外部データベースのデータを一元的に整理・統合したデータベースのこと。"},{"id":"ストラテジ系-79","category":"ストラテジ系","word":"テキストマイニング","meaning":"データマイニングを文字列データに適用した手法。"},{"id":"ストラテジ系-80","category":"ストラテジ系","word":"デシジョンツリー","meaning":"ある事象について取り得る条件や選択肢を樹形図として記述された条件・選択肢をたどった場合に、どのような結果になるかを視覚的に表した図。"},{"id":"ストラテジ系-81","category":"ストラテジ系","word":"ブレーンライティング","meaning":"発想を広げるために用いられるブレーンストーミングでは、批判禁止・自由に発言・質より量・結合や連想OKというルールのもとで発言していく。"},{"id":"ストラテジ系-82","category":"ストラテジ系","word":"パレート図","meaning":"値の大きい順に分析対象の項目を並べた縦棒グラフと、累積構成比を表す折れ線グラフを組み合わせた複合グラフで、\n主に複数の分析対象の中から、重要である要素を識別するために使用される。"},{"id":"ストラテジ系-83","category":"ストラテジ系","word":"管理図","meaning":"工程の状態や品質を時系列に表した図であり、工程が安定した状態にあるかどうかを判断するために用いられる。"},{"id":"ストラテジ系-84","category":"ストラテジ系","word":"回帰分析","meaning":"統計的分析手法の一つで、目的変数（結果となる数値）と仮説変数（原因となる数値）の因果関係を表す関数式を求めること。"},{"id":"ストラテジ系-85","category":"ストラテジ系","word":"マトリックス図","meaning":"分析対象となる要素を要素を行と列から構成された二元表に配置し、\n行と列との交点に関連度合いを数値指導（10段階評価など）や記号（〇・△・×など）などの定性的な情報で記入する。"},{"id":"ストラテジ系-86","category":"ストラテジ系","word":"レーダーチャート","meaning":"中心から正多角形状に配置される各項目の軸に、値や基準値に対する比率をプロットし、各点を線で結んだ計上で表す図法。"},{"id":"ストラテジ系-87","category":"ストラテジ系","word":"クロス集計表","meaning":"クロス集計表をは、2つ以上の質問を掛け合わせて集計したデータを表にしたものである。"},{"id":"ストラテジ系-88","category":"ストラテジ系","word":"コンセプトマップ","meaning":"知識やアイデアなどの様々な概念についてマップ上に並べ、関連するもの同士を線で結んでそれぞれの関係をわかりやすく可視化したものがコンセプトマップである。"},{"id":"ストラテジ系-89","category":"ストラテジ系","word":"共起キーワード","meaning":"ある言葉と同じ文章や話題の中で、一緒によく使われる単語のこと。利用者の関心や要望、重要なポイントを分析できるという特徴がある。"},{"id":"ストラテジ系-90","category":"ストラテジ系","word":"クロスセクションデータ","meaning":"同じ時点で集めた複数のグループのデータ。"},{"id":"ストラテジ系-91","category":"ストラテジ系","word":"仮説検定","meaning":"「本当にその主張が正しいのか」をデータを使って確かめる方法。"},{"id":"ストラテジ系-92","category":"ストラテジ系","word":"認知バイアス","meaning":"物事を志向し判断する際に、自分の過去の経験や記憶の癖・潜在意識なその人間特有の心理的影響により本来あるべき結果がゆがめられてしまう現象のこと。"},{"id":"ストラテジ系-93","category":"ストラテジ系","word":"A/Bテスト","meaning":"webサイトやアプリなどにおいて、利用者に対して2つのパターン(AとB)を出し分けて、どちらがより効率的かを検証する手法。"},{"id":"ストラテジ系-94","category":"ストラテジ系","word":"データマイニング","meaning":"データウェアハウスに蓄積されている大量の生データに、統計学的手法や数学的手法を適用することで、\n今までに知られていなかったデータ、情報、知識、知恵を発掘する手法。"},{"id":"ストラテジ系-95","category":"ストラテジ系","word":"データサイエンスのサイクル","meaning":"①課題の設定②調査方法の計画③データ収集④データの分析⑤分析結果というサイクル。"},{"id":"ストラテジ系-96","category":"ストラテジ系","word":"シミュレーション","meaning":"模型や現実に近づけたモデルなどをコンピュータ上で模擬的に動かすことで、製品の性能、機能やそのモデルの変化を評価する方法。"},{"id":"ストラテジ系-97","category":"ストラテジ系","word":"親和図法","meaning":"集めた意見やアイデアを意味や内容の近い者同士でグループ化することによって、ばらばらに見える情報の関連性や共通点を整理したり、新たな発想を導いたりする手法。"},{"id":"ストラテジ系-98","category":"ストラテジ系","word":"ABC分析","meaning":"商品や顧客などを重要度や売上の高い順にA・B・Cの3つに分類し、効率よく管理するための分析手法。"},{"id":"ストラテジ系-99","category":"ストラテジ系","word":"系統図","meaning":"目的を達成する手段を見つけるときに、「目的ー手段」の連鎖を散会的にツリー上に枝分かれさせていくことにより分かりやすく図解化する方式。\n情報を整理し、問題解決や状況把握につなげる業務分析方法の一つである。"},{"id":"ストラテジ系-100","category":"ストラテジ系","word":"疑似相関","meaning":"本当は因果関係がない2つの事柄が、第三の要因の影響によって関係しているように見える現象のこと。"},{"id":"ストラテジ系-101","category":"ストラテジ系","word":"箱ひげ図","meaning":"箱と線（ひげ）を使って、データの最大値・最小値・中央値・ばらつきを表すグラフである。"},{"id":"ストラテジ系-102","category":"ストラテジ系","word":"ヒストグラム","meaning":"度数分布表を棒グラフで表現したもので、収集したデータをいくつかの区間に分け、区間ごとに該当するデータの度数を棒グラフで示した図。"},{"id":"ストラテジ系-103","category":"ストラテジ系","word":"分割表","meaning":"2つ以上の項目の関係を表にまとめ、関連性を調べるための表である。"},{"id":"ストラテジ系-104","category":"ストラテジ系","word":"CSV","meaning":"データをコンマ（,）で区切って保存するテキスト形式のファイル。"},{"id":"ストラテジ系-105","category":"ストラテジ系","word":"チャートジャンク","meaning":"グラフを見るのに必要ない飾りやデザインのこと　例　3Dグラフ、派手な背景やイラスト、必要以上の色や影、過剰な装飾文字など。"},{"id":"ストラテジ系-106","category":"ストラテジ系","word":"母集団","meaning":"調査や分析の対象となる集団全体のこと。"},{"id":"ストラテジ系-107","category":"ストラテジ系","word":"有意水準","meaning":"設定した仮設が誤りであると判断する基準となる確率のこと。"},{"id":"ストラテジ系-108","category":"ストラテジ系","word":"統計的バイアス","meaning":"統計的な分析を行う際、データの収集や分析、解釈の過程で結果が真の実態から系統的にずれる現象。"},{"id":"ストラテジ系-109","category":"ストラテジ系","word":"BI","meaning":"企業の情報システムなどで蓄積される様々なデータを、利用者が自らの必要に応じて分析、加工し、業務や経営の意思決定に活用する手法。"},{"id":"ストラテジ系-110","category":"ストラテジ系","word":"ビッグデータ","meaning":"典型的なデータベースソフトウェアが把握し、蓄積し、運用し、分析できる能力を超えたサイズのデータを指す言葉。"},{"id":"ストラテジ系-111","category":"ストラテジ系","word":"データサイエンティスト","meaning":"ビッグデータなどの大量のデータを数学的に、統計学的、機械学習、データマイニングなどの様々な手法を駆使して分析し、\nビジネス上の課題の解決を支援する職種のこと。"},{"id":"ストラテジ系-112","category":"ストラテジ系","word":"ブレーンストーミング","meaning":"様々なアイデアを幅広く集めるために行われる討議方法。"},{"id":"ストラテジ系-113","category":"ストラテジ系","word":"売上総利益","meaning":"売上高から売上原価を差し引いた金額のこと。         (売上総利益＝売上高－売上原価)"},{"id":"ストラテジ系-114","category":"ストラテジ系","word":"損益分岐点","meaning":"利益も損失も出ない売上。"},{"id":"ストラテジ系-115","category":"ストラテジ系","word":"貸借対照表","meaning":"会社の財産・借金・純資産を表す書類。"},{"id":"ストラテジ系-116","category":"ストラテジ系","word":"株主資本等変動計算書","meaning":"純資産が1年間でどう変わったかを示す書類。"},{"id":"ストラテジ系-117","category":"ストラテジ系","word":"総勘定元帳","meaning":"仕訳を勘定科目ごとにまとめた帳簿。"},{"id":"ストラテジ系-118","category":"ストラテジ系","word":"適格請求等保存方式","meaning":"消費税の仕入税額控除のために、インボイスを保存する制度。"},{"id":"ストラテジ系-119","category":"ストラテジ系","word":"営業利益","meaning":"本業で得た利益。売上総利益 - 販売費及び一般管理費（販管費） = 営業利益"},{"id":"ストラテジ系-120","category":"ストラテジ系","word":"変動費","meaning":"売上や生産量によって増減する費用。"},{"id":"ストラテジ系-121","category":"ストラテジ系","word":"損益計算書","meaning":"会社の決算書の1つで、一会計期間の売上金額と、それに対応する費用の金額、および企業活動によって得られた利益などの経営成績を表したもの。"},{"id":"ストラテジ系-122","category":"ストラテジ系","word":"連結財務諸表","meaning":"大企業が決算書を作成するときに、株式を保有する子会社や関連会社などのグループ会社の業績を総計して作成する財務諸表のこと。"},{"id":"ストラテジ系-123","category":"ストラテジ系","word":"ROE","meaning":"自己資本でどれだけ利益を出したかを表す指標。当期純利益/自己資本*100"},{"id":"ストラテジ系-124","category":"ストラテジ系","word":"経常利益","meaning":"本業と営業外を合わせた、会社の通常の利益。"},{"id":"ストラテジ系-125","category":"ストラテジ系","word":"固定費","meaning":"売上や生産量に関係なく、毎月ほぼ一定でかかる費用。"},{"id":"ストラテジ系-126","category":"ストラテジ系","word":"キャッシュフロー計算書","meaning":"会社のお金の流れを表す書類。"},{"id":"ストラテジ系-127","category":"ストラテジ系","word":"流動比率","meaning":"短期間の支払い能力を表す指標。流動資産/流動負債*100"},{"id":"ストラテジ系-128","category":"ストラテジ系","word":"ROI","meaning":"投資したお金でどれだけ利益を得たかを表す指標。投資収益率"},{"id":"ストラテジ系-129","category":"ストラテジ系","word":"著作権法","meaning":"小説・音楽・絵・写真・プログラムなどの著作物を保護する法律。創作した時点で権利が発生し、登録は不要。著作者の死後70年間保護される"},{"id":"ストラテジ系-130","category":"ストラテジ系","word":"特許法","meaning":"発明を保護する法律。出願・審査・登録が必要。出願から20年間保護される。"},{"id":"ストラテジ系-131","category":"ストラテジ系","word":"ビジネスモデル特許","meaning":"ITを活用した新しいビジネスの仕組みに関する発明の特許。ビジネスのアイデアだけではなく、技術的な発明であることが必要。"},{"id":"ストラテジ系-132","category":"ストラテジ系","word":"実用新案法","meaning":"物品の形状・構造・組合せの考案を保護する法律。特許より簡単な発明が対象。出願から10年間保護。"},{"id":"ストラテジ系-133","category":"ストラテジ系","word":"意匠法","meaning":"**物品や画面などのデザイン（意匠）**を保護する法律。出願・登録が必要。出願から25年間保護。"},{"id":"ストラテジ系-134","category":"ストラテジ系","word":"商標法","meaning":"商品名・サービス名・ロゴ・マークなど、他社の商品と区別するための目印を保護する法律。登録が必要。"},{"id":"ストラテジ系-135","category":"ストラテジ系","word":"トレードマーク","meaning":"商品に付ける商標。商品を他社と区別するために使う。"},{"id":"ストラテジ系-136","category":"ストラテジ系","word":"サービスマーク","meaning":"サービスに付ける商標。サービス提供者を区別するために使う。"},{"id":"ストラテジ系-137","category":"ストラテジ系","word":"不正競争防止法","meaning":"商品の模倣、営業秘密の不正取得、ブランドのただ乗りなど公正な競争を妨げる行為を禁止する法律。"},{"id":"ストラテジ系-138","category":"ストラテジ系","word":"営業秘密","meaning":"秘密として管理され・有用で・公然と知られていない技術や営業情報。3つの要件（秘密管理性・有用性・非公知性）が重要。"},{"id":"ストラテジ系-139","category":"ストラテジ系","word":"限定提供データ","meaning":"限定された相手に継続して提供される価値のあるデータ。不正取得などは不正競争防止法で保護される。"},{"id":"ストラテジ系-140","category":"ストラテジ系","word":"ボリュームライセンス契約","meaning":"企業や学校などが複数台のPCでソフトウェアを利用するための包括契約。"},{"id":"ストラテジ系-141","category":"ストラテジ系","word":"サイトライセンス契約","meaning":"特定の事業所や学校など1つの拠点で利用を認めるライセンス契約。"},{"id":"ストラテジ系-142","category":"ストラテジ系","word":"CAL","meaning":"サーバに接続する利用者または端末ごとに必要なライセンス。User CALとDevice CALがある。"},{"id":"ストラテジ系-143","category":"ストラテジ系","word":"フリーソフトウェア","meaning":"無料で利用できるソフトウェア。無料でも著作権はあるため、利用条件を守る必要がある。"},{"id":"ストラテジ系-144","category":"ストラテジ系","word":"シェアウェア","meaning":"一定期間や機能限定で試用でき、継続利用する場合は料金を支払うソフトウェア。"},{"id":"ストラテジ系-145","category":"ストラテジ系","word":"パブリックドメインソフトウェア","meaning":"著作権が放棄または消滅しており、原則として自由に利用・改変・配布できるソフトウェア。"},{"id":"ストラテジ系-146","category":"ストラテジ系","word":"アクティベーション","meaning":"ソフトウェアが正規ライセンスであることを認証し、不正利用を防ぐ仕組み。"},{"id":"ストラテジ系-147","category":"ストラテジ系","word":"サブスクリプション","meaning":"月額・年額など定額料金を支払って利用する契約方式。契約中のみ利用できることが多い。"},{"id":"ストラテジ系-148","category":"ストラテジ系","word":"クロスライセンス","meaning":"企業同士がお互いの特許権などを利用できるようにする契約。特許紛争の回避にも利用される。"},{"id":"ストラテジ系-149","category":"ストラテジ系","word":"サイバーセキュリティ基本法","meaning":"日本のサイバーセキュリティ対策の基本となる法律。国・地方公共団体・重要インフラ事業者などの責務を定めている。"},{"id":"ストラテジ系-150","category":"ストラテジ系","word":"不正アクセス禁止法","meaning":"他人のID・パスワードを無断で使用してシステムへアクセスすることや、他人のID・パスワードを不正に取得・保管・提供することなどを禁止する法律。"},{"id":"ストラテジ系-151","category":"ストラテジ系","word":"個人情報保護法","meaning":"個人情報の適正な取得・利用・管理を定めた法律。目的外利用や第三者提供には原則として本人の同意が必要。"},{"id":"ストラテジ系-152","category":"ストラテジ系","word":"個人情報取扱事業者","meaning":"個人情報データベース等を事業に利用している事業者。個人情報保護法の対象となり、安全管理措置などの義務がある。"},{"id":"ストラテジ系-153","category":"ストラテジ系","word":"個人情報保護委員会","meaning":"個人情報保護法を所管する国の独立機関。事業者への指導・勧告・命令などを行う。"},{"id":"ストラテジ系-154","category":"ストラテジ系","word":"個人識別符号","meaning":"1人を識別できる番号やデータ。例：マイナンバー、運転免許証番号、パスポート番号、顔・指紋・虹彩などの生体情報。"},{"id":"ストラテジ系-155","category":"ストラテジ系","word":"要配慮個人情報","meaning":"人種・信条・社会的身分・病歴・犯罪歴・障害・健康診断結果など、差別や偏見につながるおそれがある個人情報。取得には原則本人の同意が必要。"},{"id":"ストラテジ系-156","category":"ストラテジ系","word":"匿名加工情報","meaning":"個人を特定できないように加工し、元の個人情報に復元できないようにした情報。一定の条件で本人の同意なしに利用・提供できる。"},{"id":"ストラテジ系-157","category":"ストラテジ系","word":"オプトイン","meaning":"本人が事前に同意した場合のみメール配信や情報利用を行う方式。"},{"id":"ストラテジ系-158","category":"ストラテジ系","word":"オプトアウト","meaning":"本人が拒否しない限り利用・提供できる方式。本人が拒否すれば停止しなければならない。"},{"id":"ストラテジ系-159","category":"ストラテジ系","word":"マイナンバー法","meaning":"個人番号（12桁）の利用や管理を定めた法律。利用目的は社会保障・税・災害対策に限定される。"},{"id":"ストラテジ系-160","category":"ストラテジ系","word":"一般データ保護規則（GDPR）","meaning":"EUの個人データ保護規則。EU域内の個人データを扱う企業にも適用される場合がある。"},{"id":"ストラテジ系-161","category":"ストラテジ系","word":"忘れられる権利","meaning":"本人が一定条件のもとで個人データの削除を求められる権利。GDPRで認められている。"},{"id":"ストラテジ系-162","category":"ストラテジ系","word":"特定電子メール法","meaning":"広告・宣伝メールは原則オプトイン方式。送信者情報の表示や配信停止手段の提供も義務付けられている。"},{"id":"ストラテジ系-163","category":"ストラテジ系","word":"ウイルス作成罪","meaning":"正当な理由なくコンピュータウイルスを作成・提供・取得・保管することを処罰する犯罪。"},{"id":"ストラテジ系-164","category":"ストラテジ系","word":"システム管理基準","meaning":"経済産業省が策定した、企業が情報システムを適切に管理・運営するためのガイドライン。"},{"id":"ストラテジ系-165","category":"ストラテジ系","word":"サイバーセキュリティ経営ガイドライン","meaning":"経済産業省とIPAが策定。経営者が実施すべきサイバーセキュリティ対策を示したガイドライン。"},{"id":"ストラテジ系-166","category":"ストラテジ系","word":"情報セキュリティ管理基準","meaning":"経済産業省が策定した、情報セキュリティ管理体制の評価・構築のための基準。"},{"id":"ストラテジ系-167","category":"ストラテジ系","word":"サイバー・フィジカル・セキュリティ対策\nフレームワーク","meaning":"サイバー空間と現実空間が連携するシステムの安全性を確保するための指針。産業分野でのセキュリティ対策を体系的に示している。"},{"id":"ストラテジ系-168","category":"ストラテジ系","word":"労働基準法","meaning":"労働者を守るための基本的な法律。法定労働時間は1日8時間・週40時間。休憩・休日・残業などの基準も定める。"},{"id":"ストラテジ系-169","category":"ストラテジ系","word":"労働契約法","meaning":"労働者と使用者の労働契約の基本ルールを定めた法律。解雇権の濫用は無効とされる。"},{"id":"ストラテジ系-170","category":"ストラテジ系","word":"労働者派遣法","meaning":"派遣労働者の働き方や派遣事業のルールを定めた法律。派遣元・派遣先の責任などを規定する。"},{"id":"ストラテジ系-171","category":"ストラテジ系","word":"労働安全衛生法","meaning":"労働者の安全・健康を確保し、快適な職場環境をつくるための法律。健康診断の実施などを義務付ける。"},{"id":"ストラテジ系-172","category":"ストラテジ系","word":"労働施策総合推進法","meaning":"職場におけるパワーハラスメント防止措置などを事業者へ義務付ける法律。"},{"id":"ストラテジ系-173","category":"ストラテジ系","word":"36協定","meaning":"時間外労働（残業）や休日労働をさせる場合に、労使間で締結し、労働基準監督署へ届け出る協定。"},{"id":"ストラテジ系-174","category":"ストラテジ系","word":"フレックスタイム制","meaning":"一定期間の総労働時間を満たせば、始業・終業時刻を労働者が柔軟に決められる制度。"},{"id":"ストラテジ系-175","category":"ストラテジ系","word":"裁量労働制","meaning":"実際の労働時間ではなく、あらかじめ定めた時間働いたものとみなす制度。対象業務は法律で限定される。"},{"id":"ストラテジ系-176","category":"ストラテジ系","word":"守秘義務契約","meaning":"秘密情報を第三者へ漏らさないことを約束する契約。共同開発や取引開始前によく締結される。"},{"id":"ストラテジ系-177","category":"ストラテジ系","word":"特定商取引法","meaning":"通信販売・訪問販売などで消費者を守る法律。誇大広告の禁止やクーリング・オフ制度などを定める。"},{"id":"ストラテジ系-178","category":"ストラテジ系","word":"独占禁止法","meaning":"公正で自由な競争を守る法律。私的独占・不当な取引制限（カルテル）・不公正な取引方法などを禁止する。"},{"id":"ストラテジ系-179","category":"ストラテジ系","word":"特定デジタルプラットフォームの透明性及び\n公正性の向上に関する法律","meaning":"大規模なオンラインモールやアプリストアなどに対し、取引条件の開示や運営の透明性確保を求める法律。"},{"id":"ストラテジ系-180","category":"ストラテジ系","word":"中小受託取引適正化法","meaning":"発注事業者と受注事業者の取引を適正化し、中小企業・個人事業者を守る法律。下請法を引き継ぐ形で整備された。"},{"id":"ストラテジ系-181","category":"ストラテジ系","word":"資金決済法","meaning":"電子マネー・QRコード決済・資金移動業などのルールを定めた法律。利用者保護を目的とする。"},{"id":"ストラテジ系-182","category":"ストラテジ系","word":"金融商品取引法","meaning":"株式・債券など金融商品の公正な取引を目的とした法律。インサイダー取引や相場操縦などを禁止する。"},{"id":"ストラテジ系-183","category":"ストラテジ系","word":"製造物責任法（PL法）","meaning":"製品の欠陥により生命・身体・財産へ損害が生じた場合、製造業者などが損害賠償責任を負う法律。被害者は過失ではなく欠陥を証明する。"},{"id":"ストラテジ系-184","category":"ストラテジ系","word":"景品表示法","meaning":"うその広告や過大な景品で消費者を誤認させることを防ぐ法律。優良誤認表示・有利誤認表示を禁止する。"},{"id":"ストラテジ系-185","category":"ストラテジ系","word":"ステルスマーケティング","meaning":"広告であることを隠して宣伝する行為。現在は景品表示法で規制対象となっている。"},{"id":"ストラテジ系-186","category":"ストラテジ系","word":"コンプライアンス","meaning":"法令遵守。法律・規則・社会規範を守って企業活動を行うこと。"},{"id":"ストラテジ系-187","category":"ストラテジ系","word":"情報流通プラットフォーム対処法","meaning":"SNSや掲示板などでの誹謗中傷などの削除対応・迅速な救済手続きを事業者に求める法律。"},{"id":"ストラテジ系-188","category":"ストラテジ系","word":"ソーシャルメディアポリシー","meaning":"企業が従業員に対して定めるSNS利用ルールや情報発信の指針。"},{"id":"ストラテジ系-189","category":"ストラテジ系","word":"ネチケット","meaning":"インターネット上のマナーやルール（ネット＋エチケット）。"},{"id":"ストラテジ系-190","category":"ストラテジ系","word":"フェイクニュース","meaning":"事実でない情報をニュースのように見せて拡散する情報。"},{"id":"ストラテジ系-191","category":"ストラテジ系","word":"チェーンメール","meaning":"「転送しないと不幸になる」などと書かれた不安を煽って拡散させるメール。"},{"id":"ストラテジ系-192","category":"ストラテジ系","word":"ヘイトスピーチ","meaning":"特定の人種・民族などに対する差別的・侮辱的な発言。"},{"id":"ストラテジ系-193","category":"ストラテジ系","word":"エコーチェンバー","meaning":"同じ意見ばかりに囲まれ、自分の考えが強化される状態。"},{"id":"ストラテジ系-194","category":"ストラテジ系","word":"フィルターバブル","meaning":"アルゴリズムにより、自分に都合の良い情報だけが表示される状態。"},{"id":"ストラテジ系-195","category":"ストラテジ系","word":"デジタルタトゥー","meaning":"インターネット上に残り続ける消せない過去の情報・投稿の影響。"},{"id":"ストラテジ系-196","category":"ストラテジ系","word":"ファクトチェック","meaning":"情報が事実かどうかを検証・確認すること。"},{"id":"ストラテジ系-197","category":"ストラテジ系","word":"倫理的・法的・社会的な課題（ELSI）","meaning":"新技術（AI・遺伝子など）に対する倫理・法律・社会的影響の問題。"},{"id":"ストラテジ系-198","category":"ストラテジ系","word":"コーポレートガバナンス","meaning":"企業統治。経営の透明性を高め、不正を防ぐ仕組み。"},{"id":"ストラテジ系-199","category":"ストラテジ系","word":"公益通報者保護法","meaning":"内部告発者（公益通報者）を解雇・不利益扱いから保護する法律。"},{"id":"ストラテジ系-200","category":"ストラテジ系","word":"内部統制報告制度","meaning":"企業が財務報告の信頼性を確保するための内部統制を評価・報告する制度。"},{"id":"ストラテジ系-201","category":"ストラテジ系","word":"情報公開法","meaning":"行政機関が保有する情報について、国民が開示請求できる制度。"},{"id":"ストラテジ系-202","category":"ストラテジ系","word":"廃棄物処理法","meaning":"ごみの適正処理を定めた法律。不法投棄は禁止。"},{"id":"ストラテジ系-203","category":"ストラテジ系","word":"リサイクル法","meaning":"資源の再利用を促進する法律。家電リサイクル法などが代表例。"},{"id":"ストラテジ系-204","category":"ストラテジ系","word":"GX推進法","meaning":"脱炭素社会（グリーントランスフォーメーション）を推進するための法律。温室効果ガス削減と経済成長の両立を目的とする。"},{"id":"ストラテジ系-205","category":"ストラテジ系","word":"デファクトスタンダード","meaning":"事実上の標準。市場で広く使われた結果、標準として定着した規格（例：Windows、PDFなど）。"},{"id":"ストラテジ系-206","category":"ストラテジ系","word":"デジュレスタンダード","meaning":"法的・公式に認められた標準。ISOやJISなどのように正式に決められた規格。"},{"id":"ストラテジ系-207","category":"ストラテジ系","word":"フォーラム標準","meaning":"業界団体（フォーラム）が策定する標準規格。例：Bluetooth、USBなど。"},{"id":"ストラテジ系-208","category":"ストラテジ系","word":"JANコード","meaning":"日本の商品識別バーコード。13桁または8桁で構成される。"},{"id":"ストラテジ系-209","category":"ストラテジ系","word":"QRコード","meaning":"二次元バーコード。縦横の情報で大量データを格納可能。"},{"id":"ストラテジ系-210","category":"ストラテジ系","word":"ISBN","meaning":"書籍の識別番号。国・出版社・書籍ごとに割り当てられる国際標準番号。"},{"id":"ストラテジ系-211","category":"ストラテジ系","word":"ISO","meaning":"国際標準化機構。国際的な標準規格を策定する組織。"},{"id":"ストラテジ系-212","category":"ストラテジ系","word":"IEC","meaning":"電気・電子分野の国際標準を扱う組織。"},{"id":"ストラテジ系-213","category":"ストラテジ系","word":"IEEE","meaning":"電気・電子・情報工学分野の国際標準化団体。"},{"id":"ストラテジ系-214","category":"ストラテジ系","word":"W3C","meaning":"Web技術の標準化団体（HTML・CSSなど）。"},{"id":"ストラテジ系-215","category":"ストラテジ系","word":"IETF","meaning":"インターネット技術の標準化団体（TCP/IPなど）。"},{"id":"ストラテジ系-216","category":"ストラテジ系","word":"JIS","meaning":"日本産業規格。日本国内の標準規格。"},{"id":"ストラテジ系-217","category":"ストラテジ系","word":"ISO 9000","meaning":"品質マネジメントシステムの国際規格。"},{"id":"ストラテジ系-218","category":"ストラテジ系","word":"ISO 14000","meaning":"環境マネジメントシステムの国際規格。"},{"id":"ストラテジ系-219","category":"ストラテジ系","word":"ISO 26000","meaning":"社会的責任（CSR）に関する国際ガイドライン。"},{"id":"ストラテジ系-220","category":"ストラテジ系","word":"ISO/IEC 27000","meaning":"情報セキュリティマネジメントシステム（ISMS）の国際規格群。"},{"id":"ストラテジ系-221","category":"ストラテジ系","word":"ISO/IEC 30414","meaning":"人的資本（人材情報）の開示に関する国際規格。"},{"id":"ストラテジ系-222","category":"ストラテジ系","word":"JIS Q 31000","meaning":"リスクマネジメントに関する日本の規格（ISO 31000対応）。"},{"id":"ストラテジ系-223","category":"ストラテジ系","word":"JIS Q 38500","meaning":"ITガバナンスに関する日本の規格（ISO/IEC 38500対応）。"},{"id":"ストラテジ系-224","category":"ストラテジ系","word":"SWOT分析","meaning":"自社の内部環境と外部環境を「強み・弱み・機会・脅威」の４つの視点で整理し、戦略策定に活用するフレームワーク"},{"id":"ストラテジ系-225","category":"ストラテジ系","word":"PPM","meaning":"「Product Portfolio Management（プロダクト・ポートフォリオマネジメント）」の略で、企業の製品や事業を戦略的に評価し、\n経営資源の最適配分を判断するマーケティング分析手法"},{"id":"ストラテジ系-226","category":"ストラテジ系","word":"VRIO分析","meaning":"企業の経営資源である人、モノ、カネ、情報、時間、知的財産などを、value,Rarity,Imitability,Organizationの４つである。"},{"id":"ストラテジ系-227","category":"ストラテジ系","word":"３C分析","meaning":"マーケティング分析に必要不可欠な3要素、顧客、自社、競合他社について自社の置かれている状況を分析する、内部環境分析の手法。"},{"id":"ストラテジ系-228","category":"ストラテジ系","word":"コアコンピタンス","meaning":"長年の企業活動により蓄積された他社と差別化できる、または競争力の中核となる企業独自のノウハウや技術のこと。"},{"id":"ストラテジ系-229","category":"ストラテジ系","word":"ニッチ戦略","meaning":"大企業が狙わないような小さな市場に経営資源を集中させ、その領域で独自の地位を築くアプローチ。"},{"id":"ストラテジ系-230","category":"ストラテジ系","word":"同質化戦略","meaning":"他社が新商品を投入してきた際に、あえて同じようなもの展開・模範することで他社の優位性を無力化すること。"},{"id":"ストラテジ系-231","category":"ストラテジ系","word":"レッドオーシャン戦略","meaning":"競争相手が多く、市場で価格やサービスの競争が激しく行われている市場のことをいう。"},{"id":"ストラテジ系-232","category":"ストラテジ系","word":"ブルーオーシャン戦略","meaning":"競争相手がいない未開拓の市場を自ら創り出し、新たな需要を創造することで利益を最大化する経済戦略。"},{"id":"ストラテジ系-233","category":"ストラテジ系","word":"アライアンス","meaning":"企業が共通目的のために協力する提携関係。不得意分野補完や投資リスク軽減が目的で、対等な立場で共同事業を行う点が特徴。"},{"id":"ストラテジ系-234","category":"ストラテジ系","word":"アウトソーシング","meaning":"自社業務を外部に委託すること。専門性活用でコスト削減できるが、社内にノウハウが残らない欠点もある。海外委託はオフショア。"},{"id":"ストラテジ系-235","category":"ストラテジ系","word":"M＆A","meaning":"他社を合併したり買収したりして、自社の経営資源を増やし、競争力を高める経営戦略。「合併（Merger）」と「買収（Acquisition）」の総称。"},{"id":"ストラテジ系-236","category":"ストラテジ系","word":"OEM","meaning":"発注元企業のブランド名で販売される製品を製造すること。また、そのような製品を製造する企業を指す。"},{"id":"ストラテジ系-237","category":"ストラテジ系","word":"ファブレス","meaning":"自社で工場（製造設備）を持たない企業形態のこと。自社では製品の企画・設計・開発を行い、製造は外部の会社に委託する。"},{"id":"ストラテジ系-238","category":"ストラテジ系","word":"フランチャイズチェーン","meaning":"本部と加盟店が契約を結び、共同でビジネスを展開する商業システム。商標、経営ノウハウを提供する。"},{"id":"ストラテジ系-239","category":"ストラテジ系","word":"MBO","meaning":"会社の経営陣が、自社の株を買い取って独立する仕組み。"},{"id":"ストラテジ系-240","category":"ストラテジ系","word":"EBO","meaning":"会社の従業員が、その会社の事業を買取り、経営権を取得する取引のこと。"},{"id":"ストラテジ系-241","category":"ストラテジ系","word":"TOB","meaning":"ある株式会社の株式等について(買付期間、買取り株数、価格)を公布し、不特定多数の株主から株式市場外で株式等を買い集める制度のこと。"},{"id":"ストラテジ系-242","category":"ストラテジ系","word":"規模の経済","meaning":"生産量が増加するほど生産単位当たりの費用が減少して、利益率が高まる傾向のこと。"},{"id":"ストラテジ系-243","category":"ストラテジ系","word":"経験曲線","meaning":"同一製品の累積生産量が増えるに従って、単位当たりの総コストが一定の割合で低下していくというパターンを示す曲線。"},{"id":"ストラテジ系-244","category":"ストラテジ系","word":"垂直統合","meaning":"企業が自社の製品やサービスの提供に必要な複数の工程や機能（調達、製品の開発、製造、販売、アフターサービス）を、自らの組織内に取り込む経営戦略のこと。"},{"id":"ストラテジ系-245","category":"ストラテジ系","word":"水平統合","meaning":"同じ業界や市場に属する企業が、同じ工程や機能を担う他の企業を買収・合併することによって、事業の拡大や事情競争力の強化を図る戦略のこと。"},{"id":"ストラテジ系-246","category":"ストラテジ系","word":"コモディティ化","meaning":"ある製品やカテゴリーについて、メーカーや販売会社ごとの機能的・品質的な差異がごくわずかとなり、一般的でありふれた存在になること。汎用品化とも呼ばれる。"},{"id":"ストラテジ系-247","category":"ストラテジ系","word":"ベンチマーキング(Benchmarking)","meaning":"自社の製品・サービス及びプロセスを定量的・定性的に測定し、それを業界で最も成功を収めている企業（ベスト企業）のものと比較し、\nそのギャップを把握する分析手法。"},{"id":"ストラテジ系-248","category":"ストラテジ系","word":"ロジスティクス(Logistics)","meaning":"原材料の調達から、生産・販売に至るまでの物の流れ（物流）を計画・管理・統制することで最適化する手段のこと。\n顧客ニーズに合わせて、必要なモノを最も少ない費用で顧客のもとに供給しようとする考え方。"},{"id":"ストラテジ系-249","category":"ストラテジ系","word":"カニバリゼーション","meaning":"カニバリゼーション (Cannibalization)     新しい商品が、同じ会社の古い商品の売上を奪うこと。"},{"id":"ストラテジ系-250","category":"ストラテジ系","word":"ESG投資","meaning":"ESG投資 (ESG Investing)     環境・社会・企業統治を重視して企業に投資すること。"},{"id":"ストラテジ系-251","category":"ストラテジ系","word":"ファイブフォース分析","meaning":"ファイブフォース分析 (Five Forces Analysis)     業界の競争の強さを5つの力で分析する方法。"},{"id":"ストラテジ系-252","category":"ストラテジ系","word":"UX","meaning":"ユーザーが製品やサービスを使ったときに感じる「体験」全体のこと。"},{"id":"ストラテジ系-253","category":"ストラテジ系","word":"CX","meaning":"お客様が企業と関わるすべての体験。良い体験は満足・信頼・リピーターにつながる。"},{"id":"ストラテジ系-254","category":"ストラテジ系","word":"カスタマージャーニーマップ","meaning":"顧客が商品やサービスを知ってから、購入・利用するまでの流れを時系列でまとめた図。"},{"id":"ストラテジ系-255","category":"ストラテジ系","word":"４P","meaning":"企業が商品やサービスを市場に提供する際に重要となる4つの要素。"},{"id":"ストラテジ系-256","category":"ストラテジ系","word":"４C","meaning":"顧客視点から商品やサービスを考えるためのフレームワークである。"},{"id":"ストラテジ系-257","category":"ストラテジ系","word":"RFM分析","meaning":"顧客の購買行動を、3つの指標で評価し、顧客の購買行動を定量的に分類·分析する手法。"},{"id":"ストラテジ系-258","category":"ストラテジ系","word":"アンゾフの成長マトリクス","meaning":"縦軸に「市場」、横軸に「製品」を取り、それぞれ「既存」「新規」の2区分を設け、4象限(市場浸透、製品開発、市場開拓、多角化)のマトリクスとしたもの。"},{"id":"ストラテジ系-259","category":"ストラテジ系","word":"オピニオンリーダー","meaning":"流行に敏感で、情報収集を自ら行い、判断する人。発言した意見や感想が顧客の購買行動に重要な影響を与える人々のことで、\n医薬品業界における著名教授、ファッション業界におけるモデルや芸能人などが挙げられる。"},{"id":"ストラテジ系-260","category":"ストラテジ系","word":"オムニチャネル","meaning":"販路として展開する実店舗、ECサイト、カタログ通販、モバイル端末などのシステムや仕組みをシームレスに連携·融合させ、\nどの方法でも同レベルの利便性で注文·購入できるようにした販売環境のこと。"},{"id":"ストラテジ系-261","category":"ストラテジ系","word":"ブランド戦略","meaning":"人々が企業や商品、サービスに対して抱く印象、信頼、価値などを表す。企業や商品、サービスが持つイメージや価値を市場に浸透させ、\n強豪との差別化を図るための計画的な取り組み"},{"id":"ストラテジ系-262","category":"ストラテジ系","word":"プロダクトライフサイクル","meaning":"導入期、成長期、成熟期、衰退期という順で推移していくと表現したモデル。"},{"id":"ストラテジ系-263","category":"ストラテジ系","word":"ポジショニング","meaning":"自社の競合相手がその業界や市場において、どのような立場にあるのかを認識することによって戦略を変える分析手法。\nリーダー、チャレンジャー、ニッチャー、フォロワー、に分類される。"},{"id":"ストラテジ系-264","category":"ストラテジ系","word":"セグメントマーケティング","meaning":"対象市場を分割（セグメント化）し、それぞれのセグメントに適したマーケティングを行うこと。"},{"id":"ストラテジ系-265","category":"ストラテジ系","word":"ダイレクトマーケティング","meaning":"対象として選ばれた見込み客や購入客である顧客(個人・企業)に対して個別に行われるマーケティング活動。"},{"id":"ストラテジ系-266","category":"ストラテジ系","word":"クロスメディアマーケティング","meaning":"テレビや新聞などのマスメディア、WEBサイト、メルマガ、紙のダイレクトメールなどのさまざまなメディアを組み合わせて行うマーケティング戦略。"},{"id":"ストラテジ系-267","category":"ストラテジ系","word":"インバウンドマーケティング","meaning":"SNSやフログ、Webサイトなどのインターネットメディアを通して発信を行い、\nそれらに興味を持って訪れた利用者を最終的に顧客に取り込もうとするマーケティング手法。"},{"id":"ストラテジ系-268","category":"ストラテジ系","word":"ロケーションベースマーケティング","meaning":"ユーザーの位置情報を活用し、最適な広告や情報を提供するマーケティング手法のこと。"},{"id":"ストラテジ系-269","category":"ストラテジ系","word":"ソーシャルマーケティング","meaning":"利益追求目的ではなく、社会的な課題の解決や福祉向上など、人々の行動を望ましい方向へと導くために行うマーケティング活動のこと。\n禁煙を促すキャンペーンや、リ"},{"id":"ストラテジ系-270","category":"ストラテジ系","word":"ワントゥワンマーケティング","meaning":"顧客一人一人の嗜好やニーズに合わせて個別に対応を変 化させて展開されるマーケティング活動のこと。"},{"id":"ストラテジ系-271","category":"ストラテジ系","word":"プッシュ戦略","meaning":"流通業者に何らかのインセンティブを提供して。自社製品を強力に販売させ、消費者に商品を提供するマーケティング戦略。"},{"id":"ストラテジ系-272","category":"ストラテジ系","word":"プル戦略","meaning":"製造業者が、広告・宣伝などにより消費者に直接働きかけ、消費者から流通業者に自社製品を取り扱うように仕向けるマーケティング戦略。"},{"id":"ストラテジ系-273","category":"ストラテジ系","word":"Ｗｅｂマーケティング","meaning":"オンラインショップやWebサイトを用いて行われるマーケティング活動の総称。\nブログやソーシャルメディア、スマホアプリを活用した手法やWeb広告なども範囲に含まれる。"},{"id":"ストラテジ系-274","category":"ストラテジ系","word":"インターネット広告","meaning":"インターネット上のWebサイトや電子メールに掲載される広告の総称のこと。"},{"id":"ストラテジ系-275","category":"ストラテジ系","word":"オプトインメール広告","meaning":"広告メールの配信に先立ち、広告メールを受け取ることを承諾（オプトイン）した受信者に対してだけ送信されるダイレクトメール型の広告のこと。\n配信されるジャンルを指定（承諾）した受信者に向けて行われるメール広告やメールマガジンを指すことが多い。"},{"id":"ストラテジ系-276","category":"ストラテジ系","word":"バナー広告","meaning":"webページ上で他のwebサイトを紹介する役割を持つ画像広告のこと"},{"id":"ストラテジ系-277","category":"ストラテジ系","word":"リスティング広告","meaning":"利用者が検索サイトに入力した検索キーワードに応じて、それに関する広告を検索結果画面に表示するサービス"},{"id":"ストラテジ系-278","category":"ストラテジ系","word":"ＳＥＯ","meaning":"webサイトを制作する時に、検索エンジンの検索で上位に表示されるようにページやサイト全体を最適化すること、またはそのための技術"},{"id":"ストラテジ系-279","category":"ストラテジ系","word":"アフェリエイト","meaning":"企業の広告を個人の所有するWebサイトに掲載し広告を載せているホームページの主に広告掲載の対価となる報酬を支払う仕組み"},{"id":"ストラテジ系-280","category":"ストラテジ系","word":"レコメンデーション","meaning":"顧客の購入履歴や利用履歴などのデータやその顧客が好みそうな商品やサービスを薦める仕組み"},{"id":"ストラテジ系-281","category":"ストラテジ系","word":"デジタルサイネージ","meaning":"デジタル技術を活用して平面ディスプレイやプロジェクターなどによって映像や情報を表示する広告媒体のこと"},{"id":"ストラテジ系-282","category":"ストラテジ系","word":"スキミングプライシング","meaning":"市場導入時にあえて高価格に設定し、最初から高い利益を獲得して投資回収を早期に行う価格戦略"},{"id":"ストラテジ系-283","category":"ストラテジ系","word":"ペネトレーションプライシング","meaning":"市場参戦時に、あえて競合他社よりも極めて低い価格を設定する価格戦略"},{"id":"ストラテジ系-284","category":"ストラテジ系","word":"ダイナミックプライシング","meaning":"需要と供給のバランスに応じて商品やサービスの価格をリアルタイムに変動させる価格戦略"},{"id":"ストラテジ系-285","category":"ストラテジ系","word":"リテールサポート","meaning":"卸売業者・メーカーが、商売店の経営活動を支援してその売り上げと利益を伸ばすことによって、自社との取引拡大につなげる方法。"},{"id":"ストラテジ系-286","category":"ストラテジ系","word":"クロスセリング","meaning":"単一の商品だけでなく、その商品に関連する別の商品や組み合わせ商品を薦めることで、購入品目を増加させ、結果として売り上げの拡大を目指すマーケティング手法。"},{"id":"ストラテジ系-287","category":"ストラテジ系","word":"バスケット分析","meaning":"顧客が買い物をする際にバスケット（買い物かご）の中に何が入ってるか何と何が一緒に買われているかを分析する手法。"},{"id":"ストラテジ系-288","category":"ストラテジ系","word":"バランススコアカード","meaning":"財務、顧客、業務プロセス、学習と成長の4つの視点から、企業の戦略や業務を評価、管理する手法"},{"id":"ストラテジ系-289","category":"ストラテジ系","word":"CSF","meaning":"経営戦略やITガバナンスなどを計画的に実施する際、その目標を達成する上で決定的な要因を与える要因のこと"},{"id":"ストラテジ系-290","category":"ストラテジ系","word":"KGI","meaning":"組織やプロジェクトが達成すべき目標を指し示す定量的な指標"},{"id":"ストラテジ系-291","category":"ストラテジ系","word":"KPI","meaning":"目標を達成するために、仕事や活動がどれくらい進んでいるかを数字で確認するための指標。"},{"id":"ストラテジ系-292","category":"ストラテジ系","word":"バリューエンジニアリング","meaning":"製品やサービスの価値を高めながら、コストをできるだけ抑える手法。"},{"id":"ストラテジ系-293","category":"ストラテジ系","word":"GROWモデル","meaning":"目標達成や課題解決のために、目標→現状→選択肢→行動の順に整理して考えるコーチング手法。"},{"id":"ストラテジ系-294","category":"ストラテジ系","word":"KPIツリー","meaning":"目標を達成するために必要な指標（KPI）をツリー状に分解して整理する方法。\n最終目標を一番上に置き、「何を改善すれば目標を達成できるか」を順番に細かく分けていく。"},{"id":"ストラテジ系-295","category":"ストラテジ系","word":"SMART","meaning":"効果的な目標を立てるための5つのポイントを表したフレームワーク。\n* S（Specific）：具体的である\n* M（Measurable）：数字などで測定できる\n* A（Achievable）：現実的に達成できる\n* R（Relevant）：目的に合っている\n* T（Time-bound）：期限が決まっている"},{"id":"ストラテジ系-296","category":"ストラテジ系","word":"SECI","meaning":"組織の中で知識を共有し、新しい知識を生み出す流れを表した考え方"},{"id":"ストラテジ系-297","category":"ストラテジ系","word":"CRM","meaning":"顧客との良い関係を築き、リピーターを増やすための仕組み・考え方"},{"id":"ストラテジ系-298","category":"ストラテジ系","word":"バリューチェーンマネジメント","meaning":"商品やサービスができてから顧客に届くまでの流れを改善して、価値を高めること"},{"id":"ストラテジ系-299","category":"ストラテジ系","word":"SCM","meaning":"商品の仕入れから販売までの流れを管理して、無駄や在庫を減らすこと"},{"id":"ストラテジ系-300","category":"ストラテジ系","word":"TQC","meaning":"全社員で品質を良くする活動"},{"id":"ストラテジ系-301","category":"ストラテジ系","word":"TQM","meaning":"会社全体で品質を高める考え方"},{"id":"ストラテジ系-302","category":"ストラテジ系","word":"ERP","meaning":"会社のお金・人・モノ・情報をまとめて管理するシステム"},{"id":"ストラテジ系-303","category":"ストラテジ系","word":"シックスシグマ","meaning":"データ分析で不良やミスを極限まで減らす品質改善手法"},{"id":"ストラテジ系-304","category":"ストラテジ系","word":"ナレッジマネジメント","meaning":"知識を共有・活用し業績アップを図る手法"},{"id":"ストラテジ系-305","category":"ストラテジ系","word":"TOC","meaning":"制約を改善し業績アップを図る手法"},{"id":"ストラテジ系-306","category":"ストラテジ系","word":"MOT","meaning":"技術をうまく活用して、会社の成長や利益につなげるための経営"},{"id":"ストラテジ系-307","category":"ストラテジ系","word":"プロセスイノベーション","meaning":"仕事のやり方や作り方を改善して、より効率よくすること"},{"id":"ストラテジ系-308","category":"ストラテジ系","word":"プロダクトイノベーション","meaning":"新しい商品やサービスを生み出したり、今ある商品をより良くしたりすること"},{"id":"ストラテジ系-309","category":"ストラテジ系","word":"技術ロードマップ","meaning":"技術や製品の未来予測を時間軸で整理した図"},{"id":"ストラテジ系-310","category":"ストラテジ系","word":"オープンイノベーション","meaning":"異なる企業や大学、研究機関などが、お互いの知識・技術・アイデアを共有して、新しい製品やサービス、技術を生み出すことです。"},{"id":"ストラテジ系-311","category":"ストラテジ系","word":"魔の川","meaning":"研究で生まれた技術が“製品開発へ進めず止まってしまう”最初の大きな壁のことです。"},{"id":"ストラテジ系-312","category":"ストラテジ系","word":"死の谷","meaning":"研究で新しい技術を開発しても、製品化できない壁"},{"id":"ストラテジ系-313","category":"ストラテジ系","word":"ダーウィンの海","meaning":"新しい製品を販売しても、市場で生き残るのが難しいこと"},{"id":"ストラテジ系-314","category":"ストラテジ系","word":"ハッカソン","meaning":"プログラマーやデザイナーなどがチームを組み、短期間でアプリやサービスを開発するイベント"},{"id":"ストラテジ系-315","category":"ストラテジ系","word":"キャズム","meaning":"新商品が初期の利用者には売れても、一般の多くの人に広まるまでにある大きな壁"},{"id":"ストラテジ系-316","category":"ストラテジ系","word":"イノベーションのジレンマ","meaning":"成功した企業が今の製品の改良ばかりに力を入れ、新しい技術を持つ後発企業に負けてしまう現象"},{"id":"ストラテジ系-317","category":"ストラテジ系","word":"デザイン思考","meaning":"利用者（ユーザー）の気持ちを考えながら、問題を解決する方法"},{"id":"ストラテジ系-318","category":"ストラテジ系","word":"ペルソナ法","meaning":"具体的な架空のユーザーを設定して、ユーザー目線で開発する手法。"},{"id":"ストラテジ系-319","category":"ストラテジ系","word":"PoC","meaning":"本格導入の前に「本当に使えるか」を試す実験。"},{"id":"ストラテジ系-320","category":"ストラテジ系","word":"PoV","meaning":"製品やサービスに本当に価値があるかを確認すること。"},{"id":"ストラテジ系-321","category":"ストラテジ系","word":"バックキャスティング","meaning":"未来の目標から逆算して今やることを考える方法。"},{"id":"ストラテジ系-322","category":"ストラテジ系","word":"ビジネスキャンパス","meaning":"ビジネスの仕組みを9つの要素で整理するフレームワーク。"},{"id":"ストラテジ系-323","category":"ストラテジ系","word":"リーンスタートアップ","meaning":"少ないコストで「作る・試す・改善する」を繰り返す開発手法。"},{"id":"ストラテジ系-324","category":"ストラテジ系","word":"APIエコノミー","meaning":"APIを活用して企業同士が連携し、新しいサービスや価値を生み出す仕組み。"},{"id":"ストラテジ系-325","category":"ストラテジ系","word":"ベンチャーキャピタル","meaning":"成長が期待できる未上場企業に投資・支援する会社。"},{"id":"ストラテジ系-326","category":"ストラテジ系","word":"コーポレートベンチャーキャピタル","meaning":"会社が自社の成長のためにスタートアップへ投資すること。"},{"id":"ストラテジ系-327","category":"ストラテジ系","word":"デルファイ法","meaning":"専門家の意見を何度も集めて未来を予測する方法。"},{"id":"ストラテジ系-328","category":"ストラテジ系","word":"POS","meaning":"商品が売れた情報をリアルタイムで管理する仕組み。"},{"id":"ストラテジ系-329","category":"ストラテジ系","word":"GPS","meaning":"人工衛星を使って現在地を調べる仕組み。"},{"id":"ストラテジ系-330","category":"ストラテジ系","word":"GIS","meaning":"地図と位置情報を管理・分析するシステム。"},{"id":"ストラテジ系-331","category":"ストラテジ系","word":"ITS","meaning":"ICTを使って、安全で効率の良い交通を実現するシステム。"},{"id":"ストラテジ系-332","category":"ストラテジ系","word":"ETC","meaning":"ICTを使って、安全でスムーズな交通を実現するシステム。"},{"id":"ストラテジ系-333","category":"ストラテジ系","word":"RFID","meaning":"電波を使って物の情報を読み取る技術。"},{"id":"ストラテジ系-334","category":"ストラテジ系","word":"セルフレジ","meaning":"お客さんが自分で会計をするレジ。"},{"id":"ストラテジ系-335","category":"ストラテジ系","word":"SFA","meaning":"営業活動を管理・効率化するシステム。"},{"id":"ストラテジ系-336","category":"ストラテジ系","word":"CTI","meaning":"電話とコンピュータを連携して、顧客対応を効率化するシステム。"},{"id":"ストラテジ系-337","category":"ストラテジ系","word":"トレーサビリティ","meaning":"商品の流れを追跡・確認できる仕組み。"},{"id":"ストラテジ系-338","category":"ストラテジ系","word":"スマートグリッド","meaning":"ICTを使って電気を効率よく管理する次世代の電力網。"},{"id":"ストラテジ系-339","category":"ストラテジ系","word":"CDN","meaning":"Webサイトを高速・安定して配信する仕組み。"},{"id":"ストラテジ系-340","category":"ストラテジ系","word":"デジタルツイン(Digital Twin)","meaning":"各種センサーから得た情報を用いて、デジタル上に現実世界を忠実かつリアルタイムに再現すること。現実世界の双子（Twin）のイメージでこの名称が付いている。"},{"id":"ストラテジ系-341","category":"ストラテジ系","word":"サイバーフィジカルシステム(Cyber Physical System)","meaning":"サイバー空間（仮想空間）とフィジカル空間（現実空間）を高度に融合させたシステムのこと。"},{"id":"ストラテジ系-342","category":"ストラテジ系","word":"デジタルガバメント(Digital Government)","meaning":"政府や自治体が、デジタル技術を活用して行政手続きを電子・オンライン化、データの利活用を推進して、\n国民一人ひとりのニーズに合った多様な幸せを実現する社会を目指す仕組み。"},{"id":"ストラテジ系-343","category":"ストラテジ系","word":"ガバメントクラウド(Government  Cloud)","meaning":"政府機関や地方自治体が利用するために設計・整備されたクラウドサービスのこと。"},{"id":"ストラテジ系-344","category":"ストラテジ系","word":"ベースレジストリ(Base Registry)","meaning":"公的などの機関で登録・公開される、社会や経済の基盤となるデータベースのこと。正式名称は「公的基礎情報データベース」。"},{"id":"ストラテジ系-345","category":"ストラテジ系","word":"マイナンバー","meaning":"国民の一人ひとりに固有の番号（個人番号）を付与する制度。個人番号は一般的には「マイナンバー」と呼ばれる。"},{"id":"ストラテジ系-346","category":"ストラテジ系","word":"マイナンバーカード","meaning":"本人確認や行政手続き、各種証明書の取得、オンライン申請などができ、将来的には健康保険証などとも一体化が進められているICカード。"},{"id":"ストラテジ系-347","category":"ストラテジ系","word":"マイナポータル","meaning":"マイナンバーカードを使って子育てや介護などの行政手続きや情報確認、お知らせの受け取りなどをオンラインでまとめて行える日本政府のサービス。"},{"id":"ストラテジ系-348","category":"ストラテジ系","word":"緊急速報","meaning":"地震や津波などの災害時に、被害の危険がある地域の人へ携帯電話などを通じて即座に警告を送る仕組み"},{"id":"ストラテジ系-349","category":"ストラテジ系","word":"Jアラート","meaning":"地震や津波、ミサイル攻撃などの緊急事態が発生した際に、国が全国の自治体や住民に瞬時に危険情報を伝えるための全国瞬時警報システム"},{"id":"ストラテジ系-350","category":"ストラテジ系","word":"DTP","meaning":"パソコンを使って文字や画像のレイアウトを作成し、チラシや雑誌などの印刷物を編集・制作する技術"},{"id":"ストラテジ系-351","category":"ストラテジ系","word":"AI","meaning":"人工知能の略で、言語理解、推論、問題解決などの人間の知能による活動を人間に代りって行うシステム。"},{"id":"ストラテジ系-352","category":"ストラテジ系","word":"人間中心のAI社会原則","meaning":"人口知能を利用する際に守るべき7個の原則\n（人間中心の原則、教育・リテラシーの原則、プライバシーの原則、セキュリティ確保の原則、公正競争確保の原則、公平性、説明責任及び透明性の原則、\nイノベーションの原則）を表す言葉である。"},{"id":"ストラテジ系-353","category":"ストラテジ系","word":"AI利活用ガイドライン","meaning":"AI利用に伴うリスクや留意点を踏まえ、事業者が安全かつ適切にAIを活用するための10の原則をまとめた手引きであり、\nリスク対策を事前に検討することで利用促進と関係者の保護を図ることを目的としている。"},{"id":"ストラテジ系-354","category":"ストラテジ系","word":"特化型AI","meaning":"AI(人工知能）のうち、特定の決まった作業を遂行するタイプのもので、自動運転技術、画像認証、将棋・チェス、会計の自動仕訳など、\n現時点で実用化されているAIは特化型AIである。"},{"id":"ストラテジ系-355","category":"ストラテジ系","word":"汎用AI","meaning":"AI（人工知能）のうち、特定の作業やタスクに限定せず、それ一つのシステムで人間のように様々な用途や分野の問題処理能力を持つものを言う。"},{"id":"ストラテジ系-356","category":"ストラテジ系","word":"AIアシスタント","meaning":"iPhoneの「Siri」、Androidの「Googleアシスタント」、Amazonの「Alexa」のように、音声による呼びかけに答えてくれるAI技術のこと。"},{"id":"ストラテジ系-357","category":"ストラテジ系","word":"生成AI","meaning":"AIが新しい文章や画像などを作り出す技術。"},{"id":"ストラテジ系-358","category":"ストラテジ系","word":"マルテモーダルAI","meaning":"文字・画像・音声など複数の情報を扱えるAI。"},{"id":"ストラテジ系-359","category":"ストラテジ系","word":"説明可能なAI","meaning":"AIの予測や判断の根拠を人間が理解できるように説明する技術のことであり、自動運転や医療診断などの普及に伴い、\nAIがブラックボックス化して信頼性が不透明だった従来の課題を解決し、現代社会で安全にAIを活用するための基盤として注目されています。"},{"id":"ストラテジ系-360","category":"ストラテジ系","word":"ヒューマンインザループ","meaning":"AIの途中や最後に人が確認・判断する仕組み。"},{"id":"ストラテジ系-361","category":"ストラテジ系","word":"ハルシネーション","meaning":"生成AIが利用者の問いかけに対し、あたかも真実であるかのように、的外れな情報や事実とは異なる不正確な情報を生成し回答する現象のこと。"},{"id":"ストラテジ系-362","category":"ストラテジ系","word":"ディープフェイク","meaning":"ディープラーニングによって学習した生成AIが作る、本物と見まごうほど精巧にできた偽の画像、動画、音声などの生成物のこと。"},{"id":"ストラテジ系-363","category":"ストラテジ系","word":"AIサービスのオプトアウトポリシー","meaning":"AIサービスにおいて、利用者が拒否の意思を示さない限り、入力した様々なデータはAIの学習データとして提供されるという方針のこと。"},{"id":"ストラテジ系-364","category":"ストラテジ系","word":"アルゴリズムのバイアス","meaning":"偏りのあるデータをAIに学習させてしまうことで、公平性のない偏った結果を算出してしまうことである。\n製造業で導入されている生産管理システムでコンピュータ統合生産のこと。"},{"id":"ストラテジ系-365","category":"ストラテジ系","word":"トロッコ問題","meaning":"究極の2択で倫理的な考え方を探る思考実験。"},{"id":"ストラテジ系-366","category":"ストラテジ系","word":"CAD","meaning":"コンピュータ支援設計とも呼ばれ、コンピュータを用いて製品の設計や図面の作成を行うシステム"},{"id":"ストラテジ系-367","category":"ストラテジ系","word":"CAM","meaning":"コンピュータ支援製造とも呼ばれ、CADで作られた設計データを基に、工作機械などの生産ラインを制御するプログラムを作成するシステム"},{"id":"ストラテジ系-368","category":"ストラテジ系","word":"CIM","meaning":"製造業で導入されている生産管理システムでコンピュータ統合生産のこと。\n製造の現場で発生する各種情報をコンピュータやネットワークを活用してシステムを構築、統括し、生産性を向上させることを目的としている。"},{"id":"ストラテジ系-369","category":"ストラテジ系","word":"コンカレントエンジニアリング","meaning":"製造業の製品開発において、設計から生産に至るまでの各工程を同時並行的に行うことで、開発期間や納期の短縮や生産の効率化などを進める手法。"},{"id":"ストラテジ系-370","category":"ストラテジ系","word":"シミュレーション","meaning":"模型や現実に近付けたモデルなどをコンピュータ上で模擬的に動かすことで、製品の性能・機能やそのモデルの変化を評価する方法"},{"id":"ストラテジ系-371","category":"ストラテジ系","word":"センシング技術","meaning":"センサーを用いて空間位置や時間、温度、音などを人間が扱いやすい情報に置き換え、計測・判別すること。"},{"id":"ストラテジ系-372","category":"ストラテジ系","word":"JIT","meaning":"トヨタ自動車の生産方式の代表的な要素で、必要なモノを、必要なときに、必要な量だけ生産すること。在庫の無駄をなくし生産を最適化する目的がある。"},{"id":"ストラテジ系-373","category":"ストラテジ系","word":"FMS","meaning":"NC工作機械、自動搬送装置、倉庫などを有機的に結合し、コンピュータで制御することで多品種少量生産に対応した生産自動化を実現するシステム。"},{"id":"ストラテジ系-374","category":"ストラテジ系","word":"MRP","meaning":"日本語では資材所要量計画と呼ばれ、部品表と生産計画をもとに必要な資材の所要量を求め、これを基準に在庫、発注、納入の管理を支援するシステム。"},{"id":"ストラテジ系-375","category":"ストラテジ系","word":"リーン生産方式","meaning":"日本のトヨタ自動車の生産方式をベースに5S・改善などを研究し、整理、一般化した理論体系にした生産管理手法のこと。\n生産工程に潜む無駄を徹底的に取り除くことを重視している。"},{"id":"ストラテジ系-376","category":"ストラテジ系","word":"かんばん方式","meaning":"トヨタ生産方式の代表的な要素である JIT を実現するための生産管理方式で、\"かんばん\"と呼ばれる伝票を工程間でやり取りする手法。\n工程内の仕掛品の最少化を図り、生産コストを削減することを目的とする。"},{"id":"ストラテジ系-377","category":"ストラテジ系","word":"ロングテール","meaning":"膨大な商品を低コストで扱うことができるインターネットを使った商品販売では、\n実店舗では陳列されないような販売機会の少ない商品であっても数多く取り揃えることで十分な売上を確保できるという経済理論。"},{"id":"ストラテジ系-378","category":"ストラテジ系","word":"フリーミアム","meaning":"フリー（無料）とプレミアム（割増料金）を合わせた造語で、基本的なサービス・製品は無料で提供し、\nさらに高度な機能や特別な機能については料金を課金する仕組み。"},{"id":"ストラテジ系-379","category":"ストラテジ系","word":"無店舗販売","meaning":"小売業の販売形態の１つで、店舗を持たずに商品を販売する販売方法。訪問販売、通信販売、自動販売機による販売、移動販売などがある。"},{"id":"ストラテジ系-380","category":"ストラテジ系","word":"EC","meaning":"消費者向けや企業間の商取引を，インターネットなどの電子的なネットワークを活用して行うこと。"},{"id":"ストラテジ系-381","category":"ストラテジ系","word":"O2O","meaning":"インターネットで情報を知った顧客が、実店舗に足を運んでくれるように誘導する販売戦略の総称。\n実店舗をもつ飲食店が、オンラインで割引クーポンを発行したり、SNSでタイムセールの告知をして来店や購入を促したりすることが行われている"},{"id":"ストラテジ系-382","category":"ストラテジ系","word":"OMO","meaning":"オンラインとオフラインの境界を感じさせない、一体化したサービスを提供することで、よりスムーズで利便性の高い顧客体験（CX）を実現する販売戦略のこと。"},{"id":"ストラテジ系-383","category":"ストラテジ系","word":"BtoC","meaning":"企業が一般消費者に対して商品やサービスを直接提供する取引形態のこと。"},{"id":"ストラテジ系-384","category":"ストラテジ系","word":"CtoC","meaning":"一般消費者同士が商品やサービスを直接やり取りする取引形態のこと"},{"id":"ストラテジ系-385","category":"ストラテジ系","word":"BtoE","meaning":"企業が自社の従業員を対象として提供する商品やサービス、情報システムなどを表す。"},{"id":"ストラテジ系-386","category":"ストラテジ系","word":"EDI","meaning":"異なる組織に設置されている端末間で、通信回線を介して取引のためのメッセージ(データ)を交換すること、およびそのための仕組み\nレベル1 - 情報伝達規約\nネットワーク回線や伝送手順など文字通り情報をやり取りするための取り決め\nレベル2 - 情報表現規約\nデータの構造やデータ項目など、表現法のルールなど情報データをお互いのコンピュータで理解できるようにするための取り決め\nレベル3 - 業務運用規約\nどんな情報をやり取りするか、情報の訂正方法やエラーの扱いなどの業務やシステムの運用に関する取り決め\nレベル4 - 取引基本規約\n検収時期、支払時期、支払方法などEDIにおける取引の法的有効性を確立するための取り決め"},{"id":"ストラテジ系-387","category":"ストラテジ系","word":"EFT","meaning":"紙幣や硬貨、手形、小切手などの受け渡しによらずに、コンピューターネットワークを通じて取引の決済や送金やなどに伴う資金移動を行うこと。銀行振込が代表例である。"},{"id":"ストラテジ系-388","category":"ストラテジ系","word":"キャッシュレス決済","meaning":"商品・サービスの対価の支払いに現金を使わない決済方法を指す。クレジットカードのほか、スマートフォンのキャリア決済や交通系ICカード、\nバーコードやQRコードを使った決済などが存在する。"},{"id":"ストラテジ系-389","category":"ストラテジ系","word":"フィンテック","meaning":"金融（Finance）と技術（Technology）を組み合わせた造語で、金融サービスと情報技術を結び付きにより生み出される、\nさまざまな革新的な動きを総称した言葉。身近な例では、スマートフォンなどを使った送金がその一つ"},{"id":"ストラテジ系-390","category":"ストラテジ系","word":"クラウドファンディング","meaning":"群衆（Crowd）と 資金調達（Funding）という言葉を組み合わせた造語で、インターネットを通じて不特定多数の賛同者から資金を集める仕組みのこと"},{"id":"ストラテジ系-391","category":"ストラテジ系","word":"NFT","meaning":"ブロックチェーン技術を活用したデジタル資産であり、唯一性および所有権の証明が可能なトークンのこと。"},{"id":"ストラテジ系-392","category":"ストラテジ系","word":"電子マーケットプレース","meaning":"Webサイトを通じて、売り手と買い手を結び付ける電子的な取引所のこと。"},{"id":"ストラテジ系-393","category":"ストラテジ系","word":"オンラインモール","meaning":"インターネットを通じて物品やサービスを販売するオンラインショップを集めたWebサイトのこと。"},{"id":"ストラテジ系-394","category":"ストラテジ系","word":"電子オークション","meaning":"インターネットサービスとして提供されるオークション。電子商取引の一つで、一般消費者同士が直接取引を行うCtoC型の取引の代表的な形態である。"},{"id":"ストラテジ系-395","category":"ストラテジ系","word":"インターネットバンキング","meaning":"インターネットを通して残高照会や振込、振替などの銀行のサービスが利用できるシステムのこと。"},{"id":"ストラテジ系-396","category":"ストラテジ系","word":"電子マネー","meaning":"企業によって提供される電子決済サービスのこと。クレジットカードや現金を使わずに買い物をしたり、\nインターネットを利用した電子商取引の決済手段として使われる。法的に位置づけられた通貨ではない"},{"id":"ストラテジ系-397","category":"ストラテジ系","word":"インターネットトレーディング","meaning":"インターネットを利用して株式等の取引をすること。取引に関する手続きのほとんどを証券会社などが専用に設けたWebサイトから行うため、\n窓口に出向いて行う取引や電話による取引よりも迅速で、手数料が安い。"},{"id":"ストラテジ系-398","category":"ストラテジ系","word":"エスクローサービス","meaning":"インターネットオークションなどで面識のない個人同士の取引を安全に行うために、第三者の立場にある企業が決済や商品の受け渡しを仲介するサービス。"},{"id":"ストラテジ系-399","category":"ストラテジ系","word":"クラウドソーシング","meaning":"群衆を意味するクラウド（Crowd）とソーシング（Sourcing）を合わせた造語。\n仕事を依頼したい企業と受注したい個人等をマッチングさせる場となるウェブサービスの名称"},{"id":"ストラテジ系-400","category":"ストラテジ系","word":"暗号資産","meaning":"暗号資産とは、ブロックチェーンという分散型台帳技術を基盤にして開発された、 物理的な実体を持たない デジタル通貨 のことです。"},{"id":"ストラテジ系-401","category":"ストラテジ系","word":"中央銀行発行デジタル通貨","meaning":"中央銀行発行デジタル通貨（Central Bank Digital Currency：CBDC） とは、各国の中央銀行が発行する デジタル形式の法定通貨 のことです。"},{"id":"ストラテジ系-402","category":"ストラテジ系","word":"アカウントアグリゲーション","meaning":"異なる銀行やクレジットカードなどの金融情報を、1つの画面にまとめて表示する仕組み"},{"id":"ストラテジ系-403","category":"ストラテジ系","word":"eKYC","meaning":"eKYC（電子本人確認） は、銀行・証券会社・スマホ決済サービスなどがオンラインで本人確認を行う仕組み のことです。"},{"id":"ストラテジ系-404","category":"ストラテジ系","word":"デビットカード","meaning":"買い物と同時に、自分の銀行口座からその場でお金が引き落とされるカード"},{"id":"ストラテジ系-405","category":"ストラテジ系","word":"IoT","meaning":"IoT（モノのインターネット） とは、家電・車・機械・建物などの「モノ」がインターネットにつながり、データを送受信したり自動で動作したりする仕組みのことです。"},{"id":"ストラテジ系-406","category":"ストラテジ系","word":"ドローン","meaning":"人が乗らずに、遠隔操作や自動プログラムで飛ぶことのできる無人の航空機"},{"id":"ストラテジ系-407","category":"ストラテジ系","word":"コネクテッドカー","meaning":"インターネットに常時接続している、走るスマホのような車"},{"id":"ストラテジ系-408","category":"ストラテジ系","word":"自動運転","meaning":"人間がハンドルやアクセルを操作しなくても、システムが代わりに判断して走る車"},{"id":"ストラテジ系-409","category":"ストラテジ系","word":"CASE","meaning":"自動車業界に今起きている４つの大変化の頭文字を並べた言葉　　C（ネットにつながる）　A（自動で走る）　S（みんなで分かち合う）　E（電気で動く）"},{"id":"ストラテジ系-410","category":"ストラテジ系","word":"MaaS","meaning":"MaaS（Mobility as a Service） とは、電車・バス・タクシー・自転車・車・飛行機など、さまざまな移動手段をデジタルでつなぎ、\n1つのサービスとして提供する仕組み のこと。"},{"id":"ストラテジ系-411","category":"ストラテジ系","word":"ワイヤレス給電","meaning":"ケーブルレスで電力を送電できる技術"},{"id":"ストラテジ系-412","category":"ストラテジ系","word":"クラウドサービス","meaning":"従来は利用者が手元のコンピュータで利用していたデータやソフトウェアを、インターネット経由でサービスとして利用者に提供するもの"},{"id":"ストラテジ系-413","category":"ストラテジ系","word":"スマートシティ","meaning":"最新の情報通信技術を利用して都市や地域が抱える課題を解決し、住民の生活の質を向上させる都市のこと"},{"id":"ストラテジ系-414","category":"ストラテジ系","word":"スマートファクトリー","meaning":"製造管理システムと生産機械やロボット同士をネットワークを通して連携させ、IoTやAI技術によるデータの可視化や分析により、\n生産ラインや華道の効率化を実現する「自ら考える賢い工場」"},{"id":"ストラテジ系-415","category":"ストラテジ系","word":"スマート農業","meaning":"ロボット技術やICTを活用して省力化、精密化を進めた次世代農場のこと"},{"id":"ストラテジ系-416","category":"ストラテジ系","word":"マシンビジョン","meaning":"産業用機械に搭載された「機械の目」によって対象物を認識し、決められた処理を行うシステム"},{"id":"ストラテジ系-417","category":"ストラテジ系","word":"HEMS","meaning":"HEMS（Home Energy Management System）家庭向けエネルギー管理システム 、家の中の電気・ガス・水道などのエネルギーを見える化して、\n節約・自動制御する仕組み のこと。"},{"id":"ストラテジ系-418","category":"ストラテジ系","word":"インダストリー４.０","meaning":"IoT、AI、ビッグデータなどを活用して製造業をデジタル化し、すべての工程をネットワークでつなぐドイツ発祥の国家プロジェクトです。"},{"id":"ストラテジ系-419","category":"ストラテジ系","word":"組込みシステム","meaning":"特定の機能を実現するために家電製品や機械に組み込まれるコンピュータシステムで、主にPC上で起動するソフトウェアと対比して使われる言葉"},{"id":"ストラテジ系-420","category":"ストラテジ系","word":"ロボティクス","meaning":"ロボット(人の代わりに作業を行う装置)に関する学問や研究のこと。"},{"id":"ストラテジ系-421","category":"ストラテジ系","word":"ファームウェア","meaning":"ハードウェアにROMなどの形で組み込まれ、そのハードウェアを制御するプログラムのこと。"},{"id":"ストラテジ系-422","category":"ストラテジ系","word":"エンタープライズサーチ","meaning":"インターネットの検索エンジンを利用するのと同じ感覚で、組織内に点在する大量の資料·データ群から目的のものを見つけるための企業内検索エンジンのこと。"},{"id":"ストラテジ系-423","category":"ストラテジ系","word":"EA","meaning":"EA（Enterprise Architecture：エンタープライズ・アーキテクチャ） とは企業や行政などの組織が、\n業務・データ・アプリケーション・ITインフラを体系的に整理し、最適化するための設計手法 のこと。"},{"id":"ストラテジ系-424","category":"ストラテジ系","word":"SoR","meaning":"SoR（System of Record ） とは、企業や組織が業務で使う 基幹システム（メインの業務システム） のこと。"},{"id":"ストラテジ系-425","category":"ストラテジ系","word":"SoE","meaning":"SoE（Sysytem of Engagement)　人とのつながりやコミュニケーションを大切にするシステム"},{"id":"ストラテジ系-426","category":"ストラテジ系","word":"DFD","meaning":"業務やデータの流れを図で表したもの。"},{"id":"ストラテジ系-427","category":"ストラテジ系","word":"BPMN","meaning":"業務の流れを統一ルールで表す図。"},{"id":"ストラテジ系-428","category":"ストラテジ系","word":"BPR","meaning":"業務を根本から見直して改善すること。"},{"id":"ストラテジ系-429","category":"ストラテジ系","word":"BPM","meaning":"業務を継続的に改善・管理する考え方。"},{"id":"ストラテジ系-430","category":"ストラテジ系","word":"ワークフローシステム","meaning":"仕事の流れや承認を電子化するシステム。"},{"id":"ストラテジ系-431","category":"ストラテジ系","word":"RPA","meaning":"パソコンの定型作業をソフトウェアロボットが自動化する技術。"},{"id":"ストラテジ系-432","category":"ストラテジ系","word":"BYOD","meaning":"自分のスマホやパソコンを、仕事や学校で使うこと"},{"id":"ストラテジ系-433","category":"ストラテジ系","word":"M2M","meaning":"機器同士が自動で通信する仕組"},{"id":"ストラテジ系-434","category":"ストラテジ系","word":"テレワーク","meaning":"ICTを活用し場所を選ばず働く勤務形態"},{"id":"ストラテジ系-435","category":"ストラテジ系","word":"グループウェア","meaning":"情報共有や共同作業を支援するソフト"},{"id":"ストラテジ系-436","category":"ストラテジ系","word":"ブログ","meaning":"記事を継続的に公開・発信する仕組み"},{"id":"ストラテジ系-437","category":"ストラテジ系","word":"チャット","meaning":"文字でリアルタイムに会話する機能"},{"id":"ストラテジ系-438","category":"ストラテジ系","word":"SNS","meaning":"インターネット上で人と交流し、情報を共有するサービス。    例：Instagram,twiter"},{"id":"ストラテジ系-439","category":"ストラテジ系","word":"シェアリングエコノミー","meaning":"モノやサービスをみんなで共有して使うシステム"},{"id":"ストラテジ系-440","category":"ストラテジ系","word":"ライフログ","meaning":"日々の食事や行動などを記録し、暮らしを可視化すること"},{"id":"ストラテジ系-441","category":"ストラテジ系","word":"情報銀行","meaning":"同意のもと購入履歴や健康状態などパーソナルデータを企業に提供し、対価(サービスやポイント)を還元してもらう仕組み"},{"id":"ストラテジ系-442","category":"ストラテジ系","word":"PDS","meaning":"自分自身の属性情報や行動履歴を自らの意思で一元管理し、安全に提供するための仕組み"},{"id":"ストラテジ系-443","category":"ストラテジ系","word":"アウトソーシング","meaning":"自社との業務の一部を外部の専門業者に委託すること"},{"id":"ストラテジ系-444","category":"ストラテジ系","word":"システムインテグレーション","meaning":"顧客の要望するコンピュータシステムの企画からシステム構築、運用、保守までに必要となる作業の一部、\nあるいはすべてを一貫して請け負う事業またはサービスのこと。"},{"id":"ストラテジ系-445","category":"ストラテジ系","word":"クラウドコンピューティング","meaning":"目的のコンピュータ処理を行うために、自社のシステム資源に代えてインターネット上のコンピュータ資源やサービスを利用するシステム形態"},{"id":"ストラテジ系-446","category":"ストラテジ系","word":"SaaS　（Software as a Service）","meaning":"サービス提供責任者が運用するソフトウェアをインターネット経由で利用するクラウドサービス"},{"id":"ストラテジ系-447","category":"ストラテジ系","word":"PaaS (Platform as a Service)","meaning":"事業者運用しているアプリケーションを稼働させるための基をサービスとして提供する"},{"id":"ストラテジ系-448","category":"ストラテジ系","word":"IaaS(Infrastructure as a Service)","meaning":"システムを横築するためのハードウェア資源をサービス形で提供クラウドサービス"},{"id":"ストラテジ系-449","category":"ストラテジ系","word":"DaaS（Desktop as a Service）","meaning":"個人デスクトップ環境をクラウド上で提供するサービス形態。仮想デスクトップサービスとも呼ばれる"},{"id":"ストラテジ系-450","category":"ストラテジ系","word":"パプリッククラウド","meaning":"クラウドサービスの形態の一つであり、クラウドサービスプロバイダが運営し、複数の企業や個人が共有して利用するクラウド環境のこと。"},{"id":"ストラテジ系-451","category":"ストラテジ系","word":"プライベートクラウド","meaning":"クラウドサービスの形態の一つであり、特定の企業や組織が専有し、独自に構築・運用するクラウド環境のこと。\nコストや、運用面での負担が大きく、資本力のある企業や、高度なセキュリティが求められる場面において利用される。"},{"id":"ストラテジ系-452","category":"ストラテジ系","word":"ハイブリッドクラウド","meaning":"クラウドサービスの形態の一つであり、多くの利用で共用されるパブリッククラウドと、特定の利用者が専有するプライベートクラウドを組み合わせた運用形態のこと。"},{"id":"ストラテジ系-453","category":"ストラテジ系","word":"マルチクラウド","meaning":"一つのパブリッククラウドに依存することなく、異なる パブリッククラウドのサービスを併用することで、シス テムの柔軟性や可用性の向上を図ることができる\nAmazon Web Services (AWS)、 Microsoft Az ure、Google Cloud Platform (GCP)"},{"id":"ストラテジ系-454","category":"ストラテジ系","word":"ASP（Application Service Provider）","meaning":"インターネット経由でサービスを提供する仕組みや事業者"},{"id":"ストラテジ系-455","category":"ストラテジ系","word":"ホスティングサービス","meaning":"事業者が自社施設のサーバを利用者に提供するサービス。利用者は運用・保守を任せられ管理コストを削減でき、代表例はレンタルサーバ。"},{"id":"ストラテジ系-456","category":"ストラテジ系","word":"ハウジングサービス","meaning":"顧客のサーバを通信事業者などの設備が整ったデータセンターに設置して預かるサービス。回線・空調・セキュリティ・障害対策を提供し、機器設置を委託できる。"},{"id":"ストラテジ系-457","category":"ストラテジ系","word":"オンプレミス","meaning":"情報システムを自社施設に設置し、自ら管理・運用する形態。他のクラウドや外部サービス利用と対比される自社運用方式。"},{"id":"ストラテジ系-458","category":"ストラテジ系","word":"マネージドサービス","meaning":"ITインフラやシステム運用を外部の専門業者（MSP）に委託するサービス。\n運用負担を減らし、監視・保守・セキュリティなどを専門家が担うことで安定稼働と効率化を図る。"},{"id":"ストラテジ系-459","category":"ストラテジ系","word":"SOA","meaning":"独立したサービスをネットワークで連携させてシステムを構築する方式。"},{"id":"ストラテジ系-460","category":"ストラテジ系","word":"ITリテラシー","meaning":"PCを利用して情報の整理・蓄積や分析などを行ったり、インターネットなどを使って情報を収集・発言したりするなどの、情報を取り扱う能力のこと。"},{"id":"ストラテジ系-461","category":"ストラテジ系","word":"ゲーミフィケーション","meaning":"日常の様々な活動にゲーム要素を仕掛けることで、サービスや製品への愛着を利用者にもたせ、より多く使用してもらう取り組みのこと。"},{"id":"ストラテジ系-462","category":"ストラテジ系","word":"デジタルディバイド","meaning":"パソコンやインターネットなどの情報通信技術を使いこなせる者と使いこなせない者の間に生じる、待遇や貧富、機会の格差のこと。"},{"id":"ストラテジ系-463","category":"ストラテジ系","word":"デジタルネイティブ","meaning":"生まれたときからインターネットやパソコン、スマートフォンなどのデジタル技術が身近にある環境で育った世代のこと。"},{"id":"ストラテジ系-464","category":"ストラテジ系","word":"レガシーシステム","meaning":"構築から長い時間が経過し、新しい技術を適用するのが困難化したシステムを指す言葉。"},{"id":"ストラテジ系-465","category":"ストラテジ系","word":"企画プロセス","meaning":"ソフトウェアライフサイクルプロセスにおける1番目のプロセス"},{"id":"ストラテジ系-466","category":"ストラテジ系","word":"要件定義プロセス","meaning":"ソフトウェアライフサイクルプロセスにおける2番目のプロセス"},{"id":"ストラテジ系-467","category":"ストラテジ系","word":"業務要件","meaning":"システムやソフトウェア開発の初期の工程で、(業務として何を実現したいのか)という、システム化の対象となる業務の流れを明確化したもの。"},{"id":"ストラテジ系-468","category":"ストラテジ系","word":"機能要件","meaning":"システムやソフトウェア開発に際して定義される要件のうち、機能に関するもの。"},{"id":"ストラテジ系-469","category":"ストラテジ系","word":"非機能要件","meaning":"業務要件を実現するためにシステムに求められる機能要件以外の要件のこと。"},{"id":"ストラテジ系-470","category":"ストラテジ系","word":"RFI","meaning":"企業が調達や業務委託をする場合や、初めての取引となる業者に対して情報の提供を依頼すること、または提出された文書のこと。"},{"id":"ストラテジ系-471","category":"ストラテジ系","word":"RFP","meaning":"情報システムの調達を予定している企業•組織が発注候補のITベンダに対して具体的なシステム提案を求めること。"},{"id":"ストラテジ系-472","category":"ストラテジ系","word":"グリーン調達","meaning":"品質や価格の要件を満たすだけでなく、環境負荷の少ない製品、サービスや環境負荷の低減に努める事業者から優先して購入する方針。"},{"id":"マネジメント系-1","category":"マネジメント系","word":"品質特性","meaning":"ソフトウェアに求められる品質のこと。代表的なものは機能適合性・性能効率性・互換性・使用性・信頼性・セキュリティ・保守性・移植性（ISO/IEC 25010）。"},{"id":"マネジメント系-2","category":"マネジメント系","word":"外部設計","meaning":"利用者から見える部分を設計する工程。画面レイアウト、入力・出力、帳票、操作方法などを決める。利用者の要求を反映する。"},{"id":"マネジメント系-3","category":"マネジメント系","word":"内部設計","meaning":"プログラマ向けの設計。データ構造、処理手順、モジュール構成、ファイル設計など、プログラム内部の仕組みを決める。"},{"id":"マネジメント系-4","category":"マネジメント系","word":"コーディング","meaning":"設計書をもとに、プログラミング言語でソースコードを書く作業。"},{"id":"マネジメント系-5","category":"マネジメント系","word":"コンパイラ","meaning":"ソースコード全体を一括で機械語に変換するソフトウェア。実行速度は速いが、実行前にコンパイルが必要。"},{"id":"マネジメント系-6","category":"マネジメント系","word":"ホワイトボックステスト","meaning":"プログラム内部の構造や処理の流れを確認しながら行うテスト。分岐や繰り返し処理が正しく動くかを確認する。"},{"id":"マネジメント系-7","category":"マネジメント系","word":"デバッグ","meaning":"プログラム中のバグ（誤り）を見つけて修正する作業。"},{"id":"マネジメント系-8","category":"マネジメント系","word":"コードレビュー","meaning":"作成したプログラムを他の開発者が確認し、バグや品質上の問題を見つける作業。"},{"id":"マネジメント系-9","category":"マネジメント系","word":"単体テスト","meaning":"1つのプログラム（モジュール）単位で行うテスト。最初に実施する。"},{"id":"マネジメント系-10","category":"マネジメント系","word":"結合テスト","meaning":"複数のモジュールを組み合わせ、モジュール同士が正しく連携するかを確認する。"},{"id":"マネジメント系-11","category":"マネジメント系","word":"システムテスト","meaning":"完成したシステム全体が要求どおりに動作するか確認する。"},{"id":"マネジメント系-12","category":"マネジメント系","word":"運用テスト","meaning":"本番環境に近い条件で、実際の運用に耐えられるかを確認する。"},{"id":"マネジメント系-13","category":"マネジメント系","word":"ブラックボックステスト","meaning":"プログラム内部を見ず、入力に対して期待どおりの出力になるかを確認するテスト。"},{"id":"マネジメント系-14","category":"マネジメント系","word":"回帰テスト","meaning":"プログラムを修正した後、修正した箇所以外にも影響が出ていないか確認するテスト。"},{"id":"マネジメント系-15","category":"マネジメント系","word":"受入れテスト","meaning":"発注者・利用者が行う最終確認。要求どおりのシステムになっているかを確認し、合格すれば納品となる。"},{"id":"マネジメント系-16","category":"マネジメント系","word":"ソフトウェア導入","meaning":"開発したシステムを実際の業務で利用開始すること。データ移行や利用者教育も含まれる。"},{"id":"マネジメント系-17","category":"マネジメント系","word":"ソフトウェア保守","meaning":"運用開始後にバグ修正・機能追加・性能改善などを行い、システムを維持・改善すること。"},{"id":"マネジメント系-18","category":"マネジメント系","word":"ファンクションポイント法","meaning":"システムの機能数や複雑さから開発規模を見積もる方法。プログラム言語に依存しない。"},{"id":"マネジメント系-19","category":"マネジメント系","word":"類推見積法","meaning":"過去の似た開発実績を参考に工数や費用を見積もる方法。"},{"id":"マネジメント系-20","category":"マネジメント系","word":"プログラムステップ法","meaning":"**ソースコードの行数（LOC）**を基準に開発規模を見積もる方法。"},{"id":"マネジメント系-21","category":"マネジメント系","word":"標準タスク法","meaning":"作業ごとに決められた標準作業時間を積み上げて工数を見積もる方法。"},{"id":"マネジメント系-22","category":"マネジメント系","word":"オブジェクト指向","meaning":"現実のモノや役割ごとに、データとその操作をひとまとめにして考える方法"},{"id":"マネジメント系-23","category":"マネジメント系","word":"データ中心アプローチ","meaning":"業務プロセスよりも「データ」を主役にしてシステム全体を設計する手法"},{"id":"マネジメント系-24","category":"マネジメント系","word":"プロセス中心アプローチ","meaning":"業務の流れや処理を中心に設計し、それに必要なデータを決める開発手法。"},{"id":"マネジメント系-25","category":"マネジメント系","word":"UML","meaning":"システムの設計や構造を図で表すための標準的な記法。"},{"id":"マネジメント系-26","category":"マネジメント系","word":"DevOps","meaning":"開発部門と運用部門が連携し、開発から運用までを効率化する考え方。"},{"id":"マネジメント系-27","category":"マネジメント系","word":"MLOps","meaning":"AI・機械学習システムの開発、運用、管理を効率よく行う仕組み。"},{"id":"マネジメント系-28","category":"マネジメント系","word":"ウォーターフォールモデル","meaning":"要件定義から運用までを順番に進め、前の工程には基本的に戻らない開発手法。"},{"id":"マネジメント系-29","category":"マネジメント系","word":"スパイラルモデル","meaning":"設計・開発・評価を繰り返しながら、少しずつ完成度を高める開発手法。"},{"id":"マネジメント系-30","category":"マネジメント系","word":"プロトタイピングモデル","meaning":"試作品を作り、利用者の意見を反映しながら開発を進める手法。"},{"id":"マネジメント系-31","category":"マネジメント系","word":"RAD","meaning":"短期間でシステムを開発する手法。ツールや部品を活用し、短いサイクルで開発する。小規模・短納期の開発に向いている。"},{"id":"マネジメント系-32","category":"マネジメント系","word":"リバースエンジニアリング","meaning":"既存のプログラムを解析し、設計書や仕様書を作成・復元すること。保守や改修時によく利用される。"},{"id":"マネジメント系-33","category":"マネジメント系","word":"アジャイル","meaning":"小さな単位で開発と改善を繰り返し、変化に柔軟に対応する開発手法。"},{"id":"マネジメント系-34","category":"マネジメント系","word":"ユーザーストーリー","meaning":"利用者が「何をしたいか」を利用者の立場で表した要求。"},{"id":"マネジメント系-35","category":"マネジメント系","word":"XP","meaning":"アジャイル開発の一種で、品質向上と変化への対応を重視する開発手法。"},{"id":"マネジメント系-36","category":"マネジメント系","word":"テスト駆動開発","meaning":"プログラムを書く前にテストを作成し、それに合わせて開発する手法。"},{"id":"マネジメント系-37","category":"マネジメント系","word":"ペアプログラム","meaning":"2人1組で、1人が作成・もう1人が確認しながら開発する方法。"},{"id":"マネジメント系-38","category":"マネジメント系","word":"リファクタリング","meaning":"プログラムの動作を変えずに、読みやすく保守しやすいコードへ改善すること。"},{"id":"マネジメント系-39","category":"マネジメント系","word":"継続的インテグレーション","meaning":"プログラムを頻繁に統合し、自動テストで早く不具合を見つける仕組み。"},{"id":"マネジメント系-40","category":"マネジメント系","word":"継続的デリバリー","meaning":"ソフトウェアをいつでもリリースできる状態を維持する仕組み。"},{"id":"マネジメント系-41","category":"マネジメント系","word":"スクラム","meaning":"短期間（スプリント）ごとに開発と改善を繰り返すアジャイル開発手法。"},{"id":"マネジメント系-42","category":"マネジメント系","word":"スクラムチーム","meaning":"プロダクトオーナー、スクラムマスター、開発者で構成されるチーム。"},{"id":"マネジメント系-43","category":"マネジメント系","word":"スクラムイベント","meaning":"スプリント、デイリースクラム、レビュー、振り返りなどの定例活動。"},{"id":"マネジメント系-44","category":"マネジメント系","word":"スクラムの作成物","meaning":"プロダクトバックログ、スプリントバックログ、インクリメントなどの成果物。"},{"id":"マネジメント系-45","category":"マネジメント系","word":"共通フレーム","meaning":"システム開発で共通して使われる作業や工程をまとめた標準。"},{"id":"マネジメント系-46","category":"マネジメント系","word":"CMMI","meaning":"ソフトウェア開発プロセスの成熟度を評価・改善するためのモデル。"},{"id":"マネジメント系-47","category":"マネジメント系","word":"ITサービスマネジメント","meaning":"ソフトウェア開発プロセスの成熟度を評価・改善するためのモデル。"},{"id":"マネジメント系-48","category":"マネジメント系","word":"ITIL","meaning":"ITサービスマネジメントのベストプラクティス（成功事例）をまとめたフレームワーク。"},{"id":"マネジメント系-49","category":"マネジメント系","word":"SLA","meaning":"サービス提供者と利用者の間で決めるサービス品質の合意（稼働率や対応時間など）。"},{"id":"マネジメント系-50","category":"マネジメント系","word":"SLO","meaning":"SLAで定めたサービス品質を維持・改善するための管理活動。"},{"id":"マネジメント系-51","category":"マネジメント系","word":"SLI","meaning":"SLIをもとに決める目標値。例：「稼働率99.9%以上」「応答時間1秒以内」。"},{"id":"マネジメント系-52","category":"マネジメント系","word":"SLM","meaning":"SLAで定めたサービス品質を維持・改善するための管理活動。"},{"id":"マネジメント系-53","category":"マネジメント系","word":"インシデント管理","meaning":"システム障害や問い合わせなど、サービスを正常な状態に早く戻すための管理。原因の究明よりも、まず復旧を優先する。"},{"id":"マネジメント系-54","category":"マネジメント系","word":"問題管理","meaning":"インシデントの根本原因を調査・分析し、再発防止を行う管理。インシデント管理とは目的が異なる。"},{"id":"マネジメント系-55","category":"マネジメント系","word":"構成管理","meaning":"サーバやソフトウェアなど、IT資産の構成情報を管理すること。変更時の影響を把握しやすくする。"},{"id":"マネジメント系-56","category":"マネジメント系","word":"変更管理","meaning":"システムの変更を計画・承認・実施・記録し、変更によるトラブルを防ぐ管理。"},{"id":"マネジメント系-57","category":"マネジメント系","word":"リリース及び展開管理","meaning":"新しいシステムや機能、修正版を安全に本番環境へ導入するための管理。"},{"id":"マネジメント系-58","category":"マネジメント系","word":"継続的改善","meaning":"改善を繰り返して、より良くしていくこと。"},{"id":"マネジメント系-59","category":"マネジメント系","word":"サービスデスク","meaning":"利用者からの問い合わせや障害報告を受け付ける窓口。インシデントの受付や対応を行う。"},{"id":"マネジメント系-60","category":"マネジメント系","word":"エスカレーション","meaning":"自分では対応できない問い合わせや障害を、上位の担当者や専門部署へ引き継ぐこと。サービスデスクでよく行われる対応。"},{"id":"マネジメント系-61","category":"マネジメント系","word":"FAQ","meaning":"利用者からよくある質問とその回答をまとめたもの。問い合わせ件数の削減に役立つ。"},{"id":"マネジメント系-62","category":"マネジメント系","word":"チャットボット","meaning":"AIやあらかじめ用意したルールを使って、利用者の質問に自動で回答するシステム。24時間対応でき、サービスデスクや問い合わせ窓口の負担軽減に役立つ。"},{"id":"マネジメント系-63","category":"マネジメント系","word":"AIOps","meaning":"AIを使ってITシステムの運用・管理を効率化する技術。"},{"id":"マネジメント系-64","category":"マネジメント系","word":"ファシリティマネジメント","meaning":"建物や設備を効率よく管理・運用すること。"},{"id":"マネジメント系-65","category":"マネジメント系","word":"UPS","meaning":"停電時に電気を供給し続ける装置。"},{"id":"マネジメント系-66","category":"マネジメント系","word":"ステークホルダー","meaning":"プロジェクトに関係する人や組織。発注者、利用者、開発者、経営者など。"},{"id":"マネジメント系-67","category":"マネジメント系","word":"プロジェクト","meaning":"開始日と終了日が決まった、一時的な業務。決められた期間・予算・品質の中で目標を達成することを目的とする。"},{"id":"マネジメント系-68","category":"マネジメント系","word":"プロジェクト憲章","meaning":"プロジェクトの目的・責任者・目標・予算などをまとめた文書。プロジェクト開始時に作成する。"},{"id":"マネジメント系-69","category":"マネジメント系","word":"WBS","meaning":"プロジェクト全体を作業単位まで細かく分解した図。作業漏れ防止やスケジュール管理に利用する。"},{"id":"マネジメント系-70","category":"マネジメント系","word":"アローダイアグラム","meaning":"作業の順序や依存関係を矢印で表した図。どの作業が遅れると全体が遅れるか分析できる。"},{"id":"マネジメント系-71","category":"マネジメント系","word":"ガントチャート","meaning":"横軸に日付、縦軸に作業を書き、棒グラフでスケジュールを表す図。進捗管理によく使われる。"},{"id":"マネジメント系-72","category":"マネジメント系","word":"PMBOK","meaning":"プロジェクトマネジメントの知識体系。プロジェクト管理の標準的な考え方をまとめたもの。"},{"id":"マネジメント系-73","category":"マネジメント系","word":"クリティカルパス分析","meaning":"全体の工期を決める**最も時間のかかる作業経路（クリティカルパス）**を求める手法。この経路上の作業が遅れると、プロジェクト全体が遅れる。"},{"id":"マネジメント系-74","category":"マネジメント系","word":"マイルストーン","meaning":"プロジェクトの重要な節目となる日やイベント。進捗確認の目印として設定する。"},{"id":"マネジメント系-75","category":"マネジメント系","word":"プル型コミュニケーション","meaning":"必要な人が自分から情報を取りに行く情報共有方法。例：社内ポータル、共有フォルダ、Wiki。"},{"id":"マネジメント系-76","category":"マネジメント系","word":"フリーアドレス","meaning":"社員ごとの固定席を設けず、空いている席を自由に利用する働き方。オフィスを有効活用でき、部署を超えた交流がしやすい。"},{"id":"マネジメント系-77","category":"マネジメント系","word":"サージ防護","meaning":"雷などによる瞬間的な高電圧（サージ）から機器を守る対策。SPD（サージ防護デバイス）やサージ対応タップを使用する。"},{"id":"マネジメント系-78","category":"マネジメント系","word":"システム監査","meaning":"情報システムが適切・安全・効率的に運用されているかを、第三者が客観的に評価すること。"},{"id":"マネジメント系-79","category":"マネジメント系","word":"情報セキュリティ監査","meaning":"情報セキュリティ対策が適切に実施されているかを監査すること。"},{"id":"マネジメント系-80","category":"マネジメント系","word":"システム監査基準","meaning":"システム監査を実施する際の基本的な基準や考え方をまとめた指針。"},{"id":"マネジメント系-81","category":"マネジメント系","word":"監査証拠","meaning":"監査結果を裏付けるための証拠。ログ、設計書、運用記録など。"},{"id":"マネジメント系-82","category":"マネジメント系","word":"監査調書","meaning":"監査で確認した内容や証拠を記録した文書。"},{"id":"マネジメント系-83","category":"マネジメント系","word":"システム監査報告書","meaning":"監査結果や改善提案をまとめた報告書。"},{"id":"マネジメント系-84","category":"マネジメント系","word":"フォローアップ","meaning":"監査報告書で指摘した改善事項について、被監査部門が適切に改善したかを確認する活動。監査人が自ら改善するのではなく、改善状況を確認・支援する。"},{"id":"マネジメント系-85","category":"マネジメント系","word":"内部統制","meaning":"会社が自らルールを作り、業務のミスや不正を防いで、目標を達成するための仕組み。経営者だけでなく、全社員が関わるもの"},{"id":"マネジメント系-86","category":"マネジメント系","word":"職務分掌（しょくむぶんしょう）","meaning":"業務の担当者を明確に分けること。例えば「お金を払う承認をする人」と「実際にお金を振り込む人」を別人にすることで、1人での不正やミスを防ぎます。"},{"id":"マネジメント系-87","category":"マネジメント系","word":"リスクコントロールマトリクス","meaning":"業務の中にどんなリスク（危険）があり、それをどうやって防ぐ（コントロールする）かを一覧にした対照表"},{"id":"マネジメント系-88","category":"マネジメント系","word":"レピュテーションリスク","meaning":"企業に対するネガティブな評判や口コミが広まることで、企業の信用やブランド価値が下がり、経営に大ダメージを受けるリスク"},{"id":"マネジメント系-89","category":"マネジメント系","word":"ITガバナンス","meaning":"企業が競争優位に立つために、経営陣が自らITをコントロールし、正しく活用するための仕組み"},{"id":"マネジメント系-90","category":"マネジメント系","word":"セキュリティワイヤ","meaning":"セキュリティワイヤを設置することで、ネットワーク経由での不正アクセスやウイルス感染を防ぐ"},{"id":"テクノロジ系-1","category":"テクノロジ系","word":"グラフ理論","meaning":"いくつかの頂点(ノード)とそれらの辺(エッジ)の集合で形成されるネットワーク構造を研究する数学の分野"},{"id":"テクノロジ系-2","category":"テクノロジ系","word":"回析帰分","meaning":"目的変数(結果となる数値)と説明変数(原因となる数値)の因果関係を表す関数式を求めること。"},{"id":"テクノロジ系-3","category":"テクノロジ系","word":"最適化問題","meaning":"与えられた制約条約を満たす解の中で、目的変数(結果となる数値)を最大または最小にする解を求める問題のこと。"},{"id":"テクノロジ系-4","category":"テクノロジ系","word":"尺度","meaning":"名義尺度と順序尺度は[質的データ]、間隔尺度と比例尺度は[量的データ]に分類される。"},{"id":"テクノロジ系-5","category":"テクノロジ系","word":"相関分析","meaning":"2つの要素間にある関係性を分析する手法である。1に近づくほど正の相関が強く、-1に近づくほど負の相関が強い。"},{"id":"テクノロジ系-6","category":"テクノロジ系","word":"目的変数","meaning":"予測したい変数。身長から体重を予測する場合、体重が目的変数になる。y=f(x)の関係はyが目的変数になる。"},{"id":"テクノロジ系-7","category":"テクノロジ系","word":"リスクマネジメント","meaning":"組織体の活動に発生するあらゆるリスクを、統合的、包括的戦略に把握、評価、最適化し、価値の最大化を図る手法。"},{"id":"テクノロジ系-8","category":"テクノロジ系","word":"情報セキュリティーポリシー","meaning":"組織の経営者が最終的な責任者となり[情報セキュリティに本格的に取り組む]姿勢を示し、\n情報セキュリティの目標と、その目標を達成するために企業がとるべき姿勢を社内外に宣言する文書"},{"id":"テクノロジ系-9","category":"テクノロジ系","word":"可用性","meaning":"情報セキュリティマネジメントに概念の一要素で、\n障害が発生しても安定したサービスを提供でき、ユーザーが必要場な時にシステムを利用可能である特性を示す。"},{"id":"テクノロジ系-10","category":"テクノロジ系","word":"否認防止","meaning":"情報セキュリティマネジメントの付加的な要素で、操作が行われた事実や発生した事象を証明でき、後になって否認されないようにする能力。"},{"id":"テクノロジ系-11","category":"テクノロジ系","word":"プライバシーマーク制度","meaning":"個人情報を適切に取り扱っている企業を公的機関が認定する制度。"},{"id":"テクノロジ系-12","category":"テクノロジ系","word":"情報セキュリティ委員会","meaning":"企業全体の情報セキュリティをマネジメントするために設置される、全社横断的な組織のこと。"},{"id":"テクノロジ系-13","category":"テクノロジ系","word":"コンピュータ不正アクセス届け出制度","meaning":"必要な情報を経済産業大臣が別に指定する者に届け出ることを定める。"},{"id":"テクノロジ系-14","category":"テクノロジ系","word":"ISMAP","meaning":"政府が情報システムを構築する際に、安全なクラウドサービスを選定するための制度のこと。"},{"id":"テクノロジ系-15","category":"テクノロジ系","word":"SECURITY ACTION","meaning":"中小企業が情報セキュリティ対策に取り組むことを宣言する制度。"},{"id":"テクノロジ系-16","category":"テクノロジ系","word":"2分木","meaning":"「枝分かれが2本以下（トーナメント表）」"},{"id":"テクノロジ系-17","category":"テクノロジ系","word":"キュー","meaning":"「先に入れた方が先に出る」FIFO"},{"id":"テクノロジ系-18","category":"テクノロジ系","word":"スタック","meaning":"「後から入れた方が先に出る」LIFO"},{"id":"テクノロジ系-19","category":"テクノロジ系","word":"リスト(List)","meaning":"「リスト ＝ ポインタ ＝ 追加・削除が得意」"},{"id":"テクノロジ系-20","category":"テクノロジ系","word":"木構造","meaning":"「階層・親子関係・フォルダ」＝ 木構造（子は親を1つしか持てない！）"},{"id":"テクノロジ系-21","category":"テクノロジ系","word":"2分探索法（バイナリサーチ）","meaning":"ソートされたデータを半分ずつ絞り込みながら目的の値を探す探索方法"},{"id":"テクノロジ系-22","category":"テクノロジ系","word":"クイックソート（Quick Sort）","meaning":"基準値（ピボット）を選び、 データを大小のグループに分けながら並べ替えていく ソート方法"},{"id":"テクノロジ系-23","category":"テクノロジ系","word":"バブルソート（Bubble Sort）","meaning":"\"隣り合う要素\"を比較し、 順序が逆なら入れ替えながら並べ替えていく ソート方法"},{"id":"テクノロジ系-24","category":"テクノロジ系","word":"線形探索法（リニアサーチ）","meaning":"データを先頭から順番に1つずつ比較して目的の値を探す探索方法"},{"id":"テクノロジ系-25","category":"テクノロジ系","word":"選択ソート(Selection Sort)","meaning":"データの中から最小（または最大）の要素を選び、先頭から順番に並べ替えていくソート方法"},{"id":"テクノロジ系-26","category":"テクノロジ系","word":"流れ図（フローチャート）","meaning":"プログラムや処理の手順や流れを、記号と矢印（→）を使って分かりやすく表した図"},{"id":"テクノロジ系-27","category":"テクノロジ系","word":"リスクアセスメント","meaning":"危険やリスクをし特定、その発生可能性や影響を評価する手法"},{"id":"テクノロジ系-28","category":"テクノロジ系","word":"機密性(CIA)","meaning":"許可された人だけが情報にアクセスできるように保護すること(機密性 = 見せない)"},{"id":"テクノロジ系-29","category":"テクノロジ系","word":"真正性（Authenticity）","meaning":"利用者や情報が正当なものであり、なりすましが行われていないことを確認すること"},{"id":"テクノロジ系-30","category":"テクノロジ系","word":"信頼性(Reality)","meaning":"システムや機器が故障せず、安定して正しく動作し続ける性質"},{"id":"テクノロジ系-31","category":"テクノロジ系","word":"プライバシーポリシー(Privacy Policy)","meaning":"企業や組織が、個人情報の収集・利用・管理方法について定めた方針"},{"id":"テクノロジ系-32","category":"テクノロジ系","word":"CSIRT","meaning":"コンピュータやネットワークのセキュリティ事故（インシデント）が発生した際に、対応・調査・復旧を行う組織"},{"id":"テクノロジ系-33","category":"テクノロジ系","word":"コンピュータウイルス届出制度","meaning":"コンピュータウイルスを発見した場合に、その情報を届け出て被害の拡大防止や対策に役立てる制度"},{"id":"テクノロジ系-34","category":"テクノロジ系","word":"J-CSIP","meaning":"IPAが運営する、サイバー攻撃の情報共有・分析によって被害の拡大防止を行うシステム"},{"id":"テクノロジ系-35","category":"テクノロジ系","word":"ニューラルネットワーク","meaning":"脳の構造を計算上のシミュレーションによって表現を目指した数学モデル　人工知能やディープラーニングなどに用いられる"},{"id":"テクノロジ系-36","category":"テクノロジ系","word":"ファインチューニング","meaning":"事前学習したAIモデルをベースに学習を追加し、目的となるタスクに適応できるようにする技術"},{"id":"テクノロジ系-37","category":"テクノロジ系","word":"プロンプトエンジニアリング","meaning":"生成AIに与えるプロンプト(指示)を最適化し、より精度の高い出力を得るための技術分野"},{"id":"テクノロジ系-38","category":"テクノロジ系","word":"演繹推論（えんえきすいろん）","meaning":"記述論理の一つ　大前提、小前提をふまえて結論へ導く、三段論法で推論を行う手法"},{"id":"テクノロジ系-39","category":"テクノロジ系","word":"過学習","meaning":"訓練データに対しては高精度、未知のデータに対しては弱い状態"},{"id":"テクノロジ系-40","category":"テクノロジ系","word":"再帰的ニューラルネットワーク","meaning":"過去の情報をもとにした時系列データの解析性能を向上させた深層学習モデル"},{"id":"テクノロジ系-41","category":"テクノロジ系","word":"クリアスクリーン","meaning":"PCの画面上からの情報漏洩を避けるために、画面上に情報を表示したままにしないよう求めるルール"},{"id":"テクノロジ系-42","category":"テクノロジ系","word":"ハイブリット暗号方式","meaning":"共通鍵暗号方式と公開鍵暗号方式を組み合わせたもの　共通鍵を公開鍵暗号方式で暗号化する"},{"id":"テクノロジ系-43","category":"テクノロジ系","word":"S/MIME","meaning":"電子メールソフトに公開鍵暗号方式を利用して「認証」「改ざん検出」「暗号化」の機能を提供する仕組み"},{"id":"テクノロジ系-44","category":"テクノロジ系","word":"リスクベース認証","meaning":"ログインなどの操作を行う際に、その行動のリスクの度合いを評価し、必要に応じて追加の認証手続きを求める仕組み"},{"id":"テクノロジ系-45","category":"テクノロジ系","word":"パスワードレス認証","meaning":"システムやサービスにログインする際に、従来のような文字列ではなくほかの手段（生体認証・パスキー）で本人確認を行う認証方法"},{"id":"テクノロジ系-46","category":"テクノロジ系","word":"シングルサインオン","meaning":"ユーザー認証を一度受けるだけで、許可された複数のサーバやアプリへのアクセスも認証する仕組み"},{"id":"テクノロジ系-47","category":"テクノロジ系","word":"生体認証","meaning":"人間の身体的な特徴や、行動の特性などの個人の固有の情報を用いて本人の認証を行う方式"},{"id":"テクノロジ系-48","category":"テクノロジ系","word":"PKI","meaning":"公開鍵が本人のものであるかCA(認証局)が審査し、公開鍵に対してデジタル証明書を発行することで保証を実現する仕組み"},{"id":"テクノロジ系-49","category":"テクノロジ系","word":"CRL","meaning":"有効期限内に 秘密鍵の漏洩、紛失、規則違反などの理由で失効したデジタル証明書が列挙された一覧表のこと"},{"id":"テクノロジ系-50","category":"テクノロジ系","word":"ディープラーニング","meaning":"人間の脳の神経回路を模したニューラルネットワークに学習させる機械学習の手法"},{"id":"テクノロジ系-51","category":"テクノロジ系","word":"バックプロパゲーション","meaning":"ニューラルネットワークの学習方法で、出力結果と正解データの誤差を元に出力層から入力層に向かって各中間層の重みを調整する手法"},{"id":"テクノロジ系-52","category":"テクノロジ系","word":"機能推論","meaning":"複数の事例から類似点を導き出し、結論を引き出す方法"},{"id":"テクノロジ系-53","category":
