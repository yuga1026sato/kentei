"テクノロジ系","word":"敵対的生成ネットワーク","meaning":"偽の情報を作るAIと偽りの情報か見破るAIで競わせることでお互いにAIの精度を高める手法"},{"id":"テクノロジ系-54","category":"テクノロジ系","word":"転移学習","meaning":"すでに学習をしたＡＩに事前学習の設定を保持したまま必要な訓練のみ行うことで、効率的に学習させる方法"},{"id":"テクノロジ系-55","category":"テクノロジ系","word":"Bluetooth","meaning":"免許申請や使用登録不要な2.4GHz帯の電波を用いて数mから100m程度の距離の情報機器間で最大24Mbpsの無線通信を行う規格。"},{"id":"テクノロジ系-56","category":"テクノロジ系","word":"DisplayPort","meaning":"機器同士を接続することで映像、音声を出力できるインターフェース規格である。DVIの後継。"},{"id":"テクノロジ系-57","category":"テクノロジ系","word":"DVI","meaning":"コンピュータとディスプレイを接続するためのインターフェイス規格の1つ。シリアル転送方式を採用している。そこそこ古い。"},{"id":"テクノロジ系-58","category":"テクノロジ系","word":"HDMI","meaning":"PCとディスプレイの標準規格であるDVIを基に音声伝送機能や著作権保護機能、色差伝送機能を加えるなどAV家電向けに改良したインターフェース規格"},{"id":"テクノロジ系-59","category":"テクノロジ系","word":"IEEE1394","meaning":"AV機器やコンピュータを接続する高速シリアルインターフェイス規格で「FireWire」とも呼ばれる。"},{"id":"テクノロジ系-60","category":"テクノロジ系","word":"IrDA","meaning":"携帯電話のアドレス帳などのデータ交換を行う場合に使用される「赤外線」を使って無線通信する技術。そこそこ古い。"},{"id":"テクノロジ系-61","category":"テクノロジ系","word":"NFC","meaning":"無線通信を行う国際標準規格。13.56Mhzの電波を用いて数cm～10cm程度までの極近距離で無線通信を行うことができる。\n非接触型ICカードの技術に基づいて開発された"},{"id":"テクノロジ系-62","category":"テクノロジ系","word":"PCMCIA","meaning":"ノートPC向け拡張カードの統一規格である「PCカード」の仕様を策定した米国の業界団体。"},{"id":"テクノロジ系-63","category":"テクノロジ系","word":"RFID","meaning":"ID情報を埋め込んだRFタグ(ICタグ)から電磁界や電波を用いて情報をやり取りする技術。通信可能距離は数cmから数m。"},{"id":"テクノロジ系-64","category":"テクノロジ系","word":"USB","meaning":"周辺機器接続のためのインターフェイス。シリアルバス規格の一つである。ホットプラグ、プラグアンドプレイが可能。"},{"id":"テクノロジ系-65","category":"テクノロジ系","word":"アクチュエータ","meaning":"エネルギーを機械的な動きに変換する装置のこと。IoTシステムで使われている。"},{"id":"テクノロジ系-66","category":"テクノロジ系","word":"デバイスドライバ","meaning":"コンピュータに接続された周辺機器を管理、制御するための抽象化したインターフェースを他のアプリケーションソフトウェアに対して提供するため\nのソフトウェア。単にドライバとも言う。"},{"id":"テクノロジ系-67","category":"テクノロジ系","word":"プラグアンドプレイ","meaning":"周辺機器を接続するのと同時に、自動的にPCが認識しデバイスドライバのインストールと設定を行う機能。"},{"id":"テクノロジ系-68","category":"テクノロジ系","word":"コンテンツフィルタリング","meaning":"インターネット通信を随時監視し、接続しようとするページのコンテンツに問題がある場合には接続を遮断し、\nユーザーにその内容を閲覧させなくする技術、ソフトウェア"},{"id":"テクノロジ系-69","category":"テクノロジ系","word":"アクセス制御","meaning":"情報セキュリティ対策の1つで、システム内の情報資産に対して、だれがどんな権限でアクセスできるかをコントロールすること。"},{"id":"テクノロジ系-70","category":"テクノロジ系","word":"IDS","meaning":"システムやネットワークを監視し、不正または異常な通信を検知して、管理者に警告メールなどで通知するシステムのこと。"},{"id":"テクノロジ系-71","category":"テクノロジ系","word":"SIEM","meaning":"OS、データベース、アプリケーション、ネットワーク機器など多様なソフトウェア機器が出力する大量のログデータを一元的に分析し、\n異常があった場合に管理者に通知したり対策を知らせたりする仕組み。リアルタイムでの監視も可能。"},{"id":"テクノロジ系-72","category":"テクノロジ系","word":"DMZ","meaning":"組織のネットワークにおいてファイアウォールの中でも外でもない隔離された中間的なエリアのこと。セキュリティ効果がある。"},{"id":"テクノロジ系-73","category":"テクノロジ系","word":"VPN","meaning":"多数の加入者が共用する公衆回線で接続された拠点間の通信において、認証及び暗号化と復号の技術によって仮想的な専用回線を構築し、\n通信の安全性を確保する技術。"},{"id":"テクノロジ系-74","category":"テクノロジ系","word":"デジタルフォレンジックス","meaning":"インシデントの発生時に関連するデジタル機器上の電磁的記録を確実かつ正確に収集・取得し、保全するとともに、分析・解析を行い、\n法定紛争やトラブルにおける立証に役立てる活動のこと。"},{"id":"テクノロジ系-75","category":"テクノロジ系","word":"耐タンパ性","meaning":"ハードウェアやソフトウェアのセキュリティレベルを表す指標で、外部から重要データを取り出したり盗み出そうとする行為に対する耐性度合いのこと。"},{"id":"テクノロジ系-76","category":"テクノロジ系","word":"3-2-1ルール","meaning":"データのバックアップを安全に保つための基本的な指針であり、「3つのデータのコピーを保持し、2つは異なる媒体に保存し、\n1つはオフサイト(遠隔地)に保管する」というルールのこと。"},{"id":"テクノロジ系-77","category":"テクノロジ系","word":"PCI DSS","meaning":"クレジットカード情報保護のためのグローバルなセキュリティ基準のことで、クレジットカードに関連するデータを安全に取り扱うことを目的とする。"},{"id":"テクノロジ系-78","category":"テクノロジ系","word":"DRAM","meaning":"揮発性であり主記憶装置に利用されるメモリである。（コンデンサを使った回路使用）"},{"id":"テクノロジ系-79","category":"テクノロジ系","word":"ROM","meaning":"不揮発性（電源の供給が切れても記録内容が保持される）であり、読み出し専用メモリである。"},{"id":"テクノロジ系-80","category":"テクノロジ系","word":"SDRAM","meaning":"揮発性メモリであり、DRAMと同様に\"コンデンサを使用した回路\"である。"},{"id":"テクノロジ系-81","category":"テクノロジ系","word":"SRAM","meaning":"揮発性であり、キャッシュメモリに使用され、レジスタと主記憶の速度の差を埋めるために使用される。(フリップフロップ回路の使用)"},{"id":"テクノロジ系-82","category":"テクノロジ系","word":"フラッシュメモリ","meaning":"不揮発性であり、リフレッシュ動作が必要とされる"},{"id":"テクノロジ系-83","category":"テクノロジ系","word":"SSD","meaning":"補助記憶装置に分類され、半導体素子が使用されており。駆動部品がない為衝撃に強い。"},{"id":"テクノロジ系-84","category":"テクノロジ系","word":"HDD","meaning":"SSDに比べて安価だが、駆動部位がある為、衝撃に弱い。"},{"id":"テクノロジ系-85","category":"テクノロジ系","word":"Blu-ray Disc","meaning":"データの読み書きの際に青紫色のレーザー光を用いる光ディスクの一つ"},{"id":"テクノロジ系-86","category":"テクノロジ系","word":"CD","meaning":"音楽やデータの配布用として非常に普及しており、デジタルデータの流通を担う重要なメディアである。"},{"id":"テクノロジ系-87","category":"テクノロジ系","word":"DVD","meaning":"映像や音楽、コンピュータ用のデジタルデータを記録.再生するための大容量光ディスク"},{"id":"テクノロジ系-88","category":"テクノロジ系","word":"SDカード","meaning":"デジタルカメラやスマートフォンなどに広く使われている、持ち運びに便利な小型のデータ記憶媒体"},{"id":"テクノロジ系-89","category":"テクノロジ系","word":"キャッシュメモリ","meaning":"CPUレジスタと主記憶の間にある超高速な記憶装置。一次キャッシュ、二次キャッシュなどがある"},{"id":"テクノロジ系-90","category":"テクノロジ系","word":"補助記憶","meaning":"ストレージであり、不揮発性。HDD,SSD,USBメモリが該当する。"},{"id":"テクノロジ系-91","category":"テクノロジ系","word":"主記憶","meaning":"メインメモリであり、CPUが実行中のプログラムを一時的に保存しておくための記憶装置"},{"id":"テクノロジ系-92","category":"テクノロジ系","word":"DIMM","meaning":"RAMとして使われるメモリモジュールの規格（形状）の一種"},{"id":"テクノロジ系-93","category":"テクノロジ系","word":"SQLインジェクション","meaning":"Webアプリケーションの入力処理の不備を突き、悪意あるSQL文（データベースへの命令文）を意図的に実行させるサイバー攻撃"},{"id":"テクノロジ系-94","category":"テクノロジ系","word":"MITB攻撃","meaning":"ユーザーのWebブラウザをマルウェアで乗っ取り、サーバーとの通信を盗聴・改ざんするサイバー攻撃"},{"id":"テクノロジ系-95","category":"テクノロジ系","word":"キャッシュポイズニング攻撃","meaning":"システムの一時記憶領域（キャッシュ）に偽の情報を意図的に紛れ込ませ、ユーザーを悪意のあるサイトへ誘導したり通信を傍受したりするサイバー攻撃"},{"id":"テクノロジ系-96","category":"テクノロジ系","word":"DDOS攻撃","meaning":"乗っ取った複数のコンピューターから標的に一斉に過剰なアクセスやデータを送りつけ、サーバーやネットワークをダウンさせるサイバー攻撃"},{"id":"テクノロジ系-97","category":"テクノロジ系","word":"水飲み場攻撃","meaning":"特定の企業や組織ユーザーが日常的にアクセスするWebサイトを改ざんしそのサイトを閲覧したターゲットにマルウェアに感染させる標的型サイバー攻撃"},{"id":"テクノロジ系-98","category":"テクノロジ系","word":"ワンクリック詐欺","meaning":"一度クリックしただけで[入会完了]と見せかけ高額な費用を要求してくる詐欺手口"},{"id":"テクノロジ系-99","category":"テクノロジ系","word":"敵対的サンプル","meaning":"本物のデータに微小なノイズを加えることで、AIに誤認識させてしまう改変されたデータのこと。"},{"id":"テクノロジ系-100","category":"テクノロジ系","word":"ウォードライビング","meaning":"無線LANの電波を検知できるPCを持って車などで街中を移動し、不正利用が可能。"},{"id":"テクノロジ系-101","category":"テクノロジ系","word":"活性化関数","meaning":"ニューロンが受け取る入力値の総和から、目的に応じた最終的な出力値を得るための関数"},{"id":"テクノロジ系-102","category":"テクノロジ系","word":"機械学習","meaning":"コンピューター上のシステムに学習する能力を与え、人間が無意識に行っている経験に基づくパターン認識・カテゴリ分類などを実現しようとする研究分野"},{"id":"テクノロジ系-103","category":"テクノロジ系","word":"事前学習","meaning":"広範囲のタスクに応用できるように多種大量のデータを用いて汎用性の高い性能獲得を目的とした学習を行うこと。"},{"id":"テクノロジ系-104","category":"テクノロジ系","word":"ソーシャルエンジニアリング","meaning":"技術的な方法ではなく心理的な弱みに付け込んで、パスワードなどの秘密情報を不正に取得すること。"},{"id":"テクノロジ系-105","category":"テクノロジ系","word":"ダークウェブ","meaning":"一般的なブラウザではアクセスできず、通常の検索ではたどり着けない秘匿されたWebコンテンツのこと。"},{"id":"テクノロジ系-106","category":"テクノロジ系","word":"スパイウェブ","meaning":"利用者や管理者の意図に反してインストールされ、利用者の個人情報やアクセス履歴などの情報を収集し、勝手に外部に送信する不正プログラム。"},{"id":"テクノロジ系-107","category":"テクノロジ系","word":"ワーム","meaning":"ネットワークや電子メールを介してほかのコンピュータに入り込んで増殖を繰り返し、\n結果ネットワーク負荷の増大やCPU負荷の増大といった被害をもたらすコンピュータのこと。"},{"id":"テクノロジ系-108","category":"テクノロジ系","word":"マクロウイルス","meaning":"ワープロソフトや、表計算ソフトに組み込まれているプログラムを作成する機能を悪用したウィルスのこと。"},{"id":"テクノロジ系-109","category":"テクノロジ系","word":"バックドア","meaning":"正規の手続きを踏まずに内部に入ることが可能な侵入口のこと。"},{"id":"テクノロジ系-110","category":"テクノロジ系","word":"畳み込みニューラルネットワーク","meaning":"ディープラーニングモデルのうち、畳み込み層とプーリング層をもつ深層学習モデルのこと。"},{"id":"テクノロジ系-111","category":"テクノロジ系","word":"大規模言語モデル","meaning":"多種大量の訓練データを行うことで、より高度な言語理解と自然言語を用いる様々なタスクを実現を可能としたモデルのこと。"},{"id":"テクノロジ系-112","category":"テクノロジ系","word":"シャドーIT","meaning":"組織の公式な手続きを経ずに、業務に使用されるIT機器や情報システムのこと。"},{"id":"テクノロジ系-113","category":"テクノロジ系","word":"クロスサイトリクエストフォージェリ","meaning":"罠サイトに設置したハイパリンクを踏ませたりスクリプトを実行させたりすることで、\nターゲットサイトでその利用者が意図しない操作を不正に行わせる攻撃。"},{"id":"テクノロジ系-114","category":"テクノロジ系","word":"総当たり攻撃","meaning":"パスワードクラックに用いられる手法の１つで、特定の文字数及び文字種で設定される可能性のある組み合わせのすべてを試すことで\n不正ログインを試みる攻撃。"},{"id":"テクノロジ系-115","category":"テクノロジ系","word":"WAN","meaning":"Wide Area Network 電話回線や専用線を使用し、LANよりも広い範囲を接続し、通信を実現するネットワーク。"},{"id":"テクノロジ系-116","category":"テクノロジ系","word":"ルータ","meaning":"異なる２つのネットワークをOSI基本参照モデルのネットワーク層で接続。通過するパケットの宛先IPアドレスを見る。"},{"id":"テクノロジ系-117","category":"テクノロジ系","word":"WiMAX","meaning":"広範囲にネットワーク接続を提供する無線通信技術。光回線のような 有線接続がない場所においてもインターネット接続を可能にする。"},{"id":"テクノロジ系-118","category":"テクノロジ系","word":"Wi-Fi Direct","meaning":"無線端末同士が直接Wi-Fi接続するための通信方法。ルータ不要。"},{"id":"テクノロジ系-119","category":"テクノロジ系","word":"ゲートウェイ","meaning":"OSI基本参照モデルの7層すべてを認識する。主にトランスポート以上でプロトコルの異なるネットワーク同士を接続する通信装置や機能。\nルータに備わっている場合が多い"},{"id":"テクノロジ系-120","category":"テクノロジ系","word":"MACアドレス","meaning":"ネットワーク上の危機を一意に識別するために、各危機に割り当てられた6バイトの番号。上位から24ビットがベンダーID、8ビットが機種ID、\n16ビットが製造シリアルNo。"},{"id":"テクノロジ系-121","category":"テクノロジ系","word":"モデム","meaning":"電話線などのアナログ回線を用いて、アナログ信号をデジタル信号に、デジタル信号をアナログ信号に相互変換する装置。"},{"id":"テクノロジ系-122","category":"テクノロジ系","word":"LTE","meaning":"第三世代携帯電話（３G）を拡張した通信規格であり、下り最大100Mbps、上り最大50Mbps以上の高速通信が可能な携帯電話用の通信規格。"},{"id":"テクノロジ系-123","category":"テクノロジ系","word":"ビーコン","meaning":"自分の位置情報などを周囲に伝達するために定期的に発せられる信号のこと。"},{"id":"テクノロジ系-124","category":"テクノロジ系","word":"BLE","meaning":"無線通信規格Bluetoothの一部。省電力、省コストの通信モードのこと。低コストであることからIoTネットワークでの活用が期待されている。"},{"id":"テクノロジ系-125","category":"テクノロジ系","word":"ネットワークインターフェイスガード","meaning":"コンピュータやプリンタなどにネットワーク機能を追加するための拡張カードの一種。"},{"id":"テクノロジ系-126","category":"テクノロジ系","word":"スイッチ","meaning":"通過するパケットの情報から送り先を特定し、パケットを送り先と関係のある送信ポートのみに流す機能をもつネットワーク機器。"},{"id":"テクノロジ系-127","category":"テクノロジ系","word":"VLAN","meaning":"L2スイッチの機能を利用して、一つのLANから複数の仮想的なLANを作る、あるいは複数のLANから一つの仮想的なLANを作る技術"},{"id":"テクノロジ系-128","category":"テクノロジ系","word":"メッシュWi-Fi","meaning":"インターネット回線につながるメインのルータと、そのメインと連携ができるサテライトルータを複数設置することでWi-Fiの接続範囲を広げる仕組み。"},{"id":"テクノロジ系-129","category":"テクノロジ系","word":"デフォルトゲートウェイ","meaning":"プライベートネットワーク（同一リンク内）に存在しない危機と通信を行うときに、外部ネットワークのと接続点となる機器のこと。"},{"id":"テクノロジ系-130","category":"テクノロジ系","word":"ESSID","meaning":"Wi-Fi（無線LAN）で接続するネットワークを識別するための名前（ネットワーク名）。"},{"id":"テクノロジ系-131","category":"テクノロジ系","word":"ターミナルアダプタ","meaning":"パソコンや電話機などのISDN非対応装置を、DSU経由してISDNに接続させるデータ回線終端装置。"},{"id":"テクノロジ系-132","category":"テクノロジ系","word":"5G","meaning":"「超高速・超低遅延・多数同時接続」が特徴の、スマホやIoT機器を劇的に快適にする第5世代の移動通信システム"},{"id":"テクノロジ系-133","category":"テクノロジ系","word":"LPWA","meaning":"「少ない電力で、もの凄く遠くまで」データを飛ばせる、スマートメーターなどのIoT機器に最適な無線通信技術"},{"id":"テクノロジ系-134","category":"テクノロジ系","word":"IoTエリアネットワーク","meaning":"家の中のスマート家電やセンサー同士を、Wi-FiやBluetoothでつなぐ身近なネットワーク"},{"id":"テクノロジ系-135","category":"テクノロジ系","word":"C","meaning":"OSや組み込み開発に使われる、高速なコンパイラ型言語。"},{"id":"テクノロジ系-136","category":"テクノロジ系","word":"C++","meaning":"C言語にオブジェクト指向を追加した、大規模開発向けの高速な言語"},{"id":"テクノロジ系-137","category":"テクノロジ系","word":"fortran(フォートラン)","meaning":"複雑な化学計算式を行うことが目的の世界で初・実用化された高水準プログラム"},{"id":"テクノロジ系-138","category":"テクノロジ系","word":"Python","meaning":"簡潔で読みやすい文法が特徴の高水準プログラム言語"},{"id":"テクノロジ系-139","category":"テクノロジ系","word":"R","meaning":"統計解析や機械学習に特化した、データ分析用の言語。"},{"id":"テクノロジ系-140","category":"テクノロジ系","word":"SQL","meaning":"データ定義言語・DDL,データ操作言語・DMLからなる関連データベースを操作するためのデータベース言語"},{"id":"テクノロジ系-141","category":"テクノロジ系","word":"ノーコード","meaning":"用意されたパーツやテンプレートなどの部品を組み合わせることで、ソースコードを全く書かずにアプリケーション開発を行う開発方法"},{"id":"テクノロジ系-142","category":"テクノロジ系","word":"ローコード","meaning":"できる限りソースコードを書かずにアプリケーション開発を行う開発法。"},{"id":"テクノロジ系-143","category":"テクノロジ系","word":"リスク対応","meaning":"リスクアセスメントの結果を考慮してリスクを修正するプロセスのこと。リスク移転・リスク回避・リスク受容・リスク低減などの種類がある。"},{"id":"テクノロジ系-144","category":"テクノロジ系","word":"完全性","meaning":"情報セキュリティマネジメントの概念の一要素で、情報が完全で、改ざん・破壊されていない特徴を示す。"},{"id":"テクノロジ系-145","category":"テクノロジ系","word":"責任追跡性","meaning":"情報セキュリティマネジメントの付加的な要素で、情報資産に操作したユーザーと動作の履歴をログとして記録し、追跡できる特徴のこと。"},{"id":"テクノロジ系-146","category":"テクノロジ系","word":"リスクコミュニケーション","meaning":"情報セキュリティに関するリスクについて、リスク評価者、管理者、事業者、消費者、その他の関係者間で情報の共有をし、相互理解を図るための活動"},{"id":"テクノロジ系-147","category":"テクノロジ系","word":"サイバー保険","meaning":"サイバー攻撃などで被害を被った場合の損害を補償する保険。原因調査や、対応費用、損害賠償責任、逸失（いっしつ）利益などが保証される。"},{"id":"テクノロジ系-148","category":"テクノロジ系","word":"SOC(Security Operation Center)","meaning":"システムアラートやセキュリティインシデントを常に監視し、発生時にCSIRT(対応する専属チーム)へ報告するとともに支援を行う機関"},{"id":"テクノロジ系-149","category":"テクノロジ系","word":"ソフトウェア等の脆弱性関連情報に関する\n届出制度","meaning":"発生した脆弱性情報をIPA(情報処理推進機構)に報告し、被害拡大を防ぐ制度"},{"id":"テクノロジ系-150","category":"テクノロジ系","word":"J-CRAT","meaning":"「標的型サイバー攻撃特別相談窓口」にて受け付けた相談・情報をJPCERT/CC等と連携し、被害の低減と攻撃の核だ帽子を図るIPAの仕組み"},{"id":"テクノロジ系-151","category":"テクノロジ系","word":"API","meaning":"APIとは、あるプログラムが提供する機能を他のプログラムから呼び出して連携し、利用できるようにするための仕組みである。"},{"id":"テクノロジ系-152","category":"テクノロジ系","word":"HTML","meaning":"HTMLとは、タグを使ってコンテンツを囲むことで文書構造を定義する、ウェブページ記述用のマークアップ言語である。"},{"id":"テクノロジ系-153","category":"テクノロジ系","word":"java","meaning":"JavaとはJava仮想マシンJVMの上で動くためOSやCPUに依存せず一度書けばどこでも動くという高い汎用性を持ったプログラミング言語"},{"id":"テクノロジ系-154","category":"テクノロジ系","word":"javaScript","meaning":"JavaScriptはWebページを動的に動かすスクリプト言語であり、Javaとは互換性もつながりもない別物である。"},{"id":"テクノロジ系-155","category":"テクノロジ系","word":"JSON","meaning":"JSONはコロンやコンマで区切ったペアでデータを表しXMLより軽量なため広く使われているプログラミング言語を問わない汎用的なデータ記述形式である"},{"id":"テクノロジ系-156","category":"テクノロジ系","word":"PHP","meaning":"PHPは、動的なWebページを比較的容易に生成できる、サーバサイド・スクリプトに専門化した言語である。"},{"id":"テクノロジ系-157","category":"テクノロジ系","word":"SGML","meaning":"SGMLとは、文章の構造をタグで記述する国際標準規格であり、後に誕生するHTMLやXMLの元となった記述言語である。"},{"id":"テクノロジ系-158","category":"テクノロジ系","word":"MACアドレスフィルタリング","meaning":"MACアドレスフィルタリングとは無線LANルーター等に事前に登録した特定の機器MACアドレスだけをネットワークに接続許可するセキュリティ機能である"},{"id":"テクノロジ系-159","category":"テクノロジ系","word":"ファイアウォール","meaning":"外部ネットワークからの不正アクセスを防ぐため、あらかじめ設定したルールに基づいて通過させるパケットを識別・制御する防御システムである"},{"id":"テクノロジ系-160","category":"テクノロジ系","word":"IPS","meaning":"ネットワークを流れる通信をリアルタイムで監視・分析し、不正な侵入や攻撃を検知した時点で自動的に遮断するシステムである"},{"id":"テクノロジ系-161","category":"テクノロジ系","word":"DLP","meaning":"機密データそのものを常に監視し、外部への不正なコピーや送信を検知して自動的にブロックする情報漏洩対策システムである。"},{"id":"テクノロジ系-162","category":"テクノロジ系","word":"SSL/TLS","meaning":"インターネット上でやり取りされるデータを暗号化し、盗聴や改ざん、なりすましを防いで安全に通信を行うためのプロトコルである"},{"id":"テクノロジ系-163","category":"テクノロジ系","word":"MDM","meaning":"会社や学校が支給した多数のスマートフォンやタブレットなどのモバイル端末を、ネットワーク経由で一元管理・制御するシステムである"},{"id":"テクノロジ系-164","category":"テクノロジ系","word":"ぺネストレーションテスト","meaning":"システムに実際に既知の技術で疑似攻撃を仕掛け、セキュリティ上の脆弱性や侵入経路がないかを検証するテストである"},{"id":"テクノロジ系-165","category":"テクノロジ系","word":"セキュアブート","meaning":"PCの起動時にOSやドライバーのデジタル署名を検証し、許可されていない不正なプログラムの実行を防ぐ仕組みである"},{"id":"テクノロジ系-166","category":"テクノロジ系","word":"WORM","meaning":"データの書き込みは一度だけ可能で、それ以降は消去や変更（上書き）ができず読み出しのみができる記憶媒体の仕組みである"},{"id":"テクノロジ系-167","category":"テクノロジ系","word":"アンチパスバック","meaning":"入室時の記録がないと退室を許可せず、また退室時の記録がないと再入室を許可しない、連れ込み（共連れ）防止のための入退室管理機能である"},{"id":"テクノロジ系-168","category":"テクノロジ系","word":"CPU","meaning":"演算、制御を行う装置、コンピューターを構成する部品の1つ。"},{"id":"テクノロジ系-169","category":"テクノロジ系","word":"マルチプロセッサ","meaning":"複数台のプロセッサを並列に動作させることにより処理能力の向上を図る。密結合型と疎結合型に分類される。"},{"id":"テクノロジ系-170","category":"テクノロジ系","word":"GPU","meaning":"機械において画像処理を専門に担う装置。動画再生や3DCGのレンダリングなどの高負荷な演算に強い。"},{"id":"テクノロジ系-171","category":"テクノロジ系","word":"GPGPU","meaning":"GPUを画像処理以外の一般的な計算処理に使う技術のこと。"},{"id":"テクノロジ系-172","category":"テクノロジ系","word":"クロック周波数","meaning":"1秒間に何回のクロックが発振されるかを表す数値。基本的にはクロック周波数が高いほど処理速度は速くなる。"},{"id":"テクノロジ系-173","category":"テクノロジ系","word":"ゼロトラスト","meaning":"すべての通信やアクセスを信用せず、常に確認する。という考え方にもとずいたセキュリティモデル。"},{"id":"テクノロジ系-174","category":"テクノロジ系","word":"CAPTCHA","meaning":"認証の際に、一部を隠したり等をした画像から文字を判読させ入力させることにより、人間以外による自動入力を排除する技術"},{"id":"テクノロジ系-175","category":"テクノロジ系","word":"他人受入率","meaning":"生体認証において、他人であるのにもかかわらず本人と誤認してしまう確率。低いほど良い。"},{"id":"テクノロジ系-176","category":"テクノロジ系","word":"CA","meaning":"公開鍵暗号方式を用いたデータ通信において利用者の公開鍵が本人の物かを保証するためのデジタル証明書を発行する機関。"},{"id":"テクノロジ系-177","category":"テクノロジ系","word":"プライバシーバイデザイン","meaning":"システムの企画・設計から、ユーザーのプライバシー保護を検討し、あらかじめプライバシー保護対策を組みこむ考え方"},{"id":"テクノロジ系-178","category":"テクノロジ系","word":"RAID","meaning":"複数のハードディスクを1台のように扱い、性能向上や耐障害性を高める技術"},{"id":"テクノロジ系-179","category":"テクノロジ系","word":"URL","meaning":"WebサイトやWeb上のリソース（画像やファイル）のアドレス（住所）のこと、通常はHTMLやその他のリソースの位置情報\n（ドメイン、ホスト名、ディレクトリ名）ファイルだけを指定するが、通信に使用するプロトコル名、使用するポート番号なども併せて\n記述・指定できる仕様になっている。"},{"id":"テクノロジ系-180","category":"テクノロジ系","word":"VDI","meaning":"サーバー上にデスクトップ環境を集約し、利用者はネットワーク経由で仮想デスクトップを利用する仕組み"},{"id":"テクノロジ系-181","category":"テクノロジ系","word":"クラスタシステム","meaning":"複数のコンピュータを連携させ、1つのシステムとして動作させる構成"},{"id":"テクノロジ系-182","category":"テクノロジ系","word":"サブネットマスク","meaning":"IPアドレスを「ネットワーク部」と「ホスト部」の2つの領域に分けるための数値"},{"id":"テクノロジ系-183","category":"テクノロジ系","word":"デュプレックスシステム","meaning":"2台のシステムを同時に稼働させ、一方が故障しても処理を継続できるシステム構成"},{"id":"テクノロジ系-184","category":"テクノロジ系","word":"レプリケーション","meaning":"データを別サーバーへ複製・同期する仕組み（可用性・負荷分散・障害対策が目的）"},{"id":"テクノロジ系-185","category":"テクノロジ系","word":"クライアントサーバシステム","meaning":"サービスや情報を提供するサーバーと、それを利用するクライアントがネットワークで結ばれ、役割を分担して動作する仕組み"},{"id":"テクノロジ系-186","category":"テクノロジ系","word":"シンクライアント","meaning":"端末側でほとんど処理やデータ保存を行わず、サーバー側で処理を集中管理するクライアント端末"},{"id":"テクノロジ系-187","category":"テクノロジ系","word":"スタンドアロン","meaning":"コンピューターが他のコンピューターやネットワークと接続しておらず独立している状態"},{"id":"テクノロジ系-188","category":"テクノロジ系","word":"仮想化","meaning":"ソフトウェアを用いて1台の物理的なコンピューター（ハードウェア）上に、複数の仮想的な環境を作り出す技術"},{"id":"テクノロジ系-189","category":"テクノロジ系","word":"ライブマイグレーション","meaning":"稼働中の仮想マシン（VM）やシステムを停止させることなく、別の物理サーバーへ丸ごと移動させる技術"},{"id":"テクノロジ系-190","category":"テクノロジ系","word":"デュアルシステム","meaning":"2つのシステムを並行運用し、新システムへ安全に移行する方式"},{"id":"テクノロジ系-191","category":"テクノロジ系","word":"ピアツーピア","meaning":"端末同士が対等に直接通信し、データをやり取りするネットワーク方式"},{"id":"テクノロジ系-192","category":"テクノロジ系","word":"NAS","meaning":"ネットワークに接続して複数の端末で共有利用できるファイルサーバ（共有ストレージ）"},{"id":"テクノロジ系-193","category":"テクノロジ系","word":"VM","meaning":"（Virtual Machine：仮想マシン）： 1台のコンピュータ上で、複数のOSを独立して動作させる仮想化技術。"},{"id":"テクノロジ系-194","category":"テクノロジ系","word":"レスポンスタイム","meaning":"処理の要求を行ってから最初の応答を得るまでの時間"},{"id":"テクノロジ系-195","category":"テクノロジ系","word":"ターンアラウンドタイム","meaning":"システムに処理の要求を行ってからすべての結果を受け取るまでの時間"},{"id":"テクノロジ系-196","category":"テクノロジ系","word":"稼働率","meaning":"システムが一定期間の中で正常に稼働している時間の割合"},{"id":"テクノロジ系-197","category":"テクノロジ系","word":"MTTR","meaning":"壊れた機械を直すのにかかる平均の時間（平均修理時間）"},{"id":"テクノロジ系-198","category":"テクノロジ系","word":"フォールトトレラント","meaning":"一部に障害が発生しても全体としては停止せず稼働を続け、その間にシステムの復旧を図るようにシステムを設計する考え方"},{"id":"テクノロジ系-199","category":"テクノロジ系","word":"コールドスタンバイ","meaning":"システムの障害対策として予備機を用意し、通常は停止状態で待機させる"},{"id":"テクノロジ系-200","category":"テクノロジ系","word":"イニシャルコスト","meaning":"システムの構築や導入などにかかる初期費用"},{"id":"テクノロジ系-201","category":"テクノロジ系","word":"TCO","meaning":"システムの導入・運用・保持などのシステムに対してかかるすべての費用"},{"id":"テクノロジ系-202","category":"テクノロジ系","word":"スループット","meaning":"コンピュータやネットワークが単位時間あたりに処理できるデータ量（仕事量）"},{"id":"テクノロジ系-203","category":"テクノロジ系","word":"ベンチマーク","meaning":"システムの使用目的に合わせたプログラム等を実行し、システムの総合的な処理性能を測定する手法"},{"id":"テクノロジ系-204","category":"テクノロジ系","word":"MTBF","meaning":"機械が壊れてから次に壊れるまでの時間（平均故障間隔）"},{"id":"テクノロジ系-205","category":"テクノロジ系","word":"フェールセーフ","meaning":"システムに不具合・故障が発生しても、被害を最小限にとどめ安全を最優先にして制御を行う考え方"},{"id":"テクノロジ系-206","category":"テクノロジ系","word":"フールプルーフ","meaning":"人為的ミスによるシステムの誤動作を防ぐように設計する考え方"},{"id":"テクノロジ系-207","category":"テクノロジ系","word":"ホットスタンバイ","meaning":"システムの障害対策として予備機を用意し主系と同じシステムをあらかじめ起動しておくことで、障害発生時に直ちに業務を引き継ぐ"},{"id":"テクノロジ系-208","category":"テクノロジ系","word":"ランニングコスト","meaning":"システムの運用・保守などにかかる費用"},{"id":"テクノロジ系-209","category":"テクノロジ系","word":"コールバック","meaning":"電話の受信側が、一度回線を切断した後再度発信者にかけ直すことで、利用者確認を行うセキュリティ対策の１つ"},{"id":"テクノロジ系-210","category":"テクノロジ系","word":"WAF","meaning":"Webサイトに対する通信を監視し、脆弱性を狙った攻撃からWebサイトを保護するセキュリティ対策"},{"id":"テクノロジ系-211","category":"テクノロジ系","word":"EDR","meaning":"パソコンやスマートフォンなどの端末上で発生するセキュリティ上の脅威を検知し対応する仕組み"},{"id":"テクノロジ系-212","category":"テクノロジ系","word":"検疫ネットワーク","meaning":"社外から持ち込まれたPCなどを、社内ネットワークに接続する前に検査用ネットワークに接続させて検査することで、ウィルス感染などを防止する仕組み"},{"id":"テクノロジ系-213","category":"テクノロジ系","word":"サニタイジング","meaning":"ユーザの入力値を処理するWebアプリで、入力データ中にコマンド等を実行する意味を持つ文字があった場合に実行の直前で無害化する操作"},{"id":"テクノロジ系-214","category":"テクノロジ系","word":"電子透かし","meaning":"画像・動画・音声等のデジタルコンテンツにおいて、作者名等の著作権情報を埋め込む技術"},{"id":"テクノロジ系-215","category":"テクノロジ系","word":"ブロックチェーン","meaning":"ブロックと呼ばれる幾つかの取引データをまとめた単位を鎖のように繋いで台帳を形成し、P2Pネットワークで管理する技術"},{"id":"テクノロジ系-216","category":"テクノロジ系","word":"TPM","meaning":"コンピュータのマザーボードなどに装着されるセキュリティ関連の処理性能を実装した半導体チップ"},{"id":"テクノロジ系-217","category":"テクノロジ系","word":"イミュータブルバックアップ","meaning":"一度保存されたバックアップデータを変更・削除できないようにする仕組み"},{"id":"テクノロジ系-218","category":"テクノロジ系","word":"インターロック","meaning":"セキュリティを確保するために、複数の動作や操作を連動させ、一方が完了しない限り他方が動作しないように制御する仕組み"},{"id":"テクノロジ系-219","category":"テクノロジ系","word":"Android","meaning":"Linuxをベースにしたオープンソースのオペレーションシステム"},{"id":"テクノロジ系-220","category":"テクノロジ系","word":"Chrome OS","meaning":"LinuxをベースにしたPCのOS。Webブラウザ上でほとんどの処理を行う"},{"id":"テクノロジ系-221","category":"テクノロジ系","word":"iOS","meaning":"Apple社が提供するモバイル端末のOS"},{"id":"テクノロジ系-222","category":"テクノロジ系","word":"Linux","meaning":"世界中のプログラマにより改良されたOS"},{"id":"テクノロジ系-223","category":"テクノロジ系","word":"Mac OS","meaning":"直観的に操作できる洗練されたGUIがある"},{"id":"テクノロジ系-224","category":"テクノロジ系","word":"OS","meaning":"コンピュータを効率よく使うために、共通して使われるプログラムをまとめて提供する基本ソフトウェア"},{"id":"テクノロジ系-225","category":"テクノロジ系","word":"UNIX","meaning":"学術機関やコンピュータメーカーの手によって、独自の拡張が施されたOS"},{"id":"テクノロジ系-226","category":"テクノロジ系","word":"Windows","meaning":"Microsoft社が開発したオペレーティングシステム（OS）で、パソコンを操作するための基本的なソフトウェアです。"},{"id":"テクノロジ系-227","category":"テクノロジ系","word":"マルチタッチインターフェース","meaning":"スマホやタブレットで複数の指や接点を用いて操作する仕組み"},{"id":"テクノロジ系-228","category":"テクノロジ系","word":"仮想記憶","meaning":"補助記憶装置を使用することによって、主記憶のサイズより大きなプログラムを実行可能にする"},{"id":"テクノロジ系-229","category":"テクノロジ系","word":"共通鍵暗号方式","meaning":"暗号化と復号（元に戻すこと）に同じ共通の鍵を使用する暗号化方式。"},{"id":"テクノロジ系-230","category":"テクノロジ系","word":"WPA２","meaning":"Wi-Fi（無線LAN）の通信を暗号化する安全基準（プロトコル）の一つ。"},{"id":"テクノロジ系-231","category":"テクノロジ系","word":"ワンタイムパスワード","meaning":"一度しか使えない、短時間（数十秒〜数分）だけ有効な使い捨てのパスワード。"},{"id":"テクノロジ系-232","category":"テクノロジ系","word":"EMD3-Dセキュア","meaning":"インターネットショッピングなどでクレジットカード決済を行う際の、本人認証サービス（国際標準規格）。"},{"id":"テクノロジ系-233","category":"テクノロジ系","word":"デジタル署名","meaning":"電子署名とは、紙の文書における「手書きの署名」や「実印」に相当する、電子データ上の印鑑証明・サインのことです。"},{"id":"テクノロジ系-234","category":"テクノロジ系","word":"ルートディレクトリ","meaning":"ディレクトリ構造の最上階層にあるディレクトリ"},{"id":"テクノロジ系-235","category":"テクノロジ系","word":"カレントディレクトリ","meaning":"現在作業しているディレクトリ"},{"id":"テクノロジ系-236","category":"テクノロジ系","word":"ファイル拡張子","meaning":"ファイルの種類を表す名前の最後の部分（例：.txt）"},{"id":"テクノロジ系-237","category":"テクノロジ系","word":"フラグメンテーション","meaning":"記憶装置においてバラバラに空いた空き容量が生じる現象。またはその断片化された領域のこと"},{"id":"テクノロジ系-238","category":"テクノロジ系","word":"アーカイブ","meaning":"複数のファイルを1つにまとめて保存すること"},{"id":"テクノロジ系-239","category":"テクノロジ系","word":"クリップアート","meaning":"文書やプレゼン資料、Webサイトなどを飾るために使用される、イラストやアイコンなどの画像素材の総称"},{"id":"テクノロジ系-240","category":"テクノロジ系","word":"ピボットデータ表","meaning":"一般的にピポットテーブルと呼ばれ、大量のデータを簡単に集計・分析できる表計算ソフトの機能"},{"id":"テクノロジ系-241","category":"テクノロジ系","word":"OSS（Open Source Software）","meaning":"無償で公開され、誰でも自由にソースコードの閲覧、改変、再配布ができるソフトウェア"},{"id":"テクノロジ系-242","category":"テクノロジ系","word":"GPL（GNU General Public License）","meaning":"利用・改変・再頒布の自由を保証する代表的なオープンソースライセンス"},{"id":"テクノロジ系-243","category":"テクノロジ系","word":"コピーレフト","meaning":"著作物や二次的著作物も自由に利用・改変・再配布できるようにする考え方"},{"id":"テクノロジ系-244","category":"テクノロジ系","word":"OMR","meaning":"架空のユーザー像を設定し３階層のシナリオを記述する。開発メンバー間で共有し提案書などを作成していく方法"},{"id":"テクノロジ系-245","category":"テクノロジ系","word":"イメージスキャナー","meaning":"印刷物・写真・写真用フィルムなど(CCDなど)"},{"id":"テクノロジ系-246","category":"テクノロジ系","word":"インパクトプリンター","meaning":"インクリボンを紙に打ち付けることで印刷するプリンター"},{"id":"テクノロジ系-247","category":"テクノロジ系","word":"ウェアラブル端末","meaning":"身体に装着して使用する情報機器の総称である。"},{"id":"テクノロジ系-248","category":"テクノロジ系","word":"プロジェクタ","meaning":"プレゼンテーション、ホームシアターなどPCや大スクリーンに投影する装着。"},{"id":"テクノロジ系-249","category":"テクノロジ系","word":"液晶ディスプレイ","meaning":"液晶と呼ばれる物質の性質を利用して映像を表示する装着。"},{"id":"テクノロジ系-250","category":"テクノロジ系","word":"クラッキング","meaning":"コンピュータシステムやソフトウェア、ネットワークに対して不正にアクセスし、データを損傷させたり、保護機能を無効化したりする"},{"id":"テクノロジ系-251","category":"テクノロジ系","word":"二十脅迫","meaning":"データの暗号化しさらに盗んだ情報の公開を脅して金を要求するランサムウェアの攻撃手法。"},{"id":"テクノロジ系-252","category":"テクノロジ系","word":"ボット","meaning":"人の代わりに決められた作業を自動で行うプログラム"},{"id":"テクノロジ系-253","category":"テクノロジ系","word":"ファイルレスマルウェア","meaning":"ファイルを保存せずにメモリ上で動作し、感染や攻撃を行うマルウェア"},{"id":"テクノロジ系-254","category":"テクノロジ系","word":"ＲＡＴ","meaning":"パソコンやスマートフォンを遠隔で勝手に操作できるようにする悪質なプログラム"},{"id":"テクノロジ系-255","category":"テクノロジ系","word":"キーロガー","meaning":"キーボードで入力した内容を記録するプログラム"},{"id":"テクノロジ系-256","category":"テクノロジ系","word":"セキュリティホール :"同じ内容のメールを複数の宛先へ一斉送信すること"},{"id":"テクノロジ系-277","category":"テクノロジ系","word":"BCC (Blind Carbon Copy)","meaning":"送信者以外の受信者に、他の宛先を知られることなくメールのコピーを送信する機能"},{"id":"テクノロジ系-278","category":"テクノロジ系","word":"CMS","meaning":"Webサイトの内容を専門知識がなくても作成・更新・管理できるシステム"},{"id":"テクノロジ系-279","category":"テクノロジ系","word":"オンラインストレージ","meaning":"インターネット経由でファイルを保存・共有・バックアップできるサービス"},{"id":"テクノロジ系-280","category":"テクノロジ系","word":"ISP","meaning":"インターネット接続サービスを提供する事業主 (プロバイダ)"},{"id":"テクノロジ系-281","category":"テクノロジ系","word":"ローミング","meaning":"契約した通信会社のエリア外でも、他社の通信網を利用して通信できる仕組み"},{"id":"テクノロジ系-282","category":"テクノロジ系","word":"キャリアアグリゲーション","meaning":"周波数の異なる複数の通信回線を束ねて同時に使用し、通信速度や容量を向上させる技術"},{"id":"テクノロジ系-283","category":"テクノロジ系","word":"MNP (Mobile Number Portability)","meaning":"携帯電話会社を変更しても電話番号をそのまま引き継げる仕組み"},{"id":"テクノロジ系-284","category":"テクノロジ系","word":"ADSL","meaning":"電話回線を利用して高速通信を行うインターネット接続方式"},{"id":"テクノロジ系-285","category":"テクノロジ系","word":"盗み見","meaning":"他人がパスワードなどを入力する様子を後ろから見て盗み取る行為"},{"id":"テクノロジ系-286","category":"テクノロジ系","word":"ビジネスメール詐欺","meaning":"業務メールを装って送金や機密情報の提供をだまし取る詐欺"},{"id":"テクノロジ系-287","category":"テクノロジ系","word":"マルウェア","meaning":"コンピュータに害を与える目的で作られた悪意あるソフトウェアの総称"},{"id":"テクノロジ系-288","category":"テクノロジ系","word":"ランサムウェア","meaning":"ファイルを暗号化して使用不能にし、復旧と引き換えに身代金を要求するマルウェア"},{"id":"テクノロジ系-289","category":"テクノロジ系","word":"トロイの木馬","meaning":"正常なソフトを装って侵入し、不正な動作を行うマルウェア"},{"id":"テクノロジ系-290","category":"テクノロジ系","word":"ガンブラー","meaning":"Webサイトの訪問者をマルウェア感染させる攻撃手法"},{"id":"テクノロジ系-291","category":"テクノロジ系","word":"ファイル交換ソフトウェア","meaning":"利用者同士でインターネットを通じてファイルを共有・交換するソフトウェア"},{"id":"テクノロジ系-292","category":"テクノロジ系","word":"不正のトライアングル","meaning":"「動機」「機会」「正当化」の3要素がそろうと不正が起こりやすいという考え方"},{"id":"テクノロジ系-293","category":"テクノロジ系","word":"パスワードリスト攻撃","meaning":"他サービスから流出したID・パスワードの組み合わせを使って不正ログインを試みる攻撃"},{"id":"テクノロジ系-294","category":"テクノロジ系","word":"クリックジャッキング","meaning":"本来のWebページに透明Webなページを重ねて表示し、利用者に意図しないクリックをさせる攻撃"},{"id":"テクノロジ系-295","category":"テクノロジ系","word":"ディレクトリトラバーサル","meaning":"不正なパス指定で、本来アクセスできないファイルを閲覧・取得する攻撃"},{"id":"テクノロジ系-296","category":"テクノロジ系","word":"第三者中継","meaning":"メールサーバを無断で経由してメールを送信できる状態。スパム送信に悪用される"},{"id":"テクノロジ系-297","category":"テクノロジ系","word":"セッションハイジャック","meaning":"利用者のセッションIDを盗み、不正になりすまして利用する攻撃"},{"id":"テクノロジ系-298","category":"テクノロジ系","word":"クリプトジャッキング","meaning":"他人のコンピュータ資源を無断で利用し、暗号資産を採掘する攻撃"},{"id":"テクノロジ系-299","category":"テクノロジ系","word":"やり取り型攻撃","meaning":"電子メールなどで何度か無害なやり取りを行い、標的の気が緩んだどころを狙って添付ファイルによるマルウェア感染や不正なサイトへの誘導を行う手法"},{"id":"テクノロジ系-300","category":"テクノロジ系","word":"ゼロデイ攻撃","meaning":"修正プログラムが公開される前の脆弱性を狙う攻撃"},{"id":"テクノロジ系-301","category":"テクノロジ系","word":"フットプリンティング","meaning":"攻撃前に標的の情報を収集・調査する行為"},{"id":"テクノロジ系-302","category":"テクノロジ系","word":"サラミ法","meaning":"不正行為が発覚しない程度に少量ずつの金銭や物品を窃取する行為"},{"id":"テクノロジ系-303","category":"テクノロジ系","word":"LATCHの法則","meaning":"５つの切り口　Location(位置) Alphabet(アルファベット順)Time(時間)Category(カテゴリ)Hierarchy(階層)情報の伝達、整理するための原則"},{"id":"テクノロジ系-304","category":"テクノロジ系","word":"UXデザイン","meaning":"ユーザーが直感的に操作でき、満足度が高い体験を提供するための設計全般です。"},{"id":"テクノロジ系-305","category":"テクノロジ系","word":"インフォグラフィックス","meaning":"インフォグラフィックスは「情報を視覚的に簡潔に表現する図解」で、複雑なデータや概念を一目で理解しやすくする手法"},{"id":"テクノロジ系-306","category":"テクノロジ系","word":"シグニファイア","meaning":"その場所やモノや事象などに対して適切な行動を示唆してくれるデザインのこと。手がかりを与える要素・ドアの取っ手は「引く」ことを示すサイン"},{"id":"テクノロジ系-307","category":"テクノロジ系","word":"デザインの原則","meaning":"デザインを行う上で知っておくべき４つの原則　近接　整列　反復　対比"},{"id":"テクノロジ系-308","category":"テクノロジ系","word":"ピクトグラム","meaning":"言葉を使わずに情報を視覚的に伝えるための記号（非常口とかに描いてある絵）"},{"id":"テクノロジ系-309","category":"テクノロジ系","word":"ユニバーサルデザイン","meaning":"年齢や身体能力に関係なく、誰もが使いやすいように設計されたデザインのこと"},{"id":"テクノロジ系-310","category":"テクノロジ系","word":"構造化シナリオ","meaning":"３階層（サービス、アクティビティ、インタラクション）のシナリオを記述し開発メンバー間で共有し提案書などを作成していく方法"},{"id":"テクノロジ系-311","category":"テクノロジ系","word":"プルダウンメニュー","meaning":"GUIを構成する部品で、メニューから項目を選択する方式の一つ。一覧がロールスクリーンを下すような動作で展開される"},{"id":"テクノロジ系-312","category":"テクノロジ系","word":"人間中心設計","meaning":"ユーザーにとって使いやすいシステム(人間中心)"},{"id":"テクノロジ系-313","category":"テクノロジ系","word":"マルチインターフェース","meaning":"手や指、身振りや体の動きによってパソコンを操作する技術"},{"id":"テクノロジ系-314","category":"テクノロジ系","word":"ホバー","meaning":"パソコンの操作において、マウスカーソルを特定の領域に重ねる動作を指す"},{"id":"テクノロジ系-315","category":"テクノロジ系","word":"ラジオボタン","meaning":"いくつかある項目の中から排他的に一つの項目を選択させたい場合に使用するGUI部品"},{"id":"テクノロジ系-316","category":"テクノロジ系","word":"ユーザビリティ","meaning":"使用性"},{"id":"テクノロジ系-317","category":"テクノロジ系","word":"モバイルファースト","meaning":"モバイル端末を利用するユーザーを中心に据えてコンテンツ制作をおこなっていくこと"},{"id":"テクノロジ系-318","category":"テクノロジ系","word":"多要素認証","meaning":"ICカードとパスワード、指紋とパスワードなどのように、利用者が知っているうちの情報を複数組み合わせて認証を行う方式。"},{"id":"テクノロジ系-319","category":"テクノロジ系","word":"クリアデスク","meaning":"机場や鍵のない引き出しに置かれた書類の盗難・噴出、および、第三者に文書を見られたことによる情報漏洩を避けるために、\n常に机場を整理整頓し、席を長時間離れる場合には机に重要書類等を放置したままにしないことを求めるルールのこと"},{"id":"テクノロジ系-320","category":"テクノロジ系","word":"タイムスタンプ","meaning":"対象の電子データのハッシュ地と信頼できる第三者機関である時刻認証局が発行する時刻情報を含んだ電子データのこと"},{"id":"テクノロジ系-321","category":"テクノロジ系","word":"公開鍵暗号方式","meaning":"暗号化と複合に異なるカギを使用する暗号方式。RSAやエルガマル暗号がある"},{"id":"テクノロジ系-322","category":"テクノロジ系","word":"WPA3","meaning":"WPA２の後継となる無線LANのセキュリティプロトコル"},{"id":"テクノロジ系-323","category":"テクノロジ系","word":"ジェスチャーインタフェース","meaning":"手や指、身振りなどの体の動きによってパソコンやスマホ、産業用システムなどを操作する技術"},{"id":"テクノロジ系-324","category":"テクノロジ系","word":"GUI","meaning":"アイコンやメニューで操作対象や選択項目を表示し、マウスなどのデバイスで操作できる仕組み"},{"id":"テクノロジ系-325","category":"テクノロジ系","word":"リストボックス","meaning":"あらかじめ用意された選択肢の中から1つの項目を選択するための短冊状の入力領域"},{"id":"テクノロジ系-326","category":"テクノロジ系","word":"サムネイル","meaning":"画像や動画などの内容を一覧で簡単に把握できるよう、小さなサイズで表示された縮小画像"},{"id":"テクノロジ系-327","category":"テクノロジ系","word":"CSS","meaning":"HTMLの要素をどのように修飾して表示させるかを定義するテキスト方式"},{"id":"テクノロジ系-328","category":"テクノロジ系","word":"リダイレクト","meaning":"アクセスしようとしたWebページから別のURLへ自動的に移動させる仕組み"},{"id":"テクノロジ系-329","category":"テクノロジ系","word":"本人拒否率","meaning":"本人でもあるのに関わらず本人ではないと判断されてしまう確率のこと"},{"id":"テクノロジ系-330","category":"テクノロジ系","word":"トラストアンカー","meaning":"情報システムにおいて信頼の基点となる要素や存在を指す。"},{"id":"テクノロジ系-331","category":"テクノロジ系","word":"セキュリティバイデザイン","meaning":"情報セキュリティをシステムの企画・設計段階から確保するための方策のこと。NISCを中心に提唱されている"},{"id":"テクノロジ系-332","category":"テクノロジ系","word":"CPRM","meaning":"DVDやブルーレイなどの記憶メディアなどに対してかけられる不正コピー防止技術。"},{"id":"テクノロジ系-333","category":"テクノロジ系","word":"DRM","meaning":"デジタルコンテンツの不正利用を防止し、著作者の権利を保護することを目的とする技術の総称。"},{"id":"テクノロジ系-334","category":"テクノロジ系","word":"GIF","meaning":"256色以下の比較的色数の少ない静止画像を中心に扱うことができる可逆圧縮形式の画像ファイルフォーマット。"},{"id":"テクノロジ系-335","category":"テクノロジ系","word":"MIDI","meaning":"コンピューターやシンセサイザなどの電子楽器の間で、演奏情報や制御情報をデジタル形式でやり取りするための世界共通規格。"},{"id":"テクノロジ系-336","category":"テクノロジ系","word":"MP3","meaning":"デジタル音声圧縮技術の１つであり、その技術を用いて作られている非可逆圧縮形式の音声ファイルフォーマット。"},{"id":"テクノロジ系-337","category":"テクノロジ系","word":"MPEG","meaning":"カラー動画像、音声のフォーマットでありMPEG-1,MPEG-2,MPEG-4などの規格がある。"},{"id":"テクノロジ系-338","category":"テクノロジ系","word":"PDF","meaning":"テキストや画像だけでなく、レイアウトやフォントの情報などもファイルに納めることができる文書表示用のフォーマット。"},{"id":"テクノロジ系-339","category":"テクノロジ系","word":"PNG","meaning":"圧縮アルゴリズムに「Default」を採用した、画質の劣化の少ない可逆圧縮の画像ファイルフォーマット。"},{"id":"テクノロジ系-340","category":"テクノロジ系","word":"エンコード","meaning":"データを一定の規則に従って、ほかのデータ形式に変換すること。これを行う機器やソフトウェアを「エンコーダ」という。"},{"id":"テクノロジ系-341","category":"テクノロジ系","word":"ストリーミング","meaning":"主に音声などのマルチメディアファイルを転送・再生する方式の一種。"},{"id":"テクノロジ系-342","category":"テクノロジ系","word":"可逆圧縮","meaning":"符号化方式の中で圧縮後のデータから圧縮前のデータを完全に復元できる方式。"},{"id":"テクノロジ系-343","category":"テクノロジ系","word":"非可逆圧縮","meaning":"符号化方式の中で圧縮後のデータから圧縮前のデータを復元できない方式。"},{"id":"テクノロジ系-344","category":"テクノロジ系","word":"OSI基本参照モデル","meaning":"異なる機種がスムーズに通信できるように、通信機能を7つの階層（レイヤー）に分割して標準化した世界共通のモデル（ものさし）。"},{"id":"テクノロジ系-345","category":"テクノロジ系","word":"HTTP","meaning":"WebブラウザとWebサーバーの間で、HTMLなどのWebページデータをやり取りするための標準的な通信ルール。"},{"id":"テクノロジ系-346","category":"テクノロジ系","word":"POP","meaning":"メールサーバーから自分の端末（パソコンやスマホ）にメールをダウンロードして管理するための通信ルール。"},{"id":"テクノロジ系-347","category":"テクノロジ系","word":"NTP","meaning":"ネットワークに接続されている環境において、サーバおよびクライアントコンピュータが持つシステム時計を正しい時刻へ同期するためのプロトコル。"},{"id":"テクノロジ系-348","category":"テクノロジ系","word":"TCP/IP階層モデル","meaning":"インターネットで実際に広く使われている、通信機能を4つの階層（レイヤー）にモデル化したもの。"},{"id":"テクノロジ系-349","category":"テクノロジ系","word":"HTTPS","meaning":"WebサーバとWebブラウザがデータを安全に送受信するために、\nSSL/TLSプロトコルによって生成される安全な接続上でデータのやり取り(HTTP通信)を行う方式。"},{"id":"テクノロジ系-350","category":"テクノロジ系","word":"IMAP","meaning":"電子メールをクライアントコンピュータ上のメールソフトではなくメールサーバ上で管理することで、\n複数の端末が利用する場合のメール状態の一元管理やメールの選択受信などの機能を実現したメール受信用プロトコル。"},{"id":"テクノロジ系-351","category":"テクノロジ系","word":"DHCP","meaning":"TCP/IPネットワークで、ネットワークに接続するノードへのIPアドレスの割り当てをアドレスプールから自動的に行うプロトコル。"},{"id":"テクノロジ系-352","category":"テクノロジ系","word":"TCP/IP","meaning":"インターネットやLANなどで標準的に使われている。あらゆるコンピュータや異なるOSで相互に通信することを可能にする通信プロトコル群。"},{"id":"テクノロジ系-353","category":"テクノロジ系","word":"SMTP","meaning":"メールを送信・転送するための通信ルール。"},{"id":"テクノロジ系-354","category":"テクノロジ系","word":"FTP","meaning":"ネットワーク上でファイルの転送を行うための通信プロトコル。"},{"id":"テクノロジ系-355","category":"テクノロジ系","word":"ポート番号","meaning":"IPアドレスが送受信の対象コンピュータを認識する情報であるのに対して、データのあて先となるアプリケーションを表す情報。"},{"id":"テクノロジ系-356","category":"テクノロジ系","word":"プラチナバンド","meaning":"携帯電話の通信に利用される主に700MHzから900MHzの周波数帯を指す。障害物が多い場所でも届きやすい。"},{"id":"テクノロジ系-357","category":"テクノロジ系","word":"MIMO","meaning":"無線LANにおいて、送信データをあらかじめ複数の信号に分割し、送信側と受信側それぞれが複数のアンテナを用いて、\n同じ周波数帯域で同時転送することにより、通信速度を高め、通信距離を伸ばす方法である。"},{"id":"テクノロジ系-358","category":"テクノロジ系","word":"デザリング","meaning":"スマートフォンなどのモバイル端末がもつ携帯回線などのインターネット接続機能を用いて、\nほかのコンピュータや端末情報をインターネットに接続する方法。"},{"id":"テクノロジ系-359","category":"テクノロジ系","word":"eSIM","meaning":"従来の抜き差しして使うSIMとは異なり、スマートフォンに内蔵されている本体一体型のSIMのこと。"},{"id":"テクノロジ系-360","category":"テクノロジ系","word":"FTTH","meaning":"光ファイバーを伝送路としてそれを一般家庭まで引き込む、光通信のネットワーク構成方式のこと。"},{"id":"テクノロジ系-361","category":"テクノロジ系","word":"クローラ","meaning":"Web上を自動巡回して文書や画像などの情報を取得・データベース化するプログラムのこと。"},{"id":"テクノロジ系-362","category":"テクノロジ系","word":"MIME","meaning":"ASCII文字しか使用できないSMTPを利用したメールで、日本語などの2バイトコードや画像・動画・音声データを送信するための仕組み。"},{"id":"テクノロジ系-363","category":"テクノロジ系","word":"cookie","meaning":"Webサーバに対するアクセスがどのPCからのものであるかを識別するためなどに、\nWebサーバやWebページの指示によってユーザ情報などをWebブラウザに保存する仕組み。"},{"id":"テクノロジ系-364","category":"テクノロジ系","word":"メーリングリスト","meaning":"電子メールの特定のアドレスに送信すると、リストに登録されているメンバ全員に同じ内容のメールが同時に転送される仕組み。"},{"id":"テクノロジ系-365","category":"テクノロジ系","word":"DNS","meaning":"ドメイン名・ホスト名とIPアドレスを結び付けて変換する(名前解決する)仕組み。"},{"id":"テクノロジ系-366","category":"テクノロジ系","word":"IPアドレス","meaning":"インターネットやLANなどのIPネットワークに接続されたコンピュータなどに割り振られる識別番号のこと。"},{"id":"テクノロジ系-367","category":"テクノロジ系","word":"BMP","meaning":"古くからWindows が標準でサポートしている画像ファイル形式。画像をピクセルごとに記録された RGB 値や パレットカラーなどの集合で表現する。"},{"id":"テクノロジ系-368","category":"テクノロジ系","word":"HTML5","meaning":"ウェブサイト（ホームページ）の骨組みを作るための、世界共通の最新のルール（言語）"},{"id":"テクノロジ系-369","category":"テクノロジ系","word":"JPEG","meaning":"カメラで撮影したフルカラー静止画像などを画質をなるべく落とさずにデータを小さく（圧縮）できる、世界で最も広く使われている画像ファイル形式"},{"id":"テクノロジ系-370","category":"テクノロジ系","word":"ZIP","meaning":"複数のファイルやフォルダを1つにまとめ、さらにデータサイズをギューッと小さく（圧縮）したファイル形式. \nWindows 2000, XP から標準対応しており、ファイルを右クリックして「送る」よりこの形式で圧縮ファイルを作成することができる。"},{"id":"テクノロジ系-371","category":"テクノロジ系","word":"デコード","meaning":"暗号や特定のルールで変換されたデータを、人間やコンピューターが理解できる元の形式に戻すこと"},{"id":"テクノロジ系-372","category":"テクノロジ系","word":"AR","meaning":"現実の景色にデジタル情報を重ねて表示する技術のこと"},{"id":"テクノロジ系-373","category":"テクノロジ系","word":"CMY","meaning":"色の三原色"},{"id":"テクノロジ系-374","category":"テクノロジ系","word":"CMYK","meaning":"三原色、シアン　マゼンタ　イエローの三つに黒色をより美しく印刷するため黒を加えた４色で色を表現すること。"},{"id":"テクノロジ系-375","category":"テクノロジ系","word":"dpi","meaning":"「画像のきめ細かさ（解像度）」"},{"id":"テクノロジ系-376","category":"テクノロジ系","word":"MR","meaning":"現実世界と仮想（CG）世界を融合させ、お互いにリアルタイムで影響し合えるようにする技術"},{"id":"テクノロジ系-377","category":"テクノロジ系","word":"RGP","meaning":"色（レッド、グリーン、ブルー）を混ぜて幅広い色を表現。すべての色の要素が最大の時は白になる。"},{"id":"テクノロジ系-378","category":"テクノロジ系","word":"SR","meaning":"「過去の映像」を「いま目の前で起きていること」のように錯覚させる技術"},{"id":"テクノロジ系-379","category":"テクノロジ系","word":"コンピューターグラフィックス","meaning":"画像や映像を作成したり処理したりする技術、またそれらよって作成された画像や映像"},{"id":"テクノロジ系-380","category":"テクノロジ系","word":"ドロー系ソフトウェア","meaning":"「ベクター（Vector）データ」を使ってイラストや図形を描くソフトウェア"},{"id":"テクノロジ系-381","category":"テクノロジ系","word":"バーチャルリアリティ","meaning":"デジタルで作られた「別世界」に、自分が本当にそこにいるかのような没入感を体験できる技術"},{"id":"テクノロジ系-382","category":"テクノロジ系","word":"ペイント系ソフトウェア","meaning":"ラスタ形式の画像を作成·編集するためのソフトウェアの総称"},{"id":"テクノロジ系-383","category":"テクノロジ系","word":"メタバース","meaning":"メタバース（Metaverse）とは、インターネット上に構築された、多人数が参加できる「3次元の仮想空間」"},{"id":"テクノロジ系-384","category":"テクノロジ系","word":"クロスサイトスクリプティング","meaning":"安全なWebサイトに罠のプログラムを仕込み、閲覧者の情報を盗むサイバー攻撃"},{"id":"テクノロジ系-385","category":"テクノロジ系","word":"ドライブバイダウンロード","meaning":"Webサイトを閲覧しただけで、気づかないうちにウイルスを自動でダウンロード・感染させられるサイバー攻撃"},{"id":"テクノロジ系-386","category":"テクノロジ系","word":"中間者攻撃","meaning":"通信している二者の間に攻撃者がこっそり割り込み、盗聴やデータの改ざんを行うサイバー攻撃"},{"id":"テクノロジ系-387","category":"テクノロジ系","word":"バッファオーバーフロー攻撃","meaning":"大量のデータを送りつけてメモリを溢れさせ、システムを乗っ取る攻撃"},{"id":"テクノロジ系-388","category":"テクノロジ系","word":"ポートスキャン","meaning":"サーバーの通信の窓口を片っ端から叩いて、侵入できる隙を探る行為"},{"id":"テクノロジ系-389","category":"テクノロジ系","word":"プロンプトインジェクション攻撃","meaning":"AI（ChatGPTなど）に特殊な指示を与えて騙し、本来教えてはいけない秘密情報を吐き出させたり、制限を無視させたりするサイバー攻撃"},{"id":"テクノロジ系-390","category":"テクノロジ系","word":"フィッシング","meaning":"本物そっくりの偽メールや偽サイト（銀行やSNSなど）で騙し、パスワードやクレジットカード情報を盗み出すサイバー攻撃"},{"id":"テクノロジ系-391","category":"テクノロジ系","word":"標的型攻撃","meaning":"特定の企業や組織を狙い定め、業務に関連する本物そっくりのメールなどを送ってウイルスに感染させるサイバー攻撃"},{"id":"テクノロジ系-392","category":"テクノロジ系","word":"DoS攻擊","meaning":"ターゲットのサーバーに大量のデータやアクセスを集中させ、過負荷にしてサイトやサービスをダウンさせるサイバー攻撃"},{"id":"テクノロジ系-393","category":"テクノロジ系","word":"IPスプーフィング","meaning":"送信元のIPアドレス（ネット上の住所）を偽装して他人のふりをし、不正アクセスや攻撃を行うサイバー攻撃"},{"id":"テクノロジ系-394","category":"テクノロジ系","word":"NoSQL","meaning":"データへのアクセス方法をSQLに限定しないデータベース管理システムの総称　\n関係データベース管理システム以外のDBMS RDBMSより軽量でデータの参照や追加も低コストで実行出来る"},{"id":"テクノロジ系-395","category":"テクノロジ系","word":"RDBMS","meaning":"関係データベースを取り扱うDBMSのこと無料で扱えるMySQLなども当てはまる"},{"id":"テクノロジ系-396","category":"テクノロジ系","word":"データクレンジング","meaning":"データベースに蓄積されている最適化されていないデータに対してデータ形式、欠陥値、単位の統一、異常値の処理、システム統合、\nデータ解析のための準備データシェアハウスの為の準備に使われる"},{"id":"テクノロジ系-397","category":"テクノロジ系","word":"データベース管理システム","meaning":"利用者とデータベースのインターフェースとなりデータベースを効率化かつ適切に管理するためのソフトウェア"},{"id":"テクノロジ系-398","category":"テクノロジ系","word":"関係データベース","meaning":"1つのレコードを1行で表しデータを表とする形式、表間は相互の表中の値を用い関係付けられておりSQL等で命令を送れる"},{"id":"テクノロジ系-399","category":"テクノロジ系","word":"E-R図","meaning":"データベース化の対象となる実体（エンティティ）と属性（アトリビュート）、\n及び実体間の関連（リレーションシップ）を表現する図関連モデルとの親和性が高い為関係データベースの概念設計に利用される"},{"id":"テクノロジ系-400","category":"テクノロジ系","word":"主キー","meaning":"関係データベースの表ごとに設定され表の中の1つの行を一意に特定出来る属性(列)または属性ごとの組み合わせ\n主キーは一意性制約とnotNULL制約が課される"},{"id":"テクノロジ系-401","category":"テクノロジ系","word":"外部キー","meaning":"関係データベースにおいて他の表を参照する為に設定される列外部キーは参照する表の主キー列と同じ項目になる"},{"id":"テクノロジ系-402","category":"テクノロジ系","word":"インデックス","meaning":"データベースへのアクセス効率を向上させる為テーブル内の特定の列に対して作成される補助的なデータ構造、\n少ない計算量で目的データを特定出来るためこれを用いれば全行を確認せずとも目的データにアクセスできる"},{"id":"テクノロジ系-403","category":"テクノロジ系","word":"デッドロック","meaning":"互いに相手の資源を待ち、処理が止まる状態。"},{"id":"テクノロジ系-404","category":"テクノロジ系","word":"ロールバック","meaning":"エラー時にデータを更新前の状態に戻す処理。"},{"id":"テクノロジ系-405","category":"テクノロジ系","word":"射影","meaning":"表から必要な列（属性）だけを取り出して新しい表を作る操作。"},{"id":"テクノロジ系-406","category":"テクノロジ系","word":"選択","meaning":"条件に合う行を取り出す。SQL：WHERE//     条件に合う行を取り出す操作。"},{"id":"テクノロジ系-407","category":"テクノロジ系","word":"排他制御","meaning":"同時アクセスを防ぐ制御。＝ロックで競合防ぐ。"},{"id":"テクノロジ系-408","category":"テクノロジ系","word":"２相コミットメント","meaning":"分散データベースにおけるトランザクション処理の整合性を保つため2段階に分けてコミットする方法。"},{"id":"テクノロジ系-409","category":"テクノロジ系","word":"ＡＣＩＤ特性","meaning":"データベースのトランザクション処理を行う上で必要不可欠な4つの特性（A・原始性、C・一貫性、I・独立性、D・永続性 ）の頭文字を並べた言葉。"},{"id":"テクノロジ系-410","category":"テクノロジ系","word":"チェックポイント","meaning":"データベースにおき、トランザクションの更新情報がディスク上に反映されるタイミングのこと。"},{"id":"テクノロジ系-411","category":"テクノロジ系","word":"トランザクション","meaning":"データ処理の完全性・一貫性を保つため、関連の複数の処理をひとまとまりの単位として実行・管理する仕組み。"},{"id":"テクノロジ系-412","category":"テクノロジ系","word":"ロールフォワード","meaning":"データベースに障害が起こった時に、更新後のログを用いて、チェックポイント以降にコミットされたトランザクション情報を\nデータベースに反映する処理。"},{"id":"テクノロジ系-413","category":"テクノロジ系","word":"LAN","meaning":"比較的狭い範囲のコンピュータ間で通信を実現するネットワークのこと。"},{"id":"テクノロジ系-414","category":"テクノロジ系","word":"ＮＡＴ","meaning":"インターネットで使う「グローバルIPアドレス」と、社内などで使う「プライベートIPアドレス」を1対1で相互に変換する技術。"},{"id":"テクノロジ系-415","category":"テクノロジ系","word":"ＳＤＮ","meaning":"ネットワークの構成や設定を、物理的な配線を変えることなく、ソフトウェアの操作だけで柔軟に一元管理・制御する技術。"},{"id":"テクノロジ系-416","category":"テクノロジ系","word":"Ｗｉ－Ｆｉ","meaning":"電波を利用してPCやスマホなどの機器をインターネットに無線接続する局所的なネットワーク（無線LAN）の規格。"},{"id":"テクノロジ系-417","category":"テクノロジ系","word":"ＷＰＳ","meaning":"ボタンを押すなどの簡単な操作だけで、Wi-Fiの接続やセキュリティの設定を自動で行える仕組み。"},{"id":"テクノロジ系-418","category":"テクノロジ系","word":"イントラネット","meaning":"インターネットの技術（Webブラウザなど）を利用して構築された、企業や組織の内部限定のネットワーク。"},{"id":"テクノロジ系-419","category":"テクノロジ系","word":"エッジコンピューティング","meaning":"データをすべてクラウド（中央）に送るのではなく、ユーザーの近く（エッジ＝端末側）のサーバーで分散して処理することで、\n通信の遅延を減らす技術。"},{"id":"テクノロジ系-420","category":"テクノロジ系","word":"ハブ","meaning":"スター型ネットワークトポロジLANの中心に設置され、複数のポートを搭載し、コンピュータの接続台数を増やすことができる集線装置。"},{"id":"テクノロジ系-421","category":"テクノロジ系","word":"プロキシ","meaning":"社内LANとインターネットの間に入り、Webサイトへのアクセスを代理（中継）するサーバー。セキュリティ対策や高速化に用いられる。"},{"id":"テクノロジ系-422","category":"テクノロジ系","word":"モジュラージャック","meaning":"LANケーブルや電話線などを差し込んで接続するための、壁や機器にある差込口（コネクタ）。"},{"id":"テクノロジ系-423","category":"テクノロジ系","word":"無線ＬＡＮ","meaning":"電波や赤外線などの無線通信を利用して、配線なしで機器同士を接続するLANの仕組み。"},{"id":"テクノロジ系-424","category":"テクノロジ系","word":"SMS 認証","meaning":"携帯電話のショートメッセージサービス（SMS）さに送信れたワンタイムパスワード（確認コード）を入力させることで、確実な本人確認を行う認証方式のことです。"},{"id":"テクノロジ系-425","category":"テクノロジ系","word":"本人拒否率","meaning":"指紋や顔などの生体認証において、「本人であるにもかかわらず、システムに本人と認識されず拒否されてしまう割合」のことです。"},{"id":"テクノロジ系-426","category":"テクノロジ系","word":"トラストアンカー（Trust Anchor）","meaning":"電子署名や電子証明書などの電子認証において、「無条件に信頼する」とあらかじめ決められた信頼の起点（基準点）のことです。"},{"id":"テクノロジ系-427","category":"テクノロジ系","word":"セキュリティバイデザイン","meaning":"システムやソフトウェア、製品の企画・設計の段階からセキュリティ対策を組み込む開発思想のことです。"},{"id":"テクノロジ系-428","category":"テクノロジ系","word":"EMV 3-Dセキュア","meaning":"インターネット上でクレジットカード決済を安全に行うための本人認証サービスです。"},{"id":"テクノロジ系-429","category":"テクノロジ系","word":"ワンタイムパスワード","meaning":"1度だけ、あるいは1分間など短期間だけ利用できるパスワードを利用した認証です。"},{"id":"テクノロジ系-430","category":"テクノロジ系","word":"WPA2","meaning":"無線LAN（Wi-Fi）の通信を保護するためのセキュリティ規格です。"},{"id":"テクノロジ系-431","category":"テクノロジ系","word":"共通鍵暗号方式","meaning":"データを「暗号化」する鍵と、元に戻す「復号」する鍵に、同一の鍵（共通鍵）を使用する暗号化方式です。"},{"id":"テクノロジ系-432","category":"テクノロジ系","word":"インターロック","meaning":"誤操作や危険から人や設備を守るために、特定の条件が満たされない限り機械や装置が作動しないようにする安全機構のことです。"},{"id":"テクノロジ系-433","category":"テクノロジ系","word":"イミュータブルバックアップ","meaning":"一度作成したバックアップデータをあらかじめ指定された期間、管理者であっても変更・削除・上書きできないようにするデータ保護手法です。"},{"id":"テクノロジ系-434","category":"テクノロジ系","word":"TPM（Trusted Platform Module）","meaning":"コンピュータのマザーボードやCPUに組み込まれる「セキュリティ専用のハードウェアチップ」です。"},{"id":"テクノロジ系-435","category":"テクノロジ系","word":"ブロックチェーン","meaning":"ネットワーク上の取引履歴を暗号技術で「ブロック」という単位にまとめ、鎖（チェーン）のようにつないで記録するデータベース技術です。"},{"id":"テクノロジ系-436","category":"テクノロジ系","word":"電子透かし","meaning":"画像、動画、音声、電子文書などのデジタルコンテンツに、著作権者や使用許諾先などの固有情報を埋め込む技術です。"},{"id":"テクノロジ系-437","category":"テクノロジ系","word":"サニタイジング","meaning":"Webサイトの入力フォームなどに悪意のあるコードが含まれていた場合、それを検知して無害な文字に置き換えるセキュリティ対策です。"},{"id":"テクノロジ系-438","category":"テクノロジ系","word":"検疫ネットワーク","meaning":"パソコンやスマートフォンを社内ネットワークに接続する前に、ウイルス感染やセキュリティ対策の状況を検査し、安全性が確認された端末だけをつなぐセキュリティシステムです。"}];
const KEY='kentei-study-v2';
const emptyState=()=>({total:0,correct:0,byCategory:{'ストラテジ系':{total:0,correct:0},'マネジメント系':{total:0,correct:0},'テクノロジ系':{total:0,correct:0}},wrongIds:[],favorites:[],perQuestion:{}});
let state=loadState(),mode='all',pool=[],order=[],pos=0,current=null,answered=false,session={total:0,correct:0},currentChoices=[];
function loadState(){
  const base=emptyState();
  try{
    const saved=JSON.parse(localStorage.getItem(KEY)||'{}')||{};
    return {
      ...base,...saved,
      byCategory:{...base.byCategory,...(saved.byCategory||{})},
      wrongIds:Array.isArray(saved.wrongIds)?saved.wrongIds:[],
      favorites:Array.isArray(saved.favorites)?saved.favorites:[],
      perQuestion:saved.perQuestion&&typeof saved.perQuestion==='object'?saved.perQuestion:{}
    };
  }catch(e){return base}
}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function pct(c,t){return t?((c/t)*100).toFixed(1)+'%':'0%'}
function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function el(id){return document.getElementById(id)}
function refreshHome(){el('termCount').textContent=`全${QUESTIONS.length}語（ストラテジ・マネジメント・テクノロジ）`;el('rate-all').textContent='正答率 '+pct(state.correct,state.total);const map={'ストラテジ系':'strategy','マネジメント系':'management','テクノロジ系':'technology'};for(const [cat,key] of Object.entries(map)){const s=state.byCategory[cat]||{total:0,correct:0};el('rate-'+key).textContent='正答率 '+pct(s.correct,s.total)}el('wrong-count').textContent=state.wrongIds.length+'問';el('favorite-count').textContent=state.favorites.length+'問';el('total-answers').textContent=state.total;el('total-correct').textContent=state.correct;el('total-rate').textContent=pct(state.correct,state.total)}
function choosePool(){
  if(mode==='all')return QUESTIONS;
  if(mode==='wrong')return QUESTIONS.filter(q=>state.wrongIds.includes(q.id));
  if(mode==='favorite')return QUESTIONS.filter(q=>state.favorites.includes(q.id));
  return QUESTIONS.filter(q=>q.category===mode);
}
function questionPriority(q){
  const s=state.perQuestion[q.id];
  if(!s||!s.total)return -1;
  return s.correct/s.total;
}
function buildPriorityOrder(items){
  return [...items]
    .map(q=>({q,priority:questionPriority(q),random:Math.random()}))
    .sort((a,b)=>a.priority-b.priority || a.random-b.random)
    .map(x=>x.q.id);
}
function start(m){
  mode=m;
  pool=choosePool();
  session={total:0,correct:0};
  if(!pool.length){
    alert(m==='wrong'?'間違えた問題はまだありません。':'このモードに問題がありません。');
    return;
  }
  order=buildPriorityOrder(pool);
  pos=0;
  el('home').classList.add('hidden');
  el('quiz').classList.remove('hidden');
  showQuestion();
}
function pickCurrentQuestion(){
  return QUESTIONS.find(q=>q.id===order[pos]);
}
function showQuestion(){
  answered=false;
  current=pickCurrentQuestion();
  if(!current){
    showModeFinished();
    return;
  }
  el('category').textContent=current.category;
  el('qnum').textContent=`${pos+1} / ${order.length}`;
  el('question').textContent=current.meaning;
  const pq=state.perQuestion[current.id]||{total:0,correct:0};
  el('questionRate').textContent=`この問題の正答率：${pct(pq.correct,pq.total)}（${pq.total}回答）`;
  el('result').className='hidden';
  el('result').innerHTML='';
  el('nextBtn').classList.add('hidden');
  el('nextBtn').textContent='次の問題へ';
  el('nextBtn').dataset.action='next';
  el('favBtn').classList.remove('hidden');
  el('favBtn').textContent=state.favorites.includes(current.id)?'★':'☆';

  const candidates=QUESTIONS.filter(q=>q.category===current.category&&q.id!==current.id&&q.word!==current.word);
  const distractors=[];
  const usedWords=new Set([current.word]);
  for(const q of shuffle(candidates)){
    if(!usedWords.has(q.word)){
      distractors.push(q);
      usedWords.add(q.word);
      if(distractors.length===3)break;
    }
  }
  currentChoices=shuffle([current,...distractors]);
  el('choices').innerHTML='';
  currentChoices.forEach(item=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=item.word;
    b.addEventListener('click',()=>answer(item,b));
    el('choices').appendChild(b);
  });
  updateSession();
}
function showModeFinished(){
  current=null;
  answered=true;
  el('category').textContent=mode==='wrong'?'復習完了':'一巡完了';
  el('qnum').textContent=`${order.length} / ${order.length}`;
  el('question').innerHTML='';
  el('questionRate').textContent='';
  el('choices').innerHTML='';
  el('favBtn').classList.add('hidden');
  const r=el('result');
  r.className='result ok';
  const title=mode==='wrong'?'🎉 間違えた問題をすべて解き終わりました！':'🎉 このモードの問題を一巡しました！';
  const remain=mode==='wrong'?`<p>現在も間違いリストに残っている問題：<b>${state.wrongIds.length}問</b></p>`:'<p>重複せずに1周完了しました。</p>';
  r.innerHTML=`<div class="finish-box"><h2>${title}</h2>${remain}<p>ホームに戻って、別のモードを選べます。</p></div>`;
  el('nextBtn').textContent='ホームへ戻る';
  el('nextBtn').dataset.action='home';
  el('nextBtn').classList.remove('hidden');
}
function answer(item,button){
  if(answered)return;
  answered=true;
  const ok=item.id===current.id;
  state.total++;
  session.total++;
  state.byCategory[current.category]=state.byCategory[current.category]||{total:0,correct:0};
  state.byCategory[current.category].total++;
  const pq=state.perQuestion[current.id]||{total:0,correct:0};
  pq.total++;
  if(ok){
    state.correct++;
    session.correct++;
    state.byCategory[current.category].correct++;
    pq.correct++;
    state.wrongIds=state.wrongIds.filter(id=>id!==current.id);
  }else if(!state.wrongIds.includes(current.id)){
    state.wrongIds.push(current.id);
  }
  state.perQuestion[current.id]=pq;

  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.textContent===current.word)b.classList.add('correct');
  });
  if(!ok)button.classList.add('wrong');

  const explanations=currentChoices.map(choice=>{
    const correctClass=choice.id===current.id?' correct-item':'';
    const selectedClass=!ok&&choice.id===item.id?' selected-wrong':'';
    const mark=choice.id===current.id?' ⭕ 正解':(!ok&&choice.id===item.id?' ❌ 選択':'');
    return `<div class="choice-explanation${correctClass}${selectedClass}">
      <div class="choice-word">${escapeHtml(choice.word)}${mark}</div>
      <div class="choice-meaning">${escapeHtml(choice.meaning)}</div>
    </div>`;
  }).join('');

  const r=el('result');
  r.className='result '+(ok?'ok':'ng');
  r.innerHTML=`<div class="answer-title">${ok?'⭕ 正解！':'❌ 不正解'}</div>
    ${ok?'':`<div>正解：<b>${escapeHtml(current.word)}</b></div>`}
    <div class="explain"><b>4つの選択肢の解説</b></div>
    <div class="choice-explanations">${explanations}</div>`;

  const updated=state.perQuestion[current.id];
  el('questionRate').textContent=`この問題の正答率：${pct(updated.correct,updated.total)}（${updated.total}回答）`;

  const isLast=pos>=order.length-1;
  if(isLast){
    el('nextBtn').textContent=mode==='wrong'?'復習を終了してホームへ':'一巡を終了してホームへ';
    el('nextBtn').dataset.action='finish';
  }else{
    el('nextBtn').textContent='次の問題へ';
    el('nextBtn').dataset.action='next';
  }
  el('nextBtn').classList.remove('hidden');
  save();
  refreshHome();
  updateSession();
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function next(){
  const action=el('nextBtn').dataset.action;
  if(action==='home'){
    goHome();
    return;
  }
  if(action==='finish'){
    showModeFinished();
    return;
  }
  pos++;
  if(pos>=order.length){
    showModeFinished();
    return;
  }
  showQuestion();
}
function updateSession(){el('sessionAnswered').textContent=session.total;el('sessionCorrect').textContent=session.correct;el('sessionRate').textContent=pct(session.correct,session.total)}
function goHome(){el('quiz').classList.add('hidden');el('home').classList.remove('hidden');refreshHome()}
function toggleFavorite(){const i=state.favorites.indexOf(current.id);if(i>=0)state.favorites.splice(i,1);else state.favorites.push(current.id);save();el('favBtn').textContent=state.favorites.includes(current.id)?'★':'☆';refreshHome()}
function resetStudy(){
 if(confirm('正答率や間違えた問題など、すべての学習記録を消しますか？')){state=emptyState();save();refreshHome()}
}
window.addEventListener('error',e=>{console.error(e.error||e.message)});

function bindButtons(){
  const bindings = [
    ['startAllBtn', () => start('all')],
    ['startStrategyBtn', () => start('ストラテジ系')],
    ['startManagementBtn', () => start('マネジメント系')],
    ['startTechnologyBtn', () => start('テクノロジ系')],
    ['startWrongBtn', () => start('wrong')],
    ['startFavoriteBtn', () => start('favorite')],
    ['resetBtn', resetStudy],
    ['backBtn', goHome],
    ['favBtn', toggleFavorite],
    ['nextBtn', next]
  ];
  bindings.forEach(([id, handler]) => {
    const node = document.getElementById(id);
    if(node) node.addEventListener('click', handler);
  });
}
document.addEventListener('DOMContentLoaded', () => {
  bindButtons();
  refreshHome();
});

</script></body></html>
